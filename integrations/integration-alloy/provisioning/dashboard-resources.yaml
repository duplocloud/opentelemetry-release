apiVersion: grizzly.grafana.com/v1alpha1
kind: Dashboard
metadata:
  folder: integration-alloy
  name: resources
spec:
  annotations:
    list:
      - builtIn: 1
        datasource:
          type: grafana
          uid: -- Grafana --
        enable: true
        hide: true
        iconColor: rgba(0, 211, 255, 1)
        name: Annotations & Alerts
        type: dashboard
      - datasource: $loki_datasource
        enable: true
        expr: '{cluster=~"$cluster", container="kube-diff-logger"} | json | namespace_extracted="alloy" | name_extracted=~"alloy.*"'
        iconColor: rgba(0, 211, 255, 1)
        instant: false
        name: Deployments
        titleFormat: '{{cluster}}/{{namespace}}'
  editable: false
  graphTooltip: 1
  links:
    - icon: doc
      targetBlank: true
      title: Documentation
      tooltip: Alloy resources documentation
      type: link
      url: https://grafana.com/docs/alloy/latest/reference/components/
    - asDropdown: true
      icon: external link
      includeVars: true
      keepTime: true
      tags:
        - alloy-integrations
      targetBlank: false
      title: Dashboards
      type: dashboards
  panels:
    - datasource: ${datasource}
      description: 'CPU usage of the Alloy process relative to 1 CPU core.

        For example, 100% means using one entire CPU core.'
      fieldConfig:
        defaults:
          unit: percentunit
        overrides: []
      gridPos:
        h: 8
        w: 12
        x: 0
        y: 0
      id: 1
      targets:
        - datasource: ${datasource}
          expr: sum by(${groupby}) (rate(alloy_resources_process_cpu_seconds_total{cluster=~"$cluster", namespace=~"$namespace", job=~"$job", instance=~"$instance"}[$__rate_interval]))
          instant: false
          legendFormat: __auto
          range: true
          refId: A
      title: CPU usage
      type: timeseries
    - datasource: ${datasource}
      description: Resident memory size of the Alloy process.
      fieldConfig:
        defaults:
          unit: decbytes
        overrides: []
      gridPos:
        h: 8
        w: 12
        x: 12
        y: 0
      id: 2
      targets:
        - datasource: ${datasource}
          expr: sum by(${groupby}) (alloy_resources_process_resident_memory_bytes{cluster=~"$cluster", namespace=~"$namespace", job=~"$job", instance=~"$instance"})
          instant: false
          legendFormat: __auto
          range: true
          refId: A
      title: Memory (RSS)
      type: timeseries
    - datasource: ${datasource}
      description: Rate at which the Alloy process performs garbage collections.
      fieldConfig:
        defaults:
          custom:
            drawStyle: points
            pointSize: 3
          unit: ops
        overrides: []
      gridPos:
        h: 8
        w: 8
        x: 0
        y: 8
      id: 3
      targets:
        - datasource: ${datasource}
          expr: "sum by(${groupby}) (\n  rate(go_gc_duration_seconds_count{cluster=~\"$cluster\", namespace=~\"$namespace\", job=~\"$job\", instance=~\"$instance\"}[5m])\n  and on(instance)\n  alloy_build_info{cluster=~\"$cluster\", namespace=~\"$namespace\", job=~\"$job\", instance=~\"$instance\"}\n)"
          instant: false
          legendFormat: __auto
          range: true
          refId: A
      title: Garbage collections
      type: timeseries
    - datasource: ${datasource}
      description: 'Number of goroutines which are running in parallel. An infinitely

        growing number of these indicates a goroutine leak.'
      fieldConfig:
        defaults:
          unit: none
        overrides: []
      gridPos:
        h: 8
        w: 8
        x: 8
        y: 8
      id: 4
      targets:
        - datasource: ${datasource}
          expr: "sum by(${groupby}) (\n  go_goroutines{cluster=~\"$cluster\", namespace=~\"$namespace\", job=~\"$job\", instance=~\"$instance\"}\n  and on(instance)\n  alloy_build_info{cluster=~\"$cluster\", namespace=~\"$namespace\", job=~\"$job\", instance=~\"$instance\"}\n)"
          instant: false
          legendFormat: __auto
          range: true
          refId: A
      title: Goroutines
      type: timeseries
    - datasource: ${datasource}
      description: Heap memory currently in use by the Alloy process.
      fieldConfig:
        defaults:
          unit: decbytes
        overrides: []
      gridPos:
        h: 8
        w: 8
        x: 16
        y: 8
      id: 5
      targets:
        - datasource: ${datasource}
          expr: "sum by(${groupby}) (\n  go_memstats_heap_inuse_bytes{cluster=~\"$cluster\", namespace=~\"$namespace\", job=~\"$job\", instance=~\"$instance\"}\n  and on(instance)\n  alloy_build_info{cluster=~\"$cluster\", namespace=~\"$namespace\", job=~\"$job\", instance=~\"$instance\"}\n)"
          instant: false
          legendFormat: __auto
          range: true
          refId: A
      title: Memory (heap in use)
      type: timeseries
    - datasource: ${datasource}
      description: 'Rate of data received across all network interfaces for the machine

        Alloy is running on.

        Data shown here is across all running processes and not exclusive to

        the running Alloy process.'
      fieldConfig:
        defaults:
          custom:
            fillOpacity: 30
            gradientMode: none
            stacking:
              mode: normal
          unit: Bps
        overrides: []
      gridPos:
        h: 8
        w: 12
        x: 0
        y: 16
      id: 6
      targets:
        - datasource: ${datasource}
          expr: sum by(${groupby}) (rate(alloy_resources_machine_rx_bytes_total{cluster=~"$cluster", namespace=~"$namespace", job=~"$job", instance=~"$instance"}[$__rate_interval]))
          instant: false
          legendFormat: __auto
          range: true
          refId: A
      title: Network receive bandwidth
      type: timeseries
    - datasource: ${datasource}
      description: 'Rate of data sent across all network interfaces for the machine

        Alloy is running on.

        Data shown here is across all running processes and not exclusive to

        the running Alloy process.'
      fieldConfig:
        defaults:
          custom:
            fillOpacity: 30
            gradientMode: none
            stacking:
              mode: normal
          unit: Bps
        overrides: []
      gridPos:
        h: 8
        w: 12
        x: 12
        y: 16
      id: 7
      targets:
        - datasource: ${datasource}
          expr: sum by(${groupby}) (rate(alloy_resources_machine_tx_bytes_total{cluster=~"$cluster", namespace=~"$namespace", job=~"$job", instance=~"$instance"}[$__rate_interval]))
          instant: false
          legendFormat: __auto
          range: true
          refId: A
      title: Network send bandwidth
      type: timeseries
  refresh: 30s
  schemaVersion: 42
  tags:
    - alloy-integrations
  templating:
    list:
      - label: Data Source
        name: datasource
        options: []
        query: prometheus
        refresh: 1
        sort: 2
        type: datasource
      - label: Loki Data Source
        name: loki_datasource
        options: []
        query: loki
        refresh: 1
        sort: 2
        type: datasource
      - allowCustomValue: true
        datasource: ${datasource}
        label: cluster
        multi: true
        name: cluster
        options: []
        query:
          query: label_values(alloy_component_controller_running_components, cluster)
          refId: cluster
        refresh: 2
        sort: 1
        type: query
      - allowCustomValue: true
        datasource: ${datasource}
        label: namespace
        multi: true
        name: namespace
        options: []
        query:
          query: label_values(alloy_component_controller_running_components{cluster=~"$cluster"}, namespace)
          refId: namespace
        refresh: 2
        sort: 1
        type: query
      - allValue: .*
        datasource: ${datasource}
        includeAll: true
        label: job
        multi: true
        name: job
        options: []
        query:
          query: label_values(alloy_component_controller_running_components{cluster=~"$cluster", namespace=~"$namespace"}, job)
          refId: job
        refresh: 2
        sort: 1
        type: query
      - allValue: .*
        datasource: ${datasource}
        includeAll: true
        label: instance
        multi: true
        name: instance
        options: []
        query:
          query: label_values(alloy_component_controller_running_components{cluster=~"$cluster", namespace=~"$namespace", job=~"$job"}, instance)
          refId: instance
        refresh: 2
        sort: 1
        type: query
      - datasource:
          type: prometheus
          uid: ${datasource}
        name: filters
        type: adhoc
      - allowCustomValue: true
        current:
          selected: true
          text: instance
          value: instance
        label: Group by
        name: groupby
        query: instance,job,namespace,cluster,pod
        type: custom
  time:
    from: now-1h
    to: now
  timepicker:
    refresh_intervals:
      - 5s
      - 10s
      - 30s
      - 1m
      - 5m
      - 15m
      - 30m
      - 1h
      - 2h
      - 1d
  timezone: utc
  title: Alloy / Resources
  uid: resources
