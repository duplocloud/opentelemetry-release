apiVersion: grizzly.grafana.com/v1alpha1
kind: Dashboard
metadata:
  folder: integration-alloy
  name: controller
spec:
  annotations:
    list:
      - builtIn: 1
        datasource:
          type: grafana
          uid: -- Grafana --
        enable: true
        hide: true
        iconColor: rgba(0, 211, 255, 1)
        name: Annotations & Alerts
        type: dashboard
      - datasource: $loki_datasource
        enable: true
        expr: '{cluster=~"$cluster", container="kube-diff-logger"} | json | namespace_extracted="alloy" | name_extracted=~"alloy.*"'
        iconColor: rgba(0, 211, 255, 1)
        instant: false
        name: Deployments
        titleFormat: '{{cluster}}/{{namespace}}'
  editable: false
  graphTooltip: 1
  links:
    - icon: doc
      targetBlank: true
      title: Documentation
      tooltip: Component controller documentation
      type: link
      url: https://grafana.com/docs/alloy/latest/concepts/component_controller/
    - asDropdown: true
      icon: external link
      includeVars: true
      keepTime: true
      tags:
        - alloy-integrations
      targetBlank: false
      title: Dashboards
      type: dashboards
  panels:
    - datasource: ${datasource}
      description: The number of Alloy instances whose metrics are being sent and reported.
      fieldConfig:
        defaults:
          unit: instances
        overrides: []
      gridPos:
        h: 4
        w: 10
        x: 0
        y: 0
      id: 1
      options:
        colorMode: none
        graphMode: none
      targets:
        - datasource: ${datasource}
          expr: count(group(alloy_component_controller_running_components{cluster=~"$cluster", namespace=~"$namespace", job=~"$job"}) by (instance))
          instant: false
          legendFormat: __auto
          range: true
          refId: A
      title: Running instances
      type: stat
    - datasource: ${datasource}
      description: 'Breakdown of components by health across all running instances.

        * Healthy: components have been evaluated completely and are reporting themselves as healthy.

        * Unhealthy: Components either could not be evaluated or are reporting themselves as unhealthy.

        * Unknown: A component has been created but has not yet been started.

        * Exited: A component has exited. It will not return to the running state.

        More information on a component''s health state can be retrieved using

        the Alloy UI.

        Note that components may be in a degraded state even if they report

        themselves as healthy. Use component-specific dashboards and alerts

        to observe detailed information about the behavior of a component.'
      fieldConfig:
        defaults:
          min: 0
          thresholds:
            mode: absolute
            steps:
              - color: green
        overrides:
          - matcher:
              id: byName
              options: Unhealthy
            properties:
              - id: thresholds
                value:
                  mode: absolute
                  steps:
                    - color: green
                    - color: red
                      value: 1
          - matcher:
              id: byName
              options: Unknown
            properties:
              - id: thresholds
                value:
                  mode: absolute
                  steps:
                    - color: green
                    - color: blue
                      value: 1
          - matcher:
              id: byName
              options: Exited
            properties:
              - id: thresholds
                value:
                  mode: absolute
                  steps:
                    - color: green
                    - color: orange
                      value: 1
      gridPos:
        h: 12
        w: 14
        x: 10
        y: 0
      id: 4
      options:
        orientation: vertical
        showUnfilled: true
      targets:
        - datasource: ${datasource}
          expr: sum(alloy_component_controller_running_components{cluster=~"$cluster", namespace=~"$namespace", job=~"$job", health_type="healthy"}) or vector(0)
          instant: true
          legendFormat: Healthy
          range: false
          refId: A
        - datasource: ${datasource}
          expr: sum(alloy_component_controller_running_components{cluster=~"$cluster", namespace=~"$namespace", job=~"$job", health_type="unhealthy"}) or vector(0)
          instant: true
          legendFormat: Unhealthy
          range: false
          refId: B
        - datasource: ${datasource}
          expr: sum(alloy_component_controller_running_components{cluster=~"$cluster", namespace=~"$namespace", job=~"$job", health_type="unknown"}) or vector(0)
          instant: true
          legendFormat: Unknown
          range: false
          refId: C
        - datasource: ${datasource}
          expr: sum(alloy_component_controller_running_components{cluster=~"$cluster", namespace=~"$namespace", job=~"$job", health_type="exited"}) or vector(0)
          instant: true
          legendFormat: Exited
          range: false
          refId: D
      title: Components by health
      type: bargauge
    - datasource: ${datasource}
      description: The number of running components across all running instances.
      fieldConfig:
        defaults:
          unit: components
        overrides: []
      gridPos:
        h: 4
        w: 10
        x: 0
        y: 4
      id: 2
      options:
        colorMode: none
        graphMode: none
      targets:
        - datasource: ${datasource}
          expr: sum(alloy_component_controller_running_components{cluster=~"$cluster", namespace=~"$namespace", job=~"$job"})
          instant: false
          legendFormat: __auto
          range: true
          refId: A
      title: Running components
      type: stat
    - datasource: ${datasource}
      description: The percentage of components which are in a healthy state.
      fieldConfig:
        defaults:
          max: 1
          min: 0
          noValue: No components
          unit: percentunit
        overrides: []
      gridPos:
        h: 4
        w: 10
        x: 0
        y: 8
      id: 3
      options:
        colorMode: value
        graphMode: area
        text:
          valueSize: 80
      pluginVersion: 9.0.6
      targets:
        - datasource: ${datasource}
          expr: 'sum(alloy_component_controller_running_components{cluster=~"$cluster", namespace=~"$namespace", job=~"$job",health_type="healthy"}) /

            sum(alloy_component_controller_running_components{cluster=~"$cluster", namespace=~"$namespace", job=~"$job"})'
          instant: false
          legendFormat: __auto
          range: true
          refId: A
      title: Overall component health
      type: stat
    - datasource: ${datasource}
      description: The frequency at which components get updated.
      fieldConfig:
        defaults:
          custom:
            drawStyle: points
            pointSize: 3
          unit: ops
        overrides: []
      gridPos:
        h: 10
        w: 8
        x: 0
        y: 12
      id: 5
      options:
        tooltip:
          mode: multi
      targets:
        - datasource: ${datasource}
          expr: sum by (${groupby}) (rate(alloy_component_evaluation_seconds_count{cluster=~"$cluster", namespace=~"$namespace", job=~"$job"}[$__rate_interval]))
          instant: false
          legendFormat: __auto
          range: true
          refId: A
      title: Component evaluation rate
      type: timeseries
    - datasource: ${datasource}
      description: 'The percentiles for how long it takes to complete component evaluations.

        Component evaluations must complete for components to have the latest

        arguments. The longer the evaluations take, the slower it will be to

        reconcile the state of components.

        If evaluation is taking too long, consider sharding your components to

        deal with smaller amounts of data and reuse data as much as possible.'
      fieldConfig:
        defaults:
          unit: s
        overrides: []
      gridPos:
        h: 10
        w: 8
        x: 8
        y: 12
      id: 6
      targets:
        - datasource: ${datasource}
          expr: 'histogram_quantile(0.99, sum(rate(alloy_component_evaluation_seconds{cluster=~"$cluster", namespace=~"$namespace", job=~"$job"}[$__rate_interval])))

            or

            histogram_quantile(0.99, sum by (le) (rate(alloy_component_evaluation_seconds_bucket{cluster=~"$cluster", namespace=~"$namespace", job=~"$job"}[$__rate_interval])))'
          instant: false
          legendFormat: 99th percentile
          range: true
          refId: A
        - datasource: ${datasource}
          expr: 'histogram_quantile(0.50, sum(rate(alloy_component_evaluation_seconds{cluster=~"$cluster", namespace=~"$namespace", job=~"$job"}[$__rate_interval])))

            or

            histogram_quantile(0.50, sum by (le) (rate(alloy_component_evaluation_seconds_bucket{cluster=~"$cluster", namespace=~"$namespace", job=~"$job"}[$__rate_interval])))'
          instant: false
          legendFormat: 50th percentile
          range: true
          refId: B
        - datasource: ${datasource}
          expr: "(\n  histogram_sum(sum(rate(alloy_component_evaluation_seconds{cluster=~\"$cluster\", namespace=~\"$namespace\", job=~\"$job\"}[$__rate_interval]))) /\n  histogram_count(sum(rate(alloy_component_evaluation_seconds{cluster=~\"$cluster\", namespace=~\"$namespace\", job=~\"$job\"}[$__rate_interval])))\n)\nor\n(\n  sum(rate(alloy_component_evaluation_seconds_sum{cluster=~\"$cluster\", namespace=~\"$namespace\", job=~\"$job\"}[$__rate_interval])) /\n  sum(rate(alloy_component_evaluation_seconds_count{cluster=~\"$cluster\", namespace=~\"$namespace\", job=~\"$job\"}[$__rate_interval]))\n)"
          instant: false
          legendFormat: Average
          range: true
          refId: C
      title: Component evaluation time
      type: timeseries
    - datasource: ${datasource}
      description: "The maximum duration of slow component evaluations over time.\nThis shows components that took longer than 1 minute to evaluate. Ideally, no component \nshould take more than 1 minute to evaluate. The components displayed in this chart\nmay be a sign of a problem with the pipeline or performance issues."
      fieldConfig:
        defaults:
          unit: s
        overrides: []
      gridPos:
        h: 10
        w: 8
        x: 16
        y: 12
      id: 7
      targets:
        - datasource: ${datasource}
          expr: increase(alloy_component_evaluation_slow_seconds{cluster=~"$cluster", namespace=~"$namespace", job=~"$job"}[$__rate_interval])
          instant: false
          legendFormat: '{{instance}} {{controller_path}} {{component_id}}'
          range: true
          refId: A
      title: Slow components evaluation times
      type: timeseries
    - datasource: ${datasource}
      description: 'Detailed histogram view of how long component evaluations take.

        The goal is to design your config so that evaluations take as little

        time as possible; under 100ms is a good goal.'
      gridPos:
        h: 10
        w: 8
        x: 0
        y: 22
      id: 8
      maxDataPoints: 30
      options:
        calculate: false
        cellGap: 0
        color:
          scheme: Spectral
        exemplars:
          color: rgba(255,0,255,0.7)
        filterValues:
          le: 0.1
        tooltip:
          show: true
          yHistogram: true
        yAxis:
          unit: s
      pluginVersion: 9.0.6
      targets:
        - datasource: ${datasource}
          expr: 'sum(increase(alloy_component_evaluation_seconds{cluster=~"$cluster", namespace=~"$namespace", job=~"$job"}[$__rate_interval]))

            or ignoring (le)

            sum by (le) (increase(alloy_component_evaluation_seconds_bucket{cluster=~"$cluster", namespace=~"$namespace", job=~"$job"}[$__rate_interval]))'
          format: heatmap
          instant: false
          legendFormat: '{{le}}'
          range: true
          refId: A
      title: Component evaluation histogram
      type: heatmap
    - datasource: ${datasource}
      description: 'Detailed histogram of how long components wait to be evaluated after their dependency is updated.

        The goal is to design your config so that most of the time components do not

        queue for long; under 10ms is a good goal.'
      gridPos:
        h: 10
        w: 8
        x: 8
        y: 22
      id: 9
      maxDataPoints: 30
      options:
        calculate: false
        cellGap: 0
        color:
          scheme: Spectral
        exemplars:
          color: rgba(255,0,255,0.7)
        filterValues:
          le: 0.1
        tooltip:
          show: true
          yHistogram: true
        yAxis:
          unit: s
      pluginVersion: 9.0.6
      targets:
        - datasource: ${datasource}
          expr: 'sum(increase(alloy_component_dependencies_wait_seconds{cluster=~"$cluster", namespace=~"$namespace", job=~"$job"}[$__rate_interval]))

            or ignoring (le)

            sum by (le) (increase(alloy_component_dependencies_wait_seconds_bucket{cluster=~"$cluster", namespace=~"$namespace", job=~"$job"}[$__rate_interval]))'
          format: heatmap
          instant: false
          legendFormat: '{{le}}'
          range: true
          refId: A
      title: Component dependency wait histogram
      type: heatmap
  refresh: 30s
  schemaVersion: 42
  tags:
    - alloy-integrations
  templating:
    list:
      - label: Data Source
        name: datasource
        options: []
        query: prometheus
        refresh: 1
        sort: 2
        type: datasource
      - label: Loki Data Source
        name: loki_datasource
        options: []
        query: loki
        refresh: 1
        sort: 2
        type: datasource
      - allowCustomValue: true
        datasource: ${datasource}
        label: cluster
        multi: true
        name: cluster
        options: []
        query:
          query: label_values(alloy_component_controller_running_components, cluster)
          refId: cluster
        refresh: 2
        sort: 1
        type: query
      - allowCustomValue: true
        datasource: ${datasource}
        label: namespace
        multi: true
        name: namespace
        options: []
        query:
          query: label_values(alloy_component_controller_running_components{cluster=~"$cluster"}, namespace)
          refId: namespace
        refresh: 2
        sort: 1
        type: query
      - allValue: .*
        datasource: ${datasource}
        includeAll: true
        label: job
        multi: true
        name: job
        options: []
        query:
          query: label_values(alloy_component_controller_running_components{cluster=~"$cluster", namespace=~"$namespace"}, job)
          refId: job
        refresh: 2
        sort: 1
        type: query
      - datasource:
          type: prometheus
          uid: ${datasource}
        name: filters
        type: adhoc
      - allowCustomValue: true
        current:
          selected: true
          text: instance
          value: instance
        label: Group by
        name: groupby
        query: instance,component_path,component_id,controller_path,health_type,job,namespace,cluster,pod
        type: custom
  time:
    from: now-1h
    to: now
  timepicker:
    refresh_intervals:
      - 5s
      - 10s
      - 30s
      - 1m
      - 5m
      - 15m
      - 30m
      - 1h
      - 2h
      - 1d
  timezone: utc
  title: Alloy / Controller
  uid: controller
