apiVersion: grizzly.grafana.com/v1alpha1
kind: Dashboard
metadata:
  folder: integration-alloy
  name: prometheus-components
spec:
  annotations:
    list:
      - builtIn: 1
        datasource:
          type: grafana
          uid: -- Grafana --
        enable: true
        hide: true
        iconColor: rgba(0, 211, 255, 1)
        name: Annotations & Alerts
        type: dashboard
      - datasource: $loki_datasource
        enable: true
        expr: '{cluster=~"$cluster", container="kube-diff-logger"} | json | namespace_extracted="alloy" | name_extracted=~"alloy.*"'
        iconColor: rgba(0, 211, 255, 1)
        instant: false
        name: Deployments
        titleFormat: '{{cluster}}/{{namespace}}'
  editable: false
  graphTooltip: 1
  links:
    - icon: doc
      targetBlank: true
      title: Documentation
      tooltip: Component documentation
      type: link
      url: https://grafana.com/docs/alloy/latest/reference/components/prometheus.remote_write/
    - asDropdown: true
      icon: external link
      includeVars: true
      keepTime: true
      tags:
        - alloy-integrations
      targetBlank: false
      title: Dashboards
      type: dashboards
  panels:
    - collapsed: false
      datasource: ${datasource}
      gridPos:
        h: 1
        w: 24
        x: 0
        y: 0
      id: 1
      title: prometheus.scrape
      type: row
    - datasource: ${datasource}
      description: 'Percentage of targets successfully scraped in the selected

        cluster and job.

        Low success rates can indicate a problem with scrape targets,

        stale service discovery, or Alloy misconfiguration.'
      fieldConfig:
        defaults:
          unit: percentunit
        overrides: []
      gridPos:
        h: 10
        w: 12
        x: 0
        y: 1
      id: 2
      targets:
        - datasource: ${datasource}
          expr: 'sum(up{job=~"$job", cluster=~"$cluster"})

            /

            count (up{job=~"$job", cluster=~"$cluster"})'
          instant: false
          legendFormat: '% of targets successfully scraped'
          range: true
          refId: A
      title: Scrape success rate
      type: timeseries
    - datasource: ${datasource}
      description: 'Duration of scrapes for the selected cluster and job,

        shown as p99, p95, and p50 quantiles.

        This metric should be below your configured scrape interval.

        High durations can indicate a problem with a scrape target or

        a performance issue with Alloy.'
      fieldConfig:
        defaults:
          unit: s
        overrides: []
      gridPos:
        h: 10
        w: 12
        x: 12
        y: 1
      id: 3
      targets:
        - datasource: ${datasource}
          expr: quantile(0.99, scrape_duration_seconds{job=~"$job", cluster=~"$cluster"})
          instant: false
          legendFormat: p99
          range: true
          refId: A
        - datasource: ${datasource}
          expr: quantile(0.95, scrape_duration_seconds{job=~"$job", cluster=~"$cluster"})
          instant: false
          legendFormat: p95
          range: true
          refId: B
        - datasource: ${datasource}
          expr: quantile(0.50, scrape_duration_seconds{job=~"$job", cluster=~"$cluster"})
          instant: false
          legendFormat: p50
          range: true
          refId: C
      title: Scrape duration
      type: timeseries
    - collapsed: false
      datasource: ${datasource}
      gridPos:
        h: 1
        w: 24
        x: 0
        y: 11
      id: 4
      title: prometheus.remote_write
      type: row
    - datasource: ${datasource}
      description: 'Percentage of samples sent by prometheus.remote_write that succeeded.

        Low success rates can indicate a problem with Alloy or the remote storage.'
      fieldConfig:
        defaults:
          unit: percentunit
        overrides: []
      gridPos:
        h: 10
        w: 12
        x: 0
        y: 12
      id: 5
      targets:
        - datasource: ${datasource}
          expr: "(\n    1 - \n    (\n        sum(rate(prometheus_remote_storage_samples_failed_total{cluster=~\"$cluster\", namespace=~\"$namespace\", job=~\"$job\", instance=~\"$instance\", component_path=~\"$component_path\", component_id=~\"$component\", url=~\"$url\"}[$__rate_interval]))\n    )\n    /\n    (\n        sum(rate(prometheus_remote_storage_samples_total{cluster=~\"$cluster\", namespace=~\"$namespace\", job=~\"$job\", instance=~\"$instance\", component_path=~\"$component_path\", component_id=~\"$component\", url=~\"$url\"}[$__rate_interval]))\n    )\n)"
          instant: false
          legendFormat: '% of samples successfully sent'
          range: true
          refId: A
      title: Remote write success rate in $cluster
      type: timeseries
    - datasource: ${datasource}
      description: 'Latency of writes to the remote system made by

        prometheus.remote_write.'
      fieldConfig:
        defaults:
          unit: s
        overrides: []
      gridPos:
        h: 10
        w: 12
        x: 12
        y: 12
      id: 6
      targets:
        - datasource: ${datasource}
          expr: "histogram_quantile(0.99, sum by (le) (\n  rate(prometheus_remote_storage_sent_batch_duration_seconds_bucket{cluster=~\"$cluster\", namespace=~\"$namespace\", job=~\"$job\", instance=~\"$instance\", component_path=~\"$component_path\", component_id=~\"$component\", url=~\"$url\"}[$__rate_interval])\n))"
          instant: false
          legendFormat: 99th percentile
          range: true
          refId: A
        - datasource: ${datasource}
          expr: "histogram_quantile(0.50, sum by (le) (\n  rate(prometheus_remote_storage_sent_batch_duration_seconds_bucket{cluster=~\"$cluster\", namespace=~\"$namespace\", job=~\"$job\", instance=~\"$instance\", component_path=~\"$component_path\", component_id=~\"$component\", url=~\"$url\"}[$__rate_interval])\n))"
          instant: false
          legendFormat: 50th percentile
          range: true
          refId: B
        - datasource: ${datasource}
          expr: 'sum(rate(prometheus_remote_storage_sent_batch_duration_seconds_sum{cluster=~"$cluster", namespace=~"$namespace", job=~"$job", instance=~"$instance", component_path=~"$component_path", component_id=~"$component"}[$__rate_interval])) /

            sum(rate(prometheus_remote_storage_sent_batch_duration_seconds_count{cluster=~"$cluster", namespace=~"$namespace", job=~"$job", instance=~"$instance", component_path=~"$component_path", component_id=~"$component"}[$__rate_interval]))'
          instant: false
          legendFormat: Average
          range: true
          refId: C
      title: Write latency in $cluster
      type: timeseries
    - datasource: ${datasource}
      description: 'How far behind prometheus.remote_write from samples recently written

        to the WAL.

        Each endpoint prometheus.remote_write is configured to send metrics

        has its own delay. The time shown here is the sum across all

        endpoints for the given component.

        It is normal for the WAL delay to be within 1-3 scrape intervals. If

        the WAL delay continues to increase beyond that amount, try

        increasing the number of maximum shards.'
      fieldConfig:
        defaults:
          unit: s
        overrides: []
      gridPos:
        h: 10
        w: 8
        x: 0
        y: 22
      id: 7
      targets:
        - datasource: ${datasource}
          expr: "sum by (${groupby}) (\n  (\n    prometheus_remote_storage_highest_timestamp_in_seconds{cluster=~\"$cluster\", namespace=~\"$namespace\", job=~\"$job\", instance=~\"$instance\", component_path=~\"$component_path\", component_id=~\"$component\"}\n    - ignoring(url, remote_name) group_right(instance)\n    prometheus_remote_storage_queue_highest_sent_timestamp_seconds{cluster=~\"$cluster\", namespace=~\"$namespace\", job=~\"$job\", instance=~\"$instance\", component_path=~\"$component_path\", component_id=~\"$component\", url=~\"$url\"}\n  ) < 31536000 > 0\n)"
          instant: false
          legendFormat: __auto
          range: true
          refId: A
      title: WAL delay
      type: timeseries
    - datasource: ${datasource}
      description: 'Rate of data containing samples and metadata sent by

        prometheus.remote_write.'
      fieldConfig:
        defaults:
          custom:
            fillOpacity: 20
            gradientMode: hue
            stacking:
              mode: normal
          unit: Bps
        overrides: []
      gridPos:
        h: 10
        w: 8
        x: 8
        y: 22
      id: 8
      targets:
        - datasource: ${datasource}
          expr: "sum by (${groupby}) (\n    rate(prometheus_remote_storage_bytes_total{cluster=~\"$cluster\", namespace=~\"$namespace\", job=~\"$job\", instance=~\"$instance\", component_path=~\"$component_path\", component_id=~\"$component\", url=~\"$url\"}[$__rate_interval]) +\n    rate(prometheus_remote_storage_metadata_bytes_total{cluster=~\"$cluster\", namespace=~\"$namespace\", job=~\"$job\", instance=~\"$instance\", component_path=~\"$component_path\", component_id=~\"$component\", url=~\"$url\"}[$__rate_interval])\n)"
          instant: false
          legendFormat: __auto
          range: true
          refId: A
      title: Data write throughput
      type: timeseries
    - datasource: ${datasource}
      description: 'Total number of shards which are concurrently sending samples read

        from the Write-Ahead Log.

        Shards are bound to a minimum and maximum, displayed on the graph.

        The lowest minimum and the highest maximum across all clients is

        shown.

        Each client has its own set of shards, minimum shards, and maximum

        shards; filter to a specific URL to display more granular

        information.'
      fieldConfig:
        defaults:
          unit: none
        overrides:
          - matcher:
              id: byName
              options: Minimum
            properties:
              - id: custom.lineStyle
                value:
                  dash:
                    - 10
                    - 15
                  fill: dash
              - id: custom.showPoints
                value: never
              - id: custom.hideFrom
                value:
                  legend: true
                  tooltip: false
                  viz: false
          - matcher:
              id: byName
              options: Maximum
            properties:
              - id: custom.lineStyle
                value:
                  dash:
                    - 10
                    - 15
                  fill: dash
              - id: custom.showPoints
                value: never
              - id: custom.hideFrom
                value:
                  legend: true
                  tooltip: false
                  viz: false
      gridPos:
        h: 10
        w: 8
        x: 16
        y: 22
      id: 9
      targets:
        - datasource: ${datasource}
          expr: "sum by (${groupby}) (\n    prometheus_remote_storage_shards{cluster=~\"$cluster\", namespace=~\"$namespace\", job=~\"$job\", instance=~\"$instance\", component_path=~\"$component_path\", component_id=~\"$component\", url=~\"$url\"}\n)"
          instant: false
          legendFormat: __auto
          range: true
          refId: A
        - datasource: ${datasource}
          expr: "min (\n    prometheus_remote_storage_shards_min{cluster=~\"$cluster\", namespace=~\"$namespace\", job=~\"$job\", instance=~\"$instance\", component_path=~\"$component_path\", component_id=~\"$component\", url=~\"$url\"}\n)"
          instant: false
          legendFormat: Minimum
          range: true
          refId: B
        - datasource: ${datasource}
          expr: "max (\n    prometheus_remote_storage_shards_max{cluster=~\"$cluster\", namespace=~\"$namespace\", job=~\"$job\", instance=~\"$instance\", component_path=~\"$component_path\", component_id=~\"$component\", url=~\"$url\"}\n)"
          instant: false
          legendFormat: Maximum
          range: true
          refId: C
      title: Shards
      type: timeseries
    - datasource: ${datasource}
      description: Total outgoing samples sent by prometheus.remote_write.
      fieldConfig:
        defaults:
          custom:
            fillOpacity: 20
            gradientMode: hue
            stacking:
              mode: normal
          unit: cps
        overrides: []
      gridPos:
        h: 10
        w: 8
        x: 0
        y: 32
      id: 10
      targets:
        - datasource: ${datasource}
          expr: "sum by (${groupby}) (\n  rate(prometheus_remote_storage_samples_total{cluster=~\"$cluster\", namespace=~\"$namespace\", job=~\"$job\", instance=~\"$instance\", component_path=~\"$component_path\", component_id=~\"$component\", url=~\"$url\"}[$__rate_interval])\n)"
          instant: false
          legendFormat: __auto
          range: true
          refId: A
      title: Sent samples / second
      type: timeseries
    - datasource: ${datasource}
      description: 'Rate of samples which prometheus.remote_write could not send due to

        non-recoverable errors.'
      fieldConfig:
        defaults:
          custom:
            fillOpacity: 20
            gradientMode: hue
            stacking:
              mode: normal
          unit: cps
        overrides: []
      gridPos:
        h: 10
        w: 8
        x: 8
        y: 32
      id: 11
      targets:
        - datasource: ${datasource}
          expr: "sum by (${groupby}) (\n  rate(prometheus_remote_storage_samples_failed_total{cluster=~\"$cluster\", namespace=~\"$namespace\", job=~\"$job\", instance=~\"$instance\", component_path=~\"$component_path\", component_id=~\"$component\", url=~\"$url\"}[$__rate_interval])\n)"
          instant: false
          legendFormat: __auto
          range: true
          refId: A
      title: Failed samples / second
      type: timeseries
    - datasource: ${datasource}
      description: 'Rate of samples which prometheus.remote_write attempted to resend

        after receiving a recoverable error.'
      fieldConfig:
        defaults:
          custom:
            fillOpacity: 20
            gradientMode: hue
            stacking:
              mode: normal
          unit: cps
        overrides: []
      gridPos:
        h: 10
        w: 8
        x: 16
        y: 32
      id: 12
      targets:
        - datasource: ${datasource}
          expr: "sum by (${groupby}) (\n  rate(prometheus_remote_storage_samples_retried_total{cluster=~\"$cluster\", namespace=~\"$namespace\", job=~\"$job\", instance=~\"$instance\", component_path=~\"$component_path\", component_id=~\"$component\", url=~\"$url\"}[$__rate_interval])\n)"
          instant: false
          legendFormat: __auto
          range: true
          refId: A
      title: Retried samples / second
      type: timeseries
    - datasource: ${datasource}
      description: 'Total number of active series across all components.

        An "active series" is a series that prometheus.remote_write recently

        received a sample for. Active series are garbage collected whenever a

        truncation of the WAL occurs.

        NOTE: This metric is not available when using prometheus.write.queue component.'
      fieldConfig:
        defaults:
          unit: short
        overrides: []
      gridPos:
        h: 10
        w: 8
        x: 0
        y: 42
      id: 13
      options:
        legend:
          displayMode: list
          showLegend: false
      targets:
        - datasource: ${datasource}
          expr: sum(prometheus_remote_write_wal_storage_active_series{cluster=~"$cluster", namespace=~"$namespace", job=~"$job", instance=~"$instance", component_path=~"$component_path", component_id=~"$component", url=~"$url"})
          instant: false
          legendFormat: Series
          range: true
          refId: A
      title: Active series (total)
      type: timeseries
    - datasource: ${datasource}
      description: 'Total number of active series which are currently being tracked by

        prometheus.remote_write components, with separate lines for each Alloy instance.

        An "active series" is a series that prometheus.remote_write recently

        received a sample for. Active series are garbage collected whenever a

        truncation of the WAL occurs.

        NOTE: This metric is not available when using prometheus.write.queue component.'
      fieldConfig:
        defaults:
          unit: short
        overrides: []
      gridPos:
        h: 10
        w: 8
        x: 8
        y: 42
      id: 14
      targets:
        - datasource: ${datasource}
          expr: prometheus_remote_write_wal_storage_active_series{cluster=~"$cluster", namespace=~"$namespace", job=~"$job", instance=~"$instance", component_id!="", component_path=~"$component_path", component_id=~"$component", url=~"$url"}
          instant: false
          legendFormat: '{{instance}} / {{component_path}} {{component_id}}'
          range: true
          refId: A
      title: Active series (by instance/component)
      type: timeseries
    - datasource: ${datasource}
      description: 'Total number of active series which are currently being tracked by

        prometheus.remote_write components, aggregated across all instances.

        An "active series" is a series that prometheus.remote_write recently

        received a sample for. Active series are garbage collected whenever a

        truncation of the WAL occurs.

        NOTE: This metric is not available when using prometheus.write.queue component.'
      fieldConfig:
        defaults:
          unit: short
        overrides: []
      gridPos:
        h: 10
        w: 8
        x: 16
        y: 42
      id: 15
      targets:
        - datasource: ${datasource}
          expr: sum by (component_path, component_id) (prometheus_remote_write_wal_storage_active_series{cluster=~"$cluster", namespace=~"$namespace", job=~"$job", instance=~"$instance", component_id!="", component_path=~"$component_path", component_id=~"$component", url=~"$url"})
          instant: false
          legendFormat: '{{component_path}} {{component_id}}'
          range: true
          refId: A
      title: Active series (by component)
      type: timeseries
  refresh: 30s
  schemaVersion: 42
  tags:
    - alloy-integrations
  templating:
    list:
      - label: Data Source
        name: datasource
        options: []
        query: prometheus
        refresh: 1
        sort: 2
        type: datasource
      - label: Loki Data Source
        name: loki_datasource
        options: []
        query: loki
        refresh: 1
        sort: 2
        type: datasource
      - allowCustomValue: true
        datasource: ${datasource}
        label: cluster
        multi: true
        name: cluster
        options: []
        query:
          query: label_values(alloy_component_controller_running_components, cluster)
          refId: cluster
        refresh: 2
        sort: 1
        type: query
      - allowCustomValue: true
        datasource: ${datasource}
        label: namespace
        multi: true
        name: namespace
        options: []
        query:
          query: label_values(alloy_component_controller_running_components{cluster=~"$cluster"}, namespace)
          refId: namespace
        refresh: 2
        sort: 1
        type: query
      - allValue: .*
        datasource: ${datasource}
        includeAll: true
        label: job
        multi: true
        name: job
        options: []
        query:
          query: label_values(alloy_component_controller_running_components{cluster=~"$cluster", namespace=~"$namespace"}, job)
          refId: job
        refresh: 2
        sort: 1
        type: query
      - allValue: .*
        datasource: ${datasource}
        includeAll: true
        label: instance
        multi: true
        name: instance
        options: []
        query:
          query: label_values(alloy_component_controller_running_components{cluster=~"$cluster", namespace=~"$namespace", job=~"$job"}, instance)
          refId: instance
        refresh: 2
        sort: 1
        type: query
      - datasource:
          type: prometheus
          uid: ${datasource}
        name: filters
        type: adhoc
      - allValue: .*
        datasource: ${datasource}
        includeAll: true
        label: component_path
        multi: true
        name: component_path
        options: []
        query:
          query: label_values(prometheus_remote_write_wal_samples_appended_total{cluster=~"$cluster", namespace=~"$namespace", job=~"$job", instance=~"$instance", component_id=~"prometheus.remote_write.*", component_path=~".*"}, component_path)
          refId: component_path
        refresh: 2
        sort: 1
        type: query
      - allValue: .*
        datasource: ${datasource}
        includeAll: true
        label: component
        multi: true
        name: component
        options: []
        query:
          query: label_values(prometheus_remote_write_wal_samples_appended_total{cluster=~"$cluster", namespace=~"$namespace", job=~"$job", instance=~"$instance", component_id=~"prometheus.remote_write.*"}, component_id)
          refId: component
        refresh: 2
        sort: 1
        type: query
      - allValue: .*
        datasource: ${datasource}
        includeAll: true
        label: url
        multi: true
        name: url
        options: []
        query:
          query: label_values(prometheus_remote_storage_sent_batch_duration_seconds_sum{cluster=~"$cluster", namespace=~"$namespace", job=~"$job", instance=~"$instance", component_id=~"$component"}, url)
          refId: url
        refresh: 2
        sort: 1
        type: query
      - allowCustomValue: true
        current:
          selected: true
          text: instance,component_path,component_id
          value: instance,component_path,component_id
        label: Group by
        name: groupby
        query: instance,component_path,component_id,url,remote_name,job,namespace,cluster,pod
        type: custom
  time:
    from: now-1h
    to: now
  timepicker:
    refresh_intervals:
      - 5s
      - 10s
      - 30s
      - 1m
      - 5m
      - 15m
      - 30m
      - 1h
      - 2h
      - 1d
  timezone: utc
  title: Alloy / Prometheus Components
  uid: prometheus-components
