apiVersion: grizzly.grafana.com/v1alpha1
kind: Dashboard
metadata:
  folder: integration-alloy
  name: loki-components
spec:
  annotations:
    list:
      - builtIn: 1
        datasource:
          type: grafana
          uid: -- Grafana --
        enable: true
        hide: true
        iconColor: rgba(0, 211, 255, 1)
        name: Annotations & Alerts
        type: dashboard
      - datasource: $loki_datasource
        enable: true
        expr: '{cluster=~"$cluster", container="kube-diff-logger"} | json | namespace_extracted="alloy" | name_extracted=~"alloy.*"'
        iconColor: rgba(0, 211, 255, 1)
        instant: false
        name: Deployments
        titleFormat: '{{cluster}}/{{namespace}}'
  editable: false
  graphTooltip: 1
  links:
    - icon: doc
      targetBlank: true
      title: Documentation
      tooltip: Loki components documentation
      type: link
      url: https://grafana.com/docs/alloy/latest/reference/components/loki.write/
    - asDropdown: true
      icon: external link
      includeVars: true
      keepTime: true
      tags:
        - alloy-integrations
      targetBlank: false
      title: Dashboards
      type: dashboards
  panels:
    - collapsed: false
      datasource: ${datasource}
      gridPos:
        h: 1
        w: 24
        x: 0
        y: 0
      id: 1
      title: loki.source.file
      type: row
    - datasource: ${datasource}
      description: Active files being tailed.
      fieldConfig:
        defaults:
          custom:
            fillOpacity: 20
            gradientMode: hue
            stacking:
              mode: normal
          unit: files
        overrides: []
      gridPos:
        h: 10
        w: 12
        x: 0
        y: 1
      id: 2
      targets:
        - datasource: ${datasource}
          expr: sum by(${groupby}) (loki_source_file_files_active_total{cluster=~"$cluster", namespace=~"$namespace", job=~"$job", instance=~"$instance"})
          instant: false
          legendFormat: __auto
          range: true
          refId: A
      title: Active Files
      type: timeseries
    - datasource: ${datasource}
      description: Successful file reads.
      fieldConfig:
        defaults:
          custom:
            fillOpacity: 20
            gradientMode: hue
            stacking:
              mode: normal
          unit: cps
        overrides: []
      gridPos:
        h: 10
        w: 12
        x: 12
        y: 1
      id: 3
      targets:
        - datasource: ${datasource}
          expr: sum by (${groupby}) (rate(loki_source_file_read_lines_total{cluster=~"$cluster", namespace=~"$namespace", job=~"$job", instance=~"$instance"}[$__rate_interval]))
          instant: false
          legendFormat: __auto
          range: true
          refId: A
      title: Lines Read
      type: timeseries
    - collapsed: false
      datasource: ${datasource}
      gridPos:
        h: 1
        w: 24
        x: 0
        y: 11
      id: 4
      title: loki.source.journal
      type: row
    - datasource: ${datasource}
      description: Successful journal reads.
      fieldConfig:
        defaults:
          custom:
            fillOpacity: 20
            gradientMode: hue
            stacking:
              mode: normal
          unit: cps
        overrides: []
      gridPos:
        h: 10
        w: 12
        x: 0
        y: 12
      id: 5
      targets:
        - datasource: ${datasource}
          expr: sum by (${groupby}) (rate(loki_source_journal_target_lines_total{cluster=~"$cluster", namespace=~"$namespace", job=~"$job", instance=~"$instance"}[$__rate_interval]))
          instant: false
          legendFormat: __auto
          range: true
          refId: A
      title: Journal Lines Read
      type: timeseries
    - collapsed: false
      datasource: ${datasource}
      gridPos:
        h: 1
        w: 24
        x: 0
        y: 22
      id: 6
      title: loki.write
      type: row
    - datasource: ${datasource}
      description: Percentage of logs sent by loki.write that succeeded.
      fieldConfig:
        defaults:
          max: 100
          unit: '%'
        overrides: []
      gridPos:
        h: 10
        w: 12
        x: 0
        y: 23
      id: 7
      targets:
        - datasource: ${datasource}
          expr: 'sum by(${groupby}) (rate(loki_write_request_duration_seconds_bucket{cluster=~"$cluster", namespace=~"$namespace", job=~"$job", instance=~"$instance", status_code=~"2..", host=~"$url"}[$__rate_interval]))

            /

            sum by(${groupby}) (rate(loki_write_request_duration_seconds_bucket{cluster=~"$cluster", namespace=~"$namespace", job=~"$job", instance=~"$instance", host=~"$url"}[$__rate_interval])) * 100'
          instant: false
          legendFormat: __auto
          range: true
          refId: A
      title: Write Request Success Rate
      type: timeseries
    - datasource: ${datasource}
      description: Bytes sent per second.
      fieldConfig:
        defaults:
          custom:
            fillOpacity: 20
            gradientMode: hue
            stacking:
              mode: normal
          unit: Bps
        overrides: []
      gridPos:
        h: 10
        w: 12
        x: 0
        y: 23
      id: 9
      targets:
        - datasource: ${datasource}
          expr: sum by (${groupby}) (rate(loki_write_sent_bytes_total{cluster=~"$cluster", namespace=~"$namespace", job=~"$job", instance=~"$instance", host=~"$url"}[$__rate_interval]))
          instant: false
          legendFormat: __auto
          range: true
          refId: A
      title: Bytes Sent
      type: timeseries
    - datasource: ${datasource}
      description: Shows distribution of write request sizes over time.
      gridPos:
        h: 10
        w: 12
        x: 0
        y: 23
      id: 11
      maxDataPoints: 30
      options:
        calculate: false
        cellGap: 0
        color:
          scheme: Spectral
        exemplars:
          color: rgba(255,0,255,0.7)
        filterValues:
          le: 0.1
        tooltip:
          show: true
          yHistogram: true
        yAxis:
          unit: bytes
      pluginVersion: 9.0.6
      targets:
        - datasource: ${datasource}
          expr: 'sum(increase(loki_write_request_size_bytes{cluster=~"$cluster", namespace=~"$namespace", job=~"$job", instance=~"$instance"}[$__rate_interval]))

            or ignoring (le)

            sum by (le) (increase(loki_write_request_size_bytes_bucket{cluster=~"$cluster", namespace=~"$namespace", job=~"$job", instance=~"$instance"}[$__rate_interval]))'
          format: heatmap
          instant: false
          legendFormat: '{{le}}'
          range: true
          refId: A
      title: Write Request Size Distribution
      type: heatmap
    - datasource: ${datasource}
      description: Percentile write latency.
      fieldConfig:
        defaults:
          unit: s
        overrides: []
      gridPos:
        h: 10
        w: 12
        x: 12
        y: 23
      id: 8
      targets:
        - datasource: ${datasource}
          expr: "histogram_quantile(\n  0.99,\n  sum by (le, ${groupby}) (\n\trate(loki_write_request_duration_seconds_bucket{cluster=~\"$cluster\", namespace=~\"$namespace\", job=~\"$job\", instance=~\"$instance\", host=~\"$url\"}[$__rate_interval])\n  )\n)"
          instant: false
          legendFormat: '{{${groupby}}} p99'
          range: true
          refId: A
        - datasource: ${datasource}
          expr: "histogram_quantile(\n  0.95,\n  sum by (le, ${groupby}) (\n\trate(loki_write_request_duration_seconds_bucket{cluster=~\"$cluster\", namespace=~\"$namespace\", job=~\"$job\", instance=~\"$instance\", host=~\"$url\"}[$__rate_interval])\n  )\n)"
          instant: false
          legendFormat: '{{${groupby}}} p95'
          range: true
          refId: B
        - datasource: ${datasource}
          expr: "histogram_quantile(\n  0.50,\n  sum by (le, ${groupby}) (\n\trate(loki_write_request_duration_seconds_bucket{cluster=~\"$cluster\", namespace=~\"$namespace\", job=~\"$job\", instance=~\"$instance\", host=~\"$url\"}[$__rate_interval])\n  )\n)"
          instant: false
          legendFormat: '{{${groupby}}} p50'
          range: true
          refId: C
      title: Write Latency
      type: timeseries
    - datasource: ${datasource}
      description: Bytes dropped per second.
      fieldConfig:
        defaults:
          custom:
            fillOpacity: 20
            gradientMode: hue
            stacking:
              mode: 'off'
          unit: Bps
        overrides: []
      gridPos:
        h: 10
        w: 12
        x: 12
        y: 23
      id: 10
      targets:
        - datasource: ${datasource}
          expr: sum by(${groupby}, reason) (rate(loki_write_dropped_bytes_total{cluster=~"$cluster", namespace=~"$namespace", job=~"$job", instance=~"$instance", host=~"$url"}[$__rate_interval]))
          instant: false
          legendFormat: '{{${groupby}}}: {{reason}}'
          range: true
          refId: A
      title: Bytes Dropped
      type: timeseries
    - datasource: ${datasource}
      description: p99 and p50 of entry propagation latency. Prefers native histogram, falls back to classic histogram when native is unavailable.
      fieldConfig:
        defaults:
          unit: s
        overrides: []
      gridPos:
        h: 10
        w: 12
        x: 12
        y: 23
      id: 12
      targets:
        - datasource: ${datasource}
          expr: "histogram_quantile(\n  0.99,\n  sum by (${groupby}) (\n\trate(loki_write_entry_propagation_latency_seconds{cluster=~\"$cluster\", namespace=~\"$namespace\", job=~\"$job\", instance=~\"$instance\"}[$__rate_interval])\n  )\n)\nor ignoring(le)\nhistogram_quantile(\n  0.99,\n  sum by (le, ${groupby}) (\n\trate(loki_write_entry_propagation_latency_seconds_bucket{cluster=~\"$cluster\", namespace=~\"$namespace\", job=~\"$job\", instance=~\"$instance\"}[$__rate_interval])\n  )\n)"
          instant: false
          legendFormat: '{{${groupby}}} p99'
          range: true
          refId: A
        - datasource: ${datasource}
          expr: "histogram_quantile(\n  0.50,\n  sum by (${groupby}) (\n\trate(loki_write_entry_propagation_latency_seconds{cluster=~\"$cluster\", namespace=~\"$namespace\", job=~\"$job\", instance=~\"$instance\"}[$__rate_interval])\n  )\n)\nor ignoring(le)\nhistogram_quantile(\n  0.50,\n  sum by (le, ${groupby}) (\n\trate(loki_write_entry_propagation_latency_seconds_bucket{cluster=~\"$cluster\", namespace=~\"$namespace\", job=~\"$job\", instance=~\"$instance\"}[$__rate_interval])\n  )\n)"
          instant: false
          legendFormat: '{{${groupby}}} p50'
          range: true
          refId: B
      title: Entry Propagation Latency
      type: timeseries
  refresh: 30s
  schemaVersion: 42
  tags:
    - alloy-integrations
  templating:
    list:
      - label: Data Source
        name: datasource
        options: []
        query: prometheus
        refresh: 1
        sort: 2
        type: datasource
      - label: Loki Data Source
        name: loki_datasource
        options: []
        query: loki
        refresh: 1
        sort: 2
        type: datasource
      - allowCustomValue: true
        datasource: ${datasource}
        label: cluster
        multi: true
        name: cluster
        options: []
        query:
          query: label_values(alloy_component_controller_running_components, cluster)
          refId: cluster
        refresh: 2
        sort: 1
        type: query
      - allowCustomValue: true
        datasource: ${datasource}
        label: namespace
        multi: true
        name: namespace
        options: []
        query:
          query: label_values(alloy_component_controller_running_components{cluster=~"$cluster"}, namespace)
          refId: namespace
        refresh: 2
        sort: 1
        type: query
      - allValue: .*
        datasource: ${datasource}
        includeAll: true
        label: job
        multi: true
        name: job
        options: []
        query:
          query: label_values(alloy_component_controller_running_components{cluster=~"$cluster", namespace=~"$namespace"}, job)
          refId: job
        refresh: 2
        sort: 1
        type: query
      - allValue: .*
        datasource: ${datasource}
        includeAll: true
        label: instance
        multi: true
        name: instance
        options: []
        query:
          query: label_values(alloy_component_controller_running_components{cluster=~"$cluster", namespace=~"$namespace", job=~"$job"}, instance)
          refId: instance
        refresh: 2
        sort: 1
        type: query
      - datasource:
          type: prometheus
          uid: ${datasource}
        name: filters
        type: adhoc
      - allValue: .*
        datasource: ${datasource}
        includeAll: true
        label: url
        multi: true
        name: url
        options: []
        query:
          query: label_values(loki_write_sent_bytes_total{cluster=~"$cluster", namespace=~"$namespace", job=~"$job", instance=~"$instance"}, host)
          refId: url
        refresh: 2
        sort: 1
        type: query
      - allowCustomValue: true
        current:
          selected: true
          text: instance
          value: instance
        label: Group by
        name: groupby
        query: instance,host,status_code,job,namespace,cluster,pod
        type: custom
  time:
    from: now-1h
    to: now
  timepicker:
    refresh_intervals:
      - 5s
      - 10s
      - 30s
      - 1m
      - 5m
      - 15m
      - 30m
      - 1h
      - 2h
      - 1d
  timezone: utc
  title: Alloy / Loki Components
  uid: loki-components
