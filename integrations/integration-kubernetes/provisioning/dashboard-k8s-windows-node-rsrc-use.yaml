apiVersion: grizzly.grafana.com/v1alpha1
kind: Dashboard
metadata:
    folder: integration-kubernetes
    name: k8s-windows-node-rsrc-use
spec:
    editable: false
    description: "USE method deep-dive into a single Windows node. Shows per-core CPU, memory breakdown, disk I/O, and network saturation metrics."
    links:
        - asDropdown: true
          includeVars: true
          keepTime: true
          tags:
            - kubernetes-integration
          targetBlank: false
          title: Kubernetes
          type: dashboards
    panels:
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                custom:
                    fillOpacity: 10
                    showPoints: never
                    spanNulls: true
                unit: percentunit
          gridPos:
            h: 7
            w: 12
            x: 0
            "y": 0
          id: 1
          interval: 1m
          options:
            legend:
                asTable: true
                calcs:
                    - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
            tooltip:
                mode: single
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: node:windows_node_cpu_utilisation:avg5m{cluster="$cluster", instance="$instance"}
              legendFormat: Utilisation
          title: CPU Utilisation
          description: "Current CPU utilisation percentage. Derived from node-level metrics."
          type: timeseries
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                custom:
                    fillOpacity: 10
                    showPoints: never
                    spanNulls: true
                unit: percentunit
          gridPos:
            h: 7
            w: 12
            x: 12
            "y": 0
          id: 2
          interval: 1m
          options:
            legend:
                asTable: true
                calcs:
                    - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
            tooltip:
                mode: single
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: sum by (core) (irate(windows_cpu_time_total{cluster="$cluster", job="integrations/windows_exporter", mode!="idle", instance="$instance"}[$__rate_interval]))
              legendFormat: '{{core}}'
          title: CPU Usage Per Core
          description: "CPU utilisation broken down by individual logical processor core on the selected Windows node."
          type: timeseries
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                custom:
                    fillOpacity: 10
                    showPoints: never
                    spanNulls: true
                unit: percentunit
          gridPos:
            h: 7
            w: 8
            x: 0
            "y": 7
          id: 3
          interval: 1m
          options:
            legend:
                asTable: true
                calcs:
                    - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
            tooltip:
                mode: single
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: node:windows_node_memory_utilisation:{cluster="$cluster", instance="$instance"}
              legendFormat: Memory
          title: Memory Utilisation %
          description: "Percentage of physical memory in use on the selected Windows node."
          type: timeseries
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                custom:
                    fillOpacity: 10
                    showPoints: never
                    spanNulls: true
                unit: bytes
          gridPos:
            h: 7
            w: 8
            x: 8
            "y": 7
          id: 4
          interval: 1m
          options:
            legend:
                asTable: true
                calcs:
                    - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
            tooltip:
                mode: single
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                max(
                  (
                    windows_memory_physical_total_bytes{cluster="$cluster", job="integrations/windows_exporter", instance="$instance"}
                    or windows_os_visible_memory_bytes{cluster="$cluster", job="integrations/windows_exporter", instance="$instance"}
                  )
                  - windows_memory_available_bytes{cluster="$cluster", job="integrations/windows_exporter", instance="$instance"}
                )
              legendFormat: memory used
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: max(node:windows_node_memory_totalCached_bytes:sum{cluster="$cluster", instance="$instance"})
              legendFormat: memory cached
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: max(windows_memory_available_bytes{cluster="$cluster", job="integrations/windows_exporter", instance="$instance"})
              legendFormat: memory free
          title: Memory Usage
          description: "Memory breakdown on the selected Windows node: used, cached, and available bytes."
          type: timeseries
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                custom:
                    fillOpacity: 10
                    showPoints: never
                    spanNulls: true
                unit: short
          gridPos:
            h: 7
            w: 8
            x: 16
            "y": 7
          id: 5
          interval: 1m
          options:
            legend:
                asTable: true
                calcs:
                    - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
            tooltip:
                mode: single
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: node:windows_node_memory_swap_io_pages:irate{cluster="$cluster", instance="$instance"}
              legendFormat: Swap IO
          title: Memory Saturation (Swap I/O) Pages
          description: "Rate of swap page operations on the selected node. Sustained paging indicates insufficient RAM."
          type: timeseries
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                custom:
                    fillOpacity: 10
                    showPoints: never
                    spanNulls: true
                unit: percentunit
          gridPos:
            h: 7
            w: 12
            x: 0
            "y": 14
          id: 6
          interval: 1m
          options:
            legend:
                asTable: true
                calcs:
                    - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
            tooltip:
                mode: single
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: node:windows_node_disk_utilisation:avg_irate{cluster="$cluster", instance="$instance"}
              legendFormat: Utilisation
          title: Disk IO Utilisation
          description: "Percentage of time the disk is busy with read or write operations. Values near 100% indicate saturation."
          type: timeseries
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                custom:
                    fillOpacity: 10
                    showPoints: never
                    spanNulls: true
                unit: bytes
            overrides:
                - matcher:
                    id: byRegexp
                    options: /io time/
                  properties:
                    - id: unit
                      value: ms
          gridPos:
            h: 7
            w: 12
            x: 12
            "y": 14
          id: 7
          interval: 1m
          options:
            legend:
                asTable: true
                calcs:
                    - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
            tooltip:
                mode: single
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: max(rate(windows_logical_disk_read_bytes_total{cluster="$cluster", job="integrations/windows_exporter", instance="$instance"}[$__rate_interval]))
              legendFormat: read
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: max(rate(windows_logical_disk_write_bytes_total{cluster="$cluster", job="integrations/windows_exporter", instance="$instance"}[$__rate_interval]))
              legendFormat: written
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: max(rate(windows_logical_disk_read_seconds_total{cluster="$cluster", job="integrations/windows_exporter",  instance="$instance"}[$__rate_interval]) + rate(windows_logical_disk_write_seconds_total{cluster="$cluster", job="integrations/windows_exporter", instance="$instance"}[$__rate_interval]))
              legendFormat: io time
          title: Disk IO
          description: "Disk read and write throughput in bytes per second plus total I/O time on the selected Windows node."
          type: timeseries
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                custom:
                    fillOpacity: 10
                    showPoints: never
                    spanNulls: true
                unit: percentunit
          gridPos:
            h: 7
            w: 24
            x: 0
            "y": 21
          id: 8
          interval: 1m
          options:
            legend:
                asTable: true
                calcs:
                    - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
            tooltip:
                mode: single
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: node:windows_node_filesystem_usage:{cluster="$cluster", instance="$instance"}
              legendFormat: '{{volume}}'
          title: Disk Utilisation
          description: "Percentage of disk space used per volume on the selected Windows node."
          type: timeseries
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                custom:
                    fillOpacity: 10
                    showPoints: never
                    spanNulls: true
                unit: Bps
          gridPos:
            h: 7
            w: 12
            x: 0
            "y": 28
          id: 9
          interval: 1m
          options:
            legend:
                asTable: true
                calcs:
                    - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
            tooltip:
                mode: single
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: node:windows_node_net_utilisation:sum_irate{cluster="$cluster", instance="$instance"}
              legendFormat: Utilisation
          title: Net Utilisation (Transmitted)
          description: "Total outbound network throughput across all Windows nodes or the selected node."
          type: timeseries
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                custom:
                    fillOpacity: 10
                    showPoints: never
                    spanNulls: true
                unit: Bps
          gridPos:
            h: 7
            w: 12
            x: 12
            "y": 28
          id: 10
          interval: 1m
          options:
            legend:
                asTable: true
                calcs:
                    - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
            tooltip:
                mode: single
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: node:windows_node_net_saturation:sum_irate{cluster="$cluster", instance="$instance"}
              legendFormat: Saturation
          title: Net Saturation (Dropped)
          description: "Rate of dropped packets on the selected Windows node. Indicates network interface saturation."
          type: timeseries
    refresh: 1m
    schemaVersion: 39
    tags:
        - kubernetes-windows-integration
        - kubernetes-integration
    templating:
        list:
            - current:
                selected: true
                text: duplo-metrics
                value: duplo-metrics
              hide: 0
              label: Data source
              name: datasource
              query: prometheus
              regex: ""
              type: datasource
            - datasource:
                type: prometheus
                uid: ${datasource}
              hide: 0
              label: cluster
              name: cluster
              query: label_values(up{job="integrations/windows_exporter"}, cluster)
              refresh: 2
              sort: 1
              type: query
            - datasource:
                type: prometheus
                uid: ${datasource}
              hide: 0
              label: instance
              multi: true
              name: instance
              query: label_values(
                  {__name__=~"windows_system_boot_time_timestamp|windows_system_system_up_time", cluster="$cluster"},
                  instance
                )
              refresh: 2
              type: query
    time:
        from: now-1h
        to: now
    timezone: utc
    title: K8s / USE Method / Node
    uid: k8s-windows-node-rsrc-use
