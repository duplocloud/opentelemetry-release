apiVersion: grizzly.grafana.com/v1alpha1
kind: Dashboard
metadata:
    folder: integration-kubernetes
    name: k8s-resources-multicluster
spec:
    annotations:
        list:
            - builtIn: 1
              datasource:
                type: datasource
                uid: grafana
              enable: true
              hide: true
              iconColor: rgba(0, 211, 255, 1)
              name: Annotations & Alerts
              target:
                limit: 100
                matchAny: false
                tags: []
                type: dashboard
              type: dashboard
            - datasource:
                uid: ${lokids}
              enable: true
              expr: '{job!="", cluster="$cluster"} |= "sourcecomponent=kubelet" |~ "sourcehost=$instance" |~ "reason=(Created|Killing|BackOff|SystemOOM|Started)" | logfmt'
              hide: false
              iconColor: blue
              name: K8s events
              tagKeys: reason,type
              target:
                limit: 100
                matchAny: false
                tags: []
                type: dashboard
              textFormat: '{{kind}}: {{name}} in namespace: {{namespace}} on node: {{sourcehost}}'
              titleFormat: '{{msg}}'
    editable: false
    description: "Cross-cluster compute resource overview. Compares CPU and memory utilisation, requests, and limits across multiple Kubernetes clusters."
    links:
        - asDropdown: true
          includeVars: true
          keepTime: true
          tags:
            - kubernetes-integration
          targetBlank: false
          title: Kubernetes
          type: dashboards
    panels:
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                unit: none
          gridPos:
            h: 3
            w: 4
            x: 0
            "y": 0
          id: 1
          interval: 1m
          options:
            colorMode: none
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: sum(cluster:node_cpu:ratio_rate5m) / count(cluster:node_cpu:ratio_rate5m)
              instant: true
          title: CPU Utilisation
          description: "Current CPU utilisation percentage. Derived from node-level metrics."
          type: stat
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                unit: percentunit
          gridPos:
            h: 3
            w: 4
            x: 4
            "y": 0
          id: 2
          interval: 1m
          options:
            colorMode: none
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: sum(kube_pod_container_resource_requests{job="integrations/kubernetes/kube-state-metrics", resource="cpu"}) / sum(kube_node_status_allocatable{job="integrations/kubernetes/kube-state-metrics", resource="cpu"})
              instant: true
          title: CPU Requests Commitment
          description: "Fraction of total allocatable CPU claimed by pod CPU requests across the cluster."
          type: stat
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                unit: percentunit
          gridPos:
            h: 3
            w: 4
            x: 8
            "y": 0
          id: 3
          interval: 1m
          options:
            colorMode: none
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: sum(kube_pod_container_resource_limits{job="integrations/kubernetes/kube-state-metrics", resource="cpu"}) / sum(kube_node_status_allocatable{job="integrations/kubernetes/kube-state-metrics", resource="cpu"})
              instant: true
          title: CPU Limits Commitment
          description: "Fraction of total allocatable CPU claimed by pod CPU limits across the cluster."
          type: stat
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                unit: percentunit
          gridPos:
            h: 3
            w: 4
            x: 12
            "y": 0
          id: 4
          interval: 1m
          options:
            colorMode: none
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                1 - (
                  (sum(:node_memory_MemAvailable_bytes:sum) or vector(0))
                  + (sum(node:windows_node_memory_bytes_available:sum) or vector(0))
                ) / (
                  (sum(node_memory_MemTotal_bytes{job="integrations/node_exporter"}) or vector(0))
                  + (sum(node:windows_node_memory_bytes_total:sum) or vector(0))
                )
              instant: true
          title: Memory Utilisation
          description: "Current memory utilisation percentage across the cluster."
          type: stat
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                unit: percentunit
          gridPos:
            h: 3
            w: 4
            x: 16
            "y": 0
          id: 5
          interval: 1m
          options:
            colorMode: none
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: sum(kube_pod_container_resource_requests{job="integrations/kubernetes/kube-state-metrics", resource="memory"}) / sum(kube_node_status_allocatable{job="integrations/kubernetes/kube-state-metrics", resource="memory"})
              instant: true
          title: Memory Requests Commitment
          description: "Fraction of total allocatable memory claimed by pod memory requests."
          type: stat
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                unit: percentunit
          gridPos:
            h: 3
            w: 4
            x: 20
            "y": 0
          id: 6
          interval: 1m
          options:
            colorMode: none
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: sum(kube_pod_container_resource_limits{job="integrations/kubernetes/kube-state-metrics", resource="memory"}) / sum(kube_node_status_allocatable{job="integrations/kubernetes/kube-state-metrics", resource="memory"})
              instant: true
          title: Memory Limits Commitment
          description: "Fraction of total allocatable memory claimed by pod memory limits."
          type: stat
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                custom:
                    showPoints: never
          gridPos:
            h: 7
            w: 24
            x: 0
            "y": 1
          id: 7
          interval: 1m
          options:
            legend:
                asTable: true
                displayMode: table
                placement: right
                showLegend: true
            tooltip:
                mode: single
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: sum(node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate) by (cluster)
              legendFormat: __auto
          title: CPU Usage
          description: "CPU cores consumed over time. Covers both Linux (cadvisor) and Windows (windows-exporter) containers."
          type: timeseries
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            overrides:
                - matcher:
                    id: byRegexp
                    options: /%/
                  properties:
                    - id: unit
                      value: percentunit
                - matcher:
                    id: byName
                    options: Cluster
                  properties:
                    - id: links
                      value:
                        - title: Drill down
                          url: /d/k8s-resources-cluster/kubernetes-compute-resources-cluster?${datasource:queryparam}&var-cluster=${__data.fields.Cluster}
          gridPos:
            h: 7
            w: 24
            x: 0
            "y": 2
          id: 8
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: sum(node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate) by (cluster)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: sum(kube_pod_container_resource_requests{job="integrations/kubernetes/kube-state-metrics", resource="cpu"}) by (cluster)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: sum(node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate) by (cluster) / sum(kube_pod_container_resource_requests{job="integrations/kubernetes/kube-state-metrics", resource="cpu"}) by (cluster)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: sum(kube_pod_container_resource_limits{job="integrations/kubernetes/kube-state-metrics", resource="cpu"}) by (cluster)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: sum(node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate) by (cluster) / sum(kube_pod_container_resource_limits{job="integrations/kubernetes/kube-state-metrics", resource="cpu"}) by (cluster)
              format: table
              instant: true
          title: CPU Quota
          description: "Per-namespace/pod/container table showing CPU usage vs requests and limits, including utilisation percentages."
          transformations:
            - id: joinByField
              options:
                byField: cluster
                mode: outer
            - id: organize
              options:
                excludeByName:
                    Time: true
                    Time 1: true
                    Time 2: true
                    Time 3: true
                    Time 4: true
                    Time 5: true
                indexByName:
                    Time 1: 0
                    Time 2: 1
                    Time 3: 2
                    Time 4: 3
                    Time 5: 4
                    'Value #A': 6
                    'Value #B': 7
                    'Value #C': 8
                    'Value #D': 9
                    'Value #E': 10
                    cluster: 5
                renameByName:
                    'Value #A': CPU Usage
                    'Value #B': CPU Requests
                    'Value #C': CPU Requests %
                    'Value #D': CPU Limits
                    'Value #E': CPU Limits %
                    cluster: Cluster
          type: table
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                custom:
                    showPoints: never
                unit: bytes
          gridPos:
            h: 7
            w: 24
            x: 0
            "y": 3
          id: 9
          interval: 1m
          options:
            legend:
                asTable: true
                displayMode: table
                placement: right
                showLegend: true
            tooltip:
                mode: single
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: sum(container_memory_rss{job="integrations/kubernetes/cadvisor", container!=""}) by (cluster)
              legendFormat: __auto
          title: Memory Usage (w/o cache)
          description: "Memory usage excluding page cache, representing the true working memory footprint of running containers."
          type: timeseries
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                unit: bytes
            overrides:
                - matcher:
                    id: byRegexp
                    options: /%/
                  properties:
                    - id: unit
                      value: percentunit
                - matcher:
                    id: byName
                    options: Cluster
                  properties:
                    - id: links
                      value:
                        - title: Drill down
                          url: /d/k8s-resources-cluster/kubernetes-compute-resources-cluster?${datasource:queryparam}&var-cluster=${__data.fields.Cluster}
          gridPos:
            h: 7
            w: 24
            x: 0
            "y": 4
          id: 10
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: sum(container_memory_rss{job="integrations/kubernetes/cadvisor", container!=""}) by (cluster)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: sum(kube_pod_container_resource_requests{job="integrations/kubernetes/kube-state-metrics", resource="memory"}) by (cluster)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: sum(container_memory_rss{job="integrations/kubernetes/cadvisor", container!=""}) by (cluster) / sum(kube_pod_container_resource_requests{job="integrations/kubernetes/kube-state-metrics", resource="memory"}) by (cluster)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: sum(kube_pod_container_resource_limits{job="integrations/kubernetes/kube-state-metrics", resource="memory"}) by (cluster)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: sum(container_memory_rss{job="integrations/kubernetes/cadvisor", container!=""}) by (cluster) / sum(kube_pod_container_resource_limits{job="integrations/kubernetes/kube-state-metrics", resource="memory"}) by (cluster)
              format: table
              instant: true
          title: Memory Requests by Cluster
          description: "Table of memory usage vs requests and limits per cluster."
          transformations:
            - id: joinByField
              options:
                byField: cluster
                mode: outer
            - id: organize
              options:
                excludeByName:
                    Time: true
                    Time 1: true
                    Time 2: true
                    Time 3: true
                    Time 4: true
                    Time 5: true
                indexByName:
                    Time 1: 0
                    Time 2: 1
                    Time 3: 2
                    Time 4: 3
                    Time 5: 4
                    'Value #A': 6
                    'Value #B': 7
                    'Value #C': 8
                    'Value #D': 9
                    'Value #E': 10
                    cluster: 5
                renameByName:
                    'Value #A': Memory Usage
                    'Value #B': Memory Requests
                    'Value #C': Memory Requests %
                    'Value #D': Memory Limits
                    'Value #E': Memory Limits %
                    cluster: Cluster
          type: table
    refresh: 1m
    schemaVersion: 39
    tags:
        - kubernetes-integration
        - resource
        - compute
    templating:
        list:
            - current:
                selected: true
                text: duplo-metrics
                value: duplo-metrics
              hide: 0
              label: Data source
              name: datasource
              query: prometheus
              regex: ""
              type: datasource
            - current:
                selected: true
                text:
                    - All
                value:
                    - $__all
              hide: 0
              includeAll: true
              label: Events Data Source
              multi: true
              name: lokids
              options: []
              query: loki
              refresh: 1
              regex: ""
              skipUrlSync: false
              type: datasource
    time:
        from: now-1h
        to: now
    timezone: browser
    title: K8s / Compute Resources /  Multi-Cluster
    uid: k8s-resources-multicluster
