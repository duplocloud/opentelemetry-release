apiVersion: grizzly.grafana.com/v1alpha1
kind: Dashboard
metadata:
    folder: integration-kubernetes
    name: k8s-resources-cluster
spec:
    annotations:
        list:
            - builtIn: 1
              datasource:
                type: datasource
                uid: grafana
              enable: true
              hide: true
              iconColor: rgba(0, 211, 255, 1)
              name: Annotations & Alerts
              target:
                limit: 100
                matchAny: false
                tags: []
                type: dashboard
              type: dashboard
            - datasource:
                uid: ${lokids}
              enable: true
              expr: '{job!="", cluster="$cluster"} |= "sourcecomponent=kubelet" |~ "sourcehost=$instance" |~ "reason=(Created|Killing|BackOff|SystemOOM|Started)" | logfmt'
              hide: false
              iconColor: blue
              name: K8s events
              tagKeys: reason,type
              target:
                limit: 100
                matchAny: false
                tags: []
                type: dashboard
              textFormat: '{{kind}}: {{name}} in namespace: {{namespace}} on node: {{sourcehost}}'
              titleFormat: '{{msg}}'
    editable: false
    description: "Cluster-wide compute resource overview for both Linux and Windows nodes. Shows CPU and memory utilisation, request/limit commitment across all namespaces, and network I/O trends."
    links:
        - asDropdown: true
          includeVars: true
          keepTime: true
          tags:
            - kubernetes-integration
          targetBlank: false
          title: Kubernetes
          type: dashboards
    panels:
        # ── Linux node stats row ────────────────────────────────────────────
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                unit: percentunit
          gridPos:
            h: 3
            w: 4
            x: 0
            "y": 0
          id: 1
          interval: 1m
          options:
            colorMode: none
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: cluster:node_cpu:ratio_rate5m{cluster="$cluster"}
              instant: true
          title: 'Linux: CPU Utilisation'
          description: "Current cluster-wide CPU utilisation across all Linux nodes, averaged over 5 minutes."
          type: stat
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                unit: percentunit
          gridPos:
            h: 3
            w: 4
            x: 4
            "y": 0
          id: 2
          interval: 1m
          options:
            colorMode: none
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: sum(namespace_cpu:kube_pod_container_resource_requests:sum{cluster="$cluster"}) / sum(kube_node_status_allocatable{job="integrations/kubernetes/kube-state-metrics",resource="cpu",cluster="$cluster"})
              instant: true
          title: 'Linux: CPU Requests Commitment'
          description: "Fraction of total allocatable CPU on Linux nodes claimed by pod CPU requests. Values above 1 indicate over-subscription."
          type: stat
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                unit: percentunit
          gridPos:
            h: 3
            w: 4
            x: 8
            "y": 0
          id: 3
          interval: 1m
          options:
            colorMode: none
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: sum(namespace_cpu:kube_pod_container_resource_limits:sum{cluster="$cluster"}) / sum(kube_node_status_allocatable{job="integrations/kubernetes/kube-state-metrics",resource="cpu",cluster="$cluster"})
              instant: true
          title: 'Linux: CPU Limits Commitment'
          description: "Fraction of total allocatable CPU on Linux nodes claimed by pod CPU limits. High values increase the risk of CPU throttling."
          type: stat
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                unit: percentunit
          gridPos:
            h: 3
            w: 4
            x: 12
            "y": 0
          id: 4
          interval: 1m
          options:
            colorMode: none
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: 1 - sum(:node_memory_MemAvailable_bytes:sum{cluster="$cluster"}) / sum(node_memory_MemTotal_bytes{job="integrations/node_exporter",cluster="$cluster"})
              instant: true
          title: 'Linux: Memory Utilisation'
          description: "Current cluster-wide memory utilisation across all Linux nodes."
          type: stat
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                unit: percentunit
          gridPos:
            h: 3
            w: 4
            x: 16
            "y": 0
          id: 5
          interval: 1m
          options:
            colorMode: none
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: sum(namespace_memory:kube_pod_container_resource_requests:sum{cluster="$cluster"}) / sum(kube_node_status_allocatable{job="integrations/kubernetes/kube-state-metrics",resource="memory",cluster="$cluster"})
              instant: true
          title: 'Linux: Memory Requests Commitment'
          description: "Fraction of total allocatable memory on Linux nodes claimed by pod memory requests."
          type: stat
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                unit: percentunit
          gridPos:
            h: 3
            w: 4
            x: 20
            "y": 0
          id: 6
          interval: 1m
          options:
            colorMode: none
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: sum(namespace_memory:kube_pod_container_resource_limits:sum{cluster="$cluster"}) / sum(kube_node_status_allocatable{job="integrations/kubernetes/kube-state-metrics",resource="memory",cluster="$cluster"})
              instant: true
          title: 'Linux: Memory Limits Commitment'
          description: "Fraction of total allocatable memory on Linux nodes claimed by pod memory limits."
          type: stat
        # ── Windows node stats row ──────────────────────────────────────────
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                unit: percentunit
          gridPos:
            h: 3
            w: 4
            x: 0
            "y": 3
          id: 7
          interval: 1m
          options:
            colorMode: none
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: 1 - avg(rate(windows_cpu_time_total{cluster="$cluster", job="integrations/windows_exporter", mode="idle"}[$__rate_interval]))
              instant: true
          title: 'Windows: CPU Utilisation'
          description: "Current cluster-wide CPU utilisation across all Windows nodes, averaged over the last scrape interval."
          type: stat
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                unit: percentunit
          gridPos:
            h: 3
            w: 4
            x: 4
            "y": 3
          id: 8
          interval: 1m
          options:
            colorMode: none
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: sum(kube_pod_windows_container_resource_cpu_cores_request{cluster="$cluster"}) / sum(node:windows_node_num_cpu:sum{cluster="$cluster"})
              instant: true
          title: 'Windows: CPU Requests Commitment'
          description: "Fraction of total CPU cores on Windows nodes claimed by pod CPU requests."
          type: stat
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                unit: percentunit
          gridPos:
            h: 3
            w: 4
            x: 8
            "y": 3
          id: 9
          interval: 1m
          options:
            colorMode: none
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: sum(kube_pod_windows_container_resource_cpu_cores_limit{cluster="$cluster"}) / sum(node:windows_node_num_cpu:sum{cluster="$cluster"})
              instant: true
          title: 'Windows: CPU Limits Commitment'
          description: "Fraction of total CPU cores on Windows nodes claimed by pod CPU limits."
          type: stat
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                unit: percentunit
          gridPos:
            h: 3
            w: 4
            x: 12
            "y": 3
          id: 10
          interval: 1m
          options:
            colorMode: none
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: 1 - sum(:windows_node_memory_MemFreeCached_bytes:sum{cluster="$cluster"}) / sum(:windows_node_memory_MemTotal_bytes:sum{cluster="$cluster"})
              instant: true
          title: 'Windows: Memory Utilisation'
          description: "Current memory utilisation across all Windows nodes based on available vs total physical memory."
          type: stat
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                unit: percentunit
          gridPos:
            h: 3
            w: 4
            x: 16
            "y": 3
          id: 11
          interval: 1m
          options:
            colorMode: none
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: sum(kube_pod_windows_container_resource_memory_request{cluster="$cluster"}) / sum(:windows_node_memory_MemTotal_bytes:sum{cluster="$cluster"})
              instant: true
          title: 'Windows: Memory Requests Commitment'
          description: "Fraction of total Windows node memory claimed by pod memory requests."
          type: stat
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                unit: percentunit
          gridPos:
            h: 3
            w: 4
            x: 20
            "y": 3
          id: 12
          interval: 1m
          options:
            colorMode: none
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: sum(kube_pod_windows_container_resource_memory_limit{cluster="$cluster"}) / sum(:windows_node_memory_MemTotal_bytes:sum{cluster="$cluster"})
              instant: true
          title: 'Windows: Memory Limits Commitment'
          description: "Fraction of total Windows node memory claimed by pod memory limits."
          type: stat
        # ── Combined CPU ────────────────────────────────────────────────────
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                custom:
                    fillOpacity: 10
                    showPoints: never
                    spanNulls: true
          gridPos:
            h: 7
            w: 24
            x: 0
            "y": 6
          id: 13
          interval: 1m
          options:
            legend:
                asTable: true
                calcs:
                    - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
            tooltip:
                mode: single
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{cluster="$cluster"}
                  or
                  namespace_pod_container:windows_container_cpu_usage_seconds_total:sum_rate{cluster="$cluster"}
                ) by (namespace)
              legendFormat: __auto
          title: CPU Usage
          description: "CPU cores consumed over time. Covers both Linux (cadvisor) and Windows (windows-exporter) containers."
          type: timeseries
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            overrides:
                - matcher:
                    id: byRegexp
                    options: /%/
                  properties:
                    - id: unit
                      value: percentunit
                - matcher:
                    id: byName
                    options: Namespace
                  properties:
                    - id: links
                      value:
                        - title: Drill down to pods
                          url: /d/k8s-resources-namespace/k8s-resources-namespace?${datasource:queryparam}&var-cluster=$cluster&var-namespace=${__data.fields.Namespace}
          gridPos:
            h: 7
            w: 24
            x: 0
            "y": 13
          id: 14
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: sum(kube_pod_owner{job="integrations/kubernetes/kube-state-metrics", cluster="$cluster"}) by (namespace)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: count(avg(namespace_workload_pod:kube_pod_owner:relabel{cluster="$cluster"}) by (workload, namespace)) by (namespace)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{cluster="$cluster"}
                  or
                  namespace_pod_container:windows_container_cpu_usage_seconds_total:sum_rate{cluster="$cluster"}
                ) by (namespace)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  namespace_cpu:kube_pod_container_resource_requests:sum{cluster="$cluster"}
                  or
                  kube_pod_windows_container_resource_cpu_cores_request{cluster="$cluster"}
                ) by (namespace)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{cluster="$cluster"}
                  or
                  namespace_pod_container:windows_container_cpu_usage_seconds_total:sum_rate{cluster="$cluster"}
                ) by (namespace)
                /
                sum(
                  namespace_cpu:kube_pod_container_resource_requests:sum{cluster="$cluster"}
                  or
                  kube_pod_windows_container_resource_cpu_cores_request{cluster="$cluster"}
                ) by (namespace)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  namespace_cpu:kube_pod_container_resource_limits:sum{cluster="$cluster"}
                  or
                  kube_pod_windows_container_resource_cpu_cores_limit{cluster="$cluster"}
                ) by (namespace)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{cluster="$cluster"}
                  or
                  namespace_pod_container:windows_container_cpu_usage_seconds_total:sum_rate{cluster="$cluster"}
                ) by (namespace)
                /
                sum(
                  namespace_cpu:kube_pod_container_resource_limits:sum{cluster="$cluster"}
                  or
                  kube_pod_windows_container_resource_cpu_cores_limit{cluster="$cluster"}
                ) by (namespace)
              format: table
              instant: true
          title: CPU Quota
          description: "Per-namespace/pod/container table showing CPU usage vs requests and limits, including utilisation percentages."
          transformations:
            - id: joinByField
              options:
                byField: namespace
                mode: outer
            - id: organize
              options:
                excludeByName:
                    Time: true
                    Time 1: true
                    Time 2: true
                    Time 3: true
                    Time 4: true
                    Time 5: true
                    Time 6: true
                    Time 7: true
                indexByName:
                    Time 1: 0
                    Time 2: 1
                    Time 3: 2
                    Time 4: 3
                    Time 5: 4
                    Time 6: 5
                    Time 7: 6
                    'Value #A': 8
                    'Value #B': 9
                    'Value #C': 10
                    'Value #D': 11
                    'Value #E': 12
                    'Value #F': 13
                    'Value #G': 14
                    namespace: 7
                renameByName:
                    'Value #A': Pods
                    'Value #B': Workloads
                    'Value #C': CPU Usage
                    'Value #D': CPU Requests
                    'Value #E': CPU Requests %
                    'Value #F': CPU Limits
                    'Value #G': CPU Limits %
                    namespace: Namespace
          type: table
        # ── Combined Memory ─────────────────────────────────────────────────
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                custom:
                    fillOpacity: 10
                    showPoints: never
                    spanNulls: true
                unit: bytes
          gridPos:
            h: 7
            w: 24
            x: 0
            "y": 20
          id: 15
          interval: 1m
          options:
            legend:
                asTable: true
                calcs:
                    - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
            tooltip:
                mode: single
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  container_memory_rss{job="integrations/kubernetes/cadvisor", cluster="$cluster", container!=""}
                  or
                  windows_container_private_working_set_usage{cluster="$cluster"}
                ) by (namespace)
              legendFormat: __auto
          title: Memory Usage (RSS / Private Working Set)
          description: "Memory in use over time. Uses RSS for Linux containers and Private Working Set for Windows containers."
          type: timeseries
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                unit: bytes
            overrides:
                - matcher:
                    id: byRegexp
                    options: /%/
                  properties:
                    - id: unit
                      value: percentunit
                - matcher:
                    id: byName
                    options: Memory Usage
                  properties:
                    - id: unit
                      value: bytes
                - matcher:
                    id: byName
                    options: Memory Requests
                  properties:
                    - id: unit
                      value: bytes
                - matcher:
                    id: byName
                    options: Memory Limits
                  properties:
                    - id: unit
                      value: bytes
                - matcher:
                    id: byName
                    options: Namespace
                  properties:
                    - id: links
                      value:
                        - title: Drill down to pods
                          url: /d/k8s-resources-namespace/k8s-resources-namespace?${datasource:queryparam}&var-cluster=$cluster&var-namespace=${__data.fields.Namespace}
          gridPos:
            h: 7
            w: 24
            x: 0
            "y": 27
          id: 16
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: sum(kube_pod_owner{job="integrations/kubernetes/kube-state-metrics", cluster="$cluster"}) by (namespace)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: count(avg(namespace_workload_pod:kube_pod_owner:relabel{cluster="$cluster"}) by (workload, namespace)) by (namespace)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  container_memory_rss{job="integrations/kubernetes/cadvisor", cluster="$cluster", container!=""}
                  or
                  windows_container_private_working_set_usage{cluster="$cluster"}
                ) by (namespace)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  namespace_memory:kube_pod_container_resource_requests:sum{cluster="$cluster"}
                  or
                  kube_pod_windows_container_resource_memory_request{cluster="$cluster"}
                ) by (namespace)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  container_memory_rss{job="integrations/kubernetes/cadvisor", cluster="$cluster", container!=""}
                  or
                  windows_container_private_working_set_usage{cluster="$cluster"}
                ) by (namespace)
                /
                sum(
                  namespace_memory:kube_pod_container_resource_requests:sum{cluster="$cluster"}
                  or
                  kube_pod_windows_container_resource_memory_request{cluster="$cluster"}
                ) by (namespace)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  namespace_memory:kube_pod_container_resource_limits:sum{cluster="$cluster"}
                  or
                  kube_pod_windows_container_resource_memory_limit{cluster="$cluster"}
                ) by (namespace)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  container_memory_rss{job="integrations/kubernetes/cadvisor", cluster="$cluster", container!=""}
                  or
                  windows_container_private_working_set_usage{cluster="$cluster"}
                ) by (namespace)
                /
                sum(
                  namespace_memory:kube_pod_container_resource_limits:sum{cluster="$cluster"}
                  or
                  kube_pod_windows_container_resource_memory_limit{cluster="$cluster"}
                ) by (namespace)
              format: table
              instant: true
          title: Memory Requests by Namespace
          description: "Table of memory usage vs requests and limits per namespace, including utilisation percentages."
          transformations:
            - id: joinByField
              options:
                byField: namespace
                mode: outer
            - id: organize
              options:
                excludeByName:
                    Time: true
                    Time 1: true
                    Time 2: true
                    Time 3: true
                    Time 4: true
                    Time 5: true
                    Time 6: true
                    Time 7: true
                indexByName:
                    Time 1: 0
                    Time 2: 1
                    Time 3: 2
                    Time 4: 3
                    Time 5: 4
                    Time 6: 5
                    Time 7: 6
                    'Value #A': 8
                    'Value #B': 9
                    'Value #C': 10
                    'Value #D': 11
                    'Value #E': 12
                    'Value #F': 13
                    'Value #G': 14
                    namespace: 7
                renameByName:
                    'Value #A': Pods
                    'Value #B': Workloads
                    'Value #C': Memory Usage
                    'Value #D': Memory Requests
                    'Value #E': Memory Requests %
                    'Value #F': Memory Limits
                    'Value #G': Memory Limits %
                    namespace: Namespace
          type: table
        # ── Network (Linux cadvisor — packets/bandwidth) ────────────────────
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            overrides:
                - matcher:
                    id: byRegexp
                    options: /Bandwidth/
                  properties:
                    - id: unit
                      value: Bps
                - matcher:
                    id: byRegexp
                    options: /Packets/
                  properties:
                    - id: unit
                      value: pps
                - matcher:
                    id: byName
                    options: Namespace
                  properties:
                    - id: links
                      value:
                        - title: Drill down to pods
                          url: /d/k8s-resources-namespace/k8s-resources-namespace?${datasource:queryparam}&var-cluster=$cluster&var-namespace=${__data.fields.Namespace}
          gridPos:
            h: 6
            w: 24
            x: 0
            "y": 34
          id: 17
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  rate(container_network_receive_bytes_total{job="integrations/kubernetes/cadvisor", cluster="$cluster", namespace=~".+"}[$__rate_interval])
                  or
                  rate(windows_container_network_received_bytes_total{cluster="$cluster", namespace=~".+"}[$__rate_interval])
                ) by (namespace)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  rate(container_network_transmit_bytes_total{job="integrations/kubernetes/cadvisor", cluster="$cluster", namespace=~".+"}[$__rate_interval])
                  or
                  rate(windows_container_network_transmitted_bytes_total{cluster="$cluster", namespace=~".+"}[$__rate_interval])
                ) by (namespace)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: sum(rate(container_network_receive_packets_total{job="integrations/kubernetes/cadvisor", cluster="$cluster", namespace=~".+"}[$__rate_interval])) by (namespace)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: sum(rate(container_network_transmit_packets_total{job="integrations/kubernetes/cadvisor", cluster="$cluster", namespace=~".+"}[$__rate_interval])) by (namespace)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: sum(rate(container_network_receive_packets_dropped_total{job="integrations/kubernetes/cadvisor", cluster="$cluster", namespace=~".+"}[$__rate_interval])) by (namespace)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: sum(rate(container_network_transmit_packets_dropped_total{job="integrations/kubernetes/cadvisor", cluster="$cluster", namespace=~".+"}[$__rate_interval])) by (namespace)
              format: table
              instant: true
          title: Current Network Usage
          description: "Snapshot table of current network bandwidth and packet rates per namespace or pod."
          transformations:
            - id: joinByField
              options:
                byField: namespace
                mode: outer
            - id: organize
              options:
                excludeByName:
                    Time: true
                    Time 1: true
                    Time 2: true
                    Time 3: true
                    Time 4: true
                    Time 5: true
                    Time 6: true
                indexByName:
                    Time 1: 0
                    Time 2: 1
                    Time 3: 2
                    Time 4: 3
                    Time 5: 4
                    Time 6: 5
                    'Value #A': 7
                    'Value #B': 8
                    'Value #C': 9
                    'Value #D': 10
                    'Value #E': 11
                    'Value #F': 12
                    namespace: 6
                renameByName:
                    'Value #A': Current Receive Bandwidth
                    'Value #B': Current Transmit Bandwidth
                    'Value #C': Rate of Received Packets
