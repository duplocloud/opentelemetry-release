apiVersion: grizzly.grafana.com/v1alpha1
kind: Dashboard
metadata:
    folder: integration-kubernetes
    name: k8s-resources-namespace
spec:
    annotations:
        list:
            - builtIn: 1
              datasource:
                type: datasource
                uid: grafana
              enable: true
              hide: true
              iconColor: rgba(0, 211, 255, 1)
              name: Annotations & Alerts
              target:
                limit: 100
                matchAny: false
                tags: []
                type: dashboard
              type: dashboard
            - datasource:
                uid: ${lokids}
              enable: true
              expr: '{job!="", cluster="$cluster"} |= "sourcecomponent=kubelet" |~ "sourcehost=$instance" |~ "reason=(Created|Killing|BackOff|SystemOOM|Started)" | logfmt'
              hide: false
              iconColor: blue
              name: K8s events
              tagKeys: reason,type
              target:
                limit: 100
                matchAny: false
                tags: []
                type: dashboard
              textFormat: '{{kind}}: {{name}} in namespace: {{namespace}} on node: {{sourcehost}}'
              titleFormat: '{{msg}}'
    editable: false
    description: "Compute resource usage within a single namespace for both Linux and Windows pods. Drill down into pod-level CPU, memory, and network consumption."
    links:
        - asDropdown: true
          includeVars: true
          keepTime: true
          tags:
            - kubernetes-integration
          targetBlank: false
          title: Kubernetes
          type: dashboards
    panels:
        # ── Utilisation stats ────────────────────────────────────────────────
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                unit: percentunit
          gridPos:
            h: 3
            w: 6
            x: 0
            "y": 0
          id: 1
          interval: 1m
          options:
            colorMode: none
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{cluster="$cluster", namespace="$namespace"}
                  or
                  namespace_pod_container:windows_container_cpu_usage_seconds_total:sum_rate{cluster="$cluster", namespace="$namespace"}
                )
                /
                sum(kube_pod_container_resource_requests{job="integrations/kubernetes/kube-state-metrics", cluster="$cluster", namespace="$namespace", resource="cpu"})
              instant: true
          title: CPU Utilisation (from requests)
          description: "CPU Utilisation (from requests)."
          type: stat
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                unit: percentunit
          gridPos:
            h: 3
            w: 6
            x: 6
            "y": 0
          id: 2
          interval: 1m
          options:
            colorMode: none
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{cluster="$cluster", namespace="$namespace"}
                  or
                  namespace_pod_container:windows_container_cpu_usage_seconds_total:sum_rate{cluster="$cluster", namespace="$namespace"}
                )
                /
                sum(kube_pod_container_resource_limits{job="integrations/kubernetes/kube-state-metrics", cluster="$cluster", namespace="$namespace", resource="cpu"})
              instant: true
          title: CPU Utilisation (from limits)
          description: "CPU Utilisation (from limits)."
          type: stat
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                unit: percentunit
          gridPos:
            h: 3
            w: 6
            x: 12
            "y": 0
          id: 3
          interval: 1m
          options:
            colorMode: none
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  container_memory_working_set_bytes{job="integrations/kubernetes/cadvisor", cluster="$cluster", namespace="$namespace", container!="", image!=""}
                  or
                  windows_container_private_working_set_usage{cluster="$cluster", namespace="$namespace"}
                )
                /
                sum(kube_pod_container_resource_requests{job="integrations/kubernetes/kube-state-metrics", cluster="$cluster", namespace="$namespace", resource="memory"})
              instant: true
          title: Memory Utilisation (from requests)
          description: "Memory Utilisation (from requests)."
          type: stat
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                unit: percentunit
          gridPos:
            h: 3
            w: 6
            x: 18
            "y": 0
          id: 4
          interval: 1m
          options:
            colorMode: none
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  container_memory_working_set_bytes{job="integrations/kubernetes/cadvisor", cluster="$cluster", namespace="$namespace", container!="", image!=""}
                  or
                  windows_container_private_working_set_usage{cluster="$cluster", namespace="$namespace"}
                )
                /
                sum(kube_pod_container_resource_limits{job="integrations/kubernetes/kube-state-metrics", cluster="$cluster", namespace="$namespace", resource="memory"})
              instant: true
          title: Memory Utilisation (from limits)
          description: "Memory Utilisation (from limits)."
          type: stat
        # ── CPU Usage timeseries ─────────────────────────────────────────────
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                custom:
                    fillOpacity: 10
                    showPoints: never
                    spanNulls: true
          gridPos:
            h: 7
            w: 24
            x: 0
            "y": 3
          id: 5
          interval: 1m
          options:
            legend:
                asTable: true
                calcs:
                    - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
            tooltip:
                mode: single
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{cluster="$cluster", namespace="$namespace"}
                  or
                  namespace_pod_container:windows_container_cpu_usage_seconds_total:sum_rate{cluster="$cluster", namespace="$namespace"}
                ) by (pod)
              legendFormat: __auto
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: scalar(max(kube_resourcequota{cluster="$cluster", namespace="$namespace", type="hard",resource="requests.cpu"}))
              legendFormat: quota - requests
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: scalar(max(kube_resourcequota{cluster="$cluster", namespace="$namespace", type="hard",resource="limits.cpu"}))
              legendFormat: quota - limits
          title: CPU Usage
          description: "CPU cores consumed over time. Covers both Linux (cadvisor) and Windows (windows-exporter) containers."
          type: timeseries
        # ── CPU Quota table ──────────────────────────────────────────────────
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            overrides:
                - matcher:
                    id: byRegexp
                    options: /%/
                  properties:
                    - id: unit
                      value: percentunit
                - matcher:
                    id: byName
                    options: Pod
                  properties:
                    - id: links
                      value:
                        - title: Drill down to pod
                          url: /d/k8s-resources-pod/k8s-resources-pod?${datasource:queryparam}&var-cluster=$cluster&var-namespace=$namespace&var-pod=${__data.fields.Pod}
          gridPos:
            h: 7
            w: 24
            x: 0
            "y": 10
          id: 6
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{cluster="$cluster", namespace="$namespace"}
                  or
                  namespace_pod_container:windows_container_cpu_usage_seconds_total:sum_rate{cluster="$cluster", namespace="$namespace"}
                ) by (pod)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  cluster:namespace:pod_cpu:active:kube_pod_container_resource_requests{cluster="$cluster", namespace="$namespace"}
                  or
                  kube_pod_windows_container_resource_cpu_cores_request{cluster="$cluster", namespace="$namespace"}
                ) by (pod)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{cluster="$cluster", namespace="$namespace"}
                  or
                  namespace_pod_container:windows_container_cpu_usage_seconds_total:sum_rate{cluster="$cluster", namespace="$namespace"}
                ) by (pod)
                /
                sum(
                  cluster:namespace:pod_cpu:active:kube_pod_container_resource_requests{cluster="$cluster", namespace="$namespace"}
                  or
                  kube_pod_windows_container_resource_cpu_cores_request{cluster="$cluster", namespace="$namespace"}
                ) by (pod)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  cluster:namespace:pod_cpu:active:kube_pod_container_resource_limits{cluster="$cluster", namespace="$namespace"}
                  or
                  kube_pod_windows_container_resource_cpu_cores_limit{cluster="$cluster", namespace="$namespace"}
                ) by (pod)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{cluster="$cluster", namespace="$namespace"}
                  or
                  namespace_pod_container:windows_container_cpu_usage_seconds_total:sum_rate{cluster="$cluster", namespace="$namespace"}
                ) by (pod)
                /
                sum(
                  cluster:namespace:pod_cpu:active:kube_pod_container_resource_limits{cluster="$cluster", namespace="$namespace"}
                  or
                  kube_pod_windows_container_resource_cpu_cores_limit{cluster="$cluster", namespace="$namespace"}
                ) by (pod)
              format: table
              instant: true
          title: CPU Quota
          description: "Per-namespace/pod/container table showing CPU usage vs requests and limits, including utilisation percentages."
          transformations:
            - id: joinByField
              options:
                byField: pod
                mode: outer
            - id: organize
              options:
                excludeByName:
                    Time: true
                    Time 1: true
                    Time 2: true
                    Time 3: true
                    Time 4: true
                    Time 5: true
                indexByName:
                    Time 1: 0
                    Time 2: 1
                    Time 3: 2
                    Time 4: 3
                    Time 5: 4
                    'Value #A': 6
                    'Value #B': 7
                    'Value #C': 8
                    'Value #D': 9
                    'Value #E': 10
                    pod: 5
                renameByName:
                    'Value #A': CPU Usage
                    'Value #B': CPU Requests
                    'Value #C': CPU Requests %
                    'Value #D': CPU Limits
                    'Value #E': CPU Limits %
                    pod: Pod
          type: table
        # ── Memory Usage timeseries ──────────────────────────────────────────
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                custom:
                    fillOpacity: 10
                    showPoints: never
                    spanNulls: true
                unit: bytes
          gridPos:
            h: 7
            w: 24
            x: 0
            "y": 17
          id: 7
          interval: 1m
          options:
            legend:
                asTable: true
                calcs:
                    - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
            tooltip:
                mode: single
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  container_memory_working_set_bytes{job="integrations/kubernetes/cadvisor", cluster="$cluster", namespace="$namespace", container!="", image!=""}
                  or
                  windows_container_private_working_set_usage{cluster="$cluster", namespace="$namespace"}
                ) by (pod)
              legendFormat: __auto
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: scalar(max(kube_resourcequota{cluster="$cluster", namespace="$namespace", type="hard",resource="requests.memory"}))
              legendFormat: quota - requests
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: scalar(max(kube_resourcequota{cluster="$cluster", namespace="$namespace", type="hard",resource="limits.memory"}))
              legendFormat: quota - limits
          title: Memory Usage (WSS / Private Working Set)
          description: "Memory in use over time. Uses Working Set Size for Linux containers and Private Working Set for Windows containers."
          type: timeseries
        # ── Memory Quota table ───────────────────────────────────────────────
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                unit: bytes
            overrides:
                - matcher:
                    id: byRegexp
                    options: /%/
                  properties:
                    - id: unit
                      value: percentunit
                - matcher:
                    id: byName
                    options: Pod
                  properties:
                    - id: links
                      value:
                        - title: Drill down to pod
                          url: /d/k8s-resources-pod/k8s-resources-pod?${datasource:queryparam}&var-cluster=$cluster&var-namespace=$namespace&var-pod=${__data.fields.Pod}
          gridPos:
            h: 7
            w: 24
            x: 0
            "y": 24
          id: 8
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  container_memory_working_set_bytes{job="integrations/kubernetes/cadvisor", cluster="$cluster", namespace="$namespace", container!="", image!=""}
                  or
                  windows_container_private_working_set_usage{cluster="$cluster", namespace="$namespace"}
                ) by (pod)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  cluster:namespace:pod_memory:active:kube_pod_container_resource_requests{cluster="$cluster", namespace="$namespace"}
                  or
                  kube_pod_windows_container_resource_memory_request{cluster="$cluster", namespace="$namespace"}
                ) by (pod)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  container_memory_working_set_bytes{job="integrations/kubernetes/cadvisor", cluster="$cluster", namespace="$namespace", container!="", image!=""}
                  or
                  windows_container_private_working_set_usage{cluster="$cluster", namespace="$namespace"}
                ) by (pod)
                /
                sum(
                  cluster:namespace:pod_memory:active:kube_pod_container_resource_requests{cluster="$cluster", namespace="$namespace"}
                  or
                  kube_pod_windows_container_resource_memory_request{cluster="$cluster", namespace="$namespace"}
                ) by (pod)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  cluster:namespace:pod_memory:active:kube_pod_container_resource_limits{cluster="$cluster", namespace="$namespace"}
                  or
                  kube_pod_windows_container_resource_memory_limit{cluster="$cluster", namespace="$namespace"}
                ) by (pod)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  container_memory_working_set_bytes{job="integrations/kubernetes/cadvisor", cluster="$cluster", namespace="$namespace", container!="", image!=""}
                  or
                  windows_container_private_working_set_usage{cluster="$cluster", namespace="$namespace"}
                ) by (pod)
                /
                sum(
                  cluster:namespace:pod_memory:active:kube_pod_container_resource_limits{cluster="$cluster", namespace="$namespace"}
                  or
                  kube_pod_windows_container_resource_memory_limit{cluster="$cluster", namespace="$namespace"}
                ) by (pod)
              format: table
              instant: true
          title: Memory Quota
          description: "Per-namespace/pod/container table showing memory usage vs requests and limits."
          transformations:
            - id: joinByField
              options:
                byField: pod
                mode: outer
            - id: organize
              options:
                excludeByName:
                    Time: true
                    Time 1: true
                    Time 2: true
                    Time 3: true
                    Time 4: true
                    Time 5: true
                indexByName:
                    Time 1: 0
                    Time 2: 1
                    Time 3: 2
                    Time 4: 3
                    Time 5: 4
                    'Value #A': 6
                    'Value #B': 7
                    'Value #C': 8
                    'Value #D': 9
                    'Value #E': 10
                    pod: 5
                renameByName:
                    'Value #A': Memory Usage
                    'Value #B': Memory Requests
                    'Value #C': Memory Requests %
                    'Value #D': Memory Limits
                    'Value #E': Memory Limits %
                    pod: Pod
          type: table
        # ── Network ──────────────────────────────────────────────────────────
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                custom:
                    fillOpacity: 10
                    showPoints: never
                    spanNulls: true
                unit: Bps
          gridPos:
            h: 7
            w: 24
            x: 0
            "y": 31
          id: 9
          interval: 1m
          options:
            legend:
                asTable: true
                calcs:
                    - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
            tooltip:
                mode: single
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  rate(container_network_receive_bytes_total{job="integrations/kubernetes/cadvisor", cluster="$cluster", namespace="$namespace"}[$__rate_interval])
                  or
                  rate(windows_container_network_received_bytes_total{cluster="$cluster", namespace="$namespace"}[$__rate_interval])
                ) by (pod)
              legendFormat: '{{pod}} rx'
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  rate(container_network_transmit_bytes_total{job="integrations/kubernetes/cadvisor", cluster="$cluster", namespace="$namespace"}[$__rate_interval])
                  or
                  rate(windows_container_network_transmitted_bytes_total{cluster="$cluster", namespace="$namespace"}[$__rate_interval])
                ) by (pod)
              legendFormat: '{{pod}} tx'
          title: Network I/O
          description: "Network receive and transmit throughput per pod. Linux uses cadvisor metrics; Windows uses windows-exporter container metrics."
          type: timeseries
    refresh: 1m
    schemaVersion: 39
    tags:
        - kubernetes-integration
        - kubernetes-windows-integration
    templating:
        list:
            - current:
                selected: true
                text: duplo-metrics
                value: duplo-metrics
              hide: 0
              label: Data source
              name: datasource
              query: prometheus
              regex: ""
              type: datasource
            - datasource:
                type: prometheus
                uid: ${datasource}
              hide: 0
              label: cluster
              name: cluster
              query: label_values(kube_node_info{job="integrations/kubernetes/kube-state-metrics"}, cluster)
              refresh: 2
              sort: 1
              type: query
            - datasource:
                type: prometheus
                uid: ${datasource}
              hide: 0
              label: namespace
              name: namespace
              query: label_values(kube_namespace_status_phase{job="integrations/kubernetes/kube-state-metrics", cluster="$cluster"}, namespace)
              refresh: 2
              sort: 1
              type: query
            - current:
                selected: true
                text:
                    - All
                value:
                    - $__all
              hide: 0
              includeAll: true
              label: Events Data Source
              multi: true
              name: lokids
              options: []
              query: loki
              refresh: 1
              regex: ""
              skipUrlSync: false
              type: datasource
    time:
        from: now-1h
        to: now
    timezone: utc
    title: K8s / Compute Resources / Namespace (Pods)
    uid: k8s-resources-namespace
