apiVersion: grizzly.grafana.com/v1alpha1
kind: Dashboard
metadata:
    folder: integration-kubernetes
    name: k8s-resources-pod
spec:
    annotations:
        list:
            - builtIn: 1
              datasource:
                type: datasource
                uid: grafana
              enable: true
              hide: true
              iconColor: rgba(0, 211, 255, 1)
              name: Annotations & Alerts
              target:
                limit: 100
                matchAny: false
                tags: []
                type: dashboard
              type: dashboard
            - datasource:
                uid: ${lokids}
              enable: true
              expr: '{job!="", cluster="$cluster"} |= "sourcecomponent=kubelet" |~ "sourcehost=$instance" |~ "reason=(Created|Killing|BackOff|SystemOOM|Started)" | logfmt'
              hide: false
              iconColor: blue
              name: K8s events
              tagKeys: reason,type
              target:
                limit: 100
                matchAny: false
                tags: []
                type: dashboard
              textFormat: '{{kind}}: {{name}} in namespace: {{namespace}} on node: {{sourcehost}}'
              titleFormat: '{{msg}}'
    editable: false
    description: "Detailed compute resource usage for a single pod. Shows per-container CPU and memory usage vs requests/limits, network I/O, and pod metadata."
    links:
        - asDropdown: true
          includeVars: true
          keepTime: true
          tags:
            - kubernetes-integration
          targetBlank: false
          title: Kubernetes
          type: dashboards
    panels:
        # ── Pod metadata ─────────────────────────────────────────────────────
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                unit: none
          gridPos:
            h: 3
            w: 4
            x: 0
            "y": 0
          id: 1
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: kube_pod_status_phase{job="integrations/kubernetes/kube-state-metrics", cluster="$cluster", namespace="$namespace", pod="$pod"} == 1
              legendFormat: '{{phase}}'
              instant: true
          title: Status
          description: "Current phase of the pod (Running, Pending, Failed, etc.)."
          type: stat
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                unit: none
          gridPos:
            h: 3
            w: 5
            x: 4
            "y": 0
          id: 2
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: kube_pod_info{job="integrations/kubernetes/kube-state-metrics", cluster="$cluster", namespace="$namespace", pod="$pod"}
              legendFormat: '{{node}}'
              instant: true
          title: Node
          description: "The node this pod is currently scheduled on."
          type: stat
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                unit: none
          gridPos:
            h: 3
            w: 5
            x: 9
            "y": 0
          id: 3
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: kube_pod_owner{job="integrations/kubernetes/kube-state-metrics", cluster="$cluster", namespace="$namespace", pod="$pod", owner_is_controller="true"}
              legendFormat: '{{owner_kind}}/{{owner_name}}'
              instant: true
          title: Owner
          description: "The controller that owns this pod (Deployment, DaemonSet, StatefulSet, etc.)."
          type: stat
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                unit: s
          gridPos:
            h: 3
            w: 4
            x: 14
            "y": 0
          id: 4
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: time() - kube_pod_start_time{job="integrations/kubernetes/kube-state-metrics", cluster="$cluster", namespace="$namespace", pod="$pod"}
              instant: true
          title: Age
          description: "Time elapsed since the pod was started."
          type: stat
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                unit: none
          gridPos:
            h: 3
            w: 3
            x: 18
            "y": 0
          id: 5
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: sum(kube_pod_container_status_restarts_total{job="integrations/kubernetes/kube-state-metrics", cluster="$cluster", namespace="$namespace", pod="$pod"})
              instant: true
          title: Restarts
          description: "Total number of container restarts across all containers in this pod. Frequent restarts may indicate a crash-loop."
          type: stat
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                unit: none
          gridPos:
            h: 3
            w: 3
            x: 21
            "y": 0
          id: 6
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: kube_pod_info{job="integrations/kubernetes/kube-state-metrics", cluster="$cluster", namespace="$namespace", pod="$pod", pod_ip!=""}
              legendFormat: '{{pod_ip}}'
              instant: true
          title: Pod IP
          description: "The IP address assigned to this pod within the cluster network."
          type: stat
        # ── CPU Usage ────────────────────────────────────────────────────────
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                custom:
                    fillOpacity: 10
                    showPoints: never
                    spanNulls: true
          gridPos:
            h: 7
            w: 24
            x: 0
            "y": 3
          id: 7
          interval: 1m
          options:
            legend:
                asTable: true
                calcs:
                    - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
            tooltip:
                mode: single
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{namespace="$namespace", pod="$pod", cluster="$cluster", container!=""}
                  or
                  namespace_pod_container:windows_container_cpu_usage_seconds_total:sum_rate{cluster="$cluster", namespace="$namespace", pod="$pod"}
                ) by (container)
              legendFormat: __auto
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: sum(kube_pod_container_resource_requests{job="integrations/kubernetes/kube-state-metrics", cluster="$cluster", namespace="$namespace", pod="$pod", resource="cpu"})
              legendFormat: requests
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: sum(kube_pod_container_resource_limits{job="integrations/kubernetes/kube-state-metrics", cluster="$cluster", namespace="$namespace", pod="$pod", resource="cpu"})
              legendFormat: limits
          title: CPU Usage
          description: "CPU cores consumed over time. Covers both Linux (cadvisor) and Windows (windows-exporter) containers."
          type: timeseries
        # ── CPU Quota table ──────────────────────────────────────────────────
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            overrides:
                - matcher:
                    id: byRegexp
                    options: /%/
                  properties:
                    - id: unit
                      value: percentunit
          gridPos:
            h: 7
            w: 24
            x: 0
            "y": 10
          id: 8
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{cluster="$cluster", namespace="$namespace", pod="$pod", container!=""}
                  or
                  namespace_pod_container:windows_container_cpu_usage_seconds_total:sum_rate{cluster="$cluster", namespace="$namespace", pod="$pod"}
                ) by (container)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  cluster:namespace:pod_cpu:active:kube_pod_container_resource_requests{cluster="$cluster", namespace="$namespace", pod="$pod", container!=""}
                  or
                  kube_pod_windows_container_resource_cpu_cores_request{cluster="$cluster", namespace="$namespace", pod="$pod"}
                ) by (container)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{cluster="$cluster", namespace="$namespace", pod="$pod", container!=""}
                  or
                  namespace_pod_container:windows_container_cpu_usage_seconds_total:sum_rate{cluster="$cluster", namespace="$namespace", pod="$pod"}
                ) by (container)
                /
                sum(
                  cluster:namespace:pod_cpu:active:kube_pod_container_resource_requests{cluster="$cluster", namespace="$namespace", pod="$pod", container!=""}
                  or
                  kube_pod_windows_container_resource_cpu_cores_request{cluster="$cluster", namespace="$namespace", pod="$pod"}
                ) by (container)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  cluster:namespace:pod_cpu:active:kube_pod_container_resource_limits{cluster="$cluster", namespace="$namespace", pod="$pod", container!=""}
                  or
                  kube_pod_windows_container_resource_cpu_cores_limit{cluster="$cluster", namespace="$namespace", pod="$pod"}
                ) by (container)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{cluster="$cluster", namespace="$namespace", pod="$pod", container!=""}
                  or
                  namespace_pod_container:windows_container_cpu_usage_seconds_total:sum_rate{cluster="$cluster", namespace="$namespace", pod="$pod"}
                ) by (container)
                /
                sum(
                  cluster:namespace:pod_cpu:active:kube_pod_container_resource_limits{cluster="$cluster", namespace="$namespace", pod="$pod", container!=""}
                  or
                  kube_pod_windows_container_resource_cpu_cores_limit{cluster="$cluster", namespace="$namespace", pod="$pod"}
                ) by (container)
              format: table
              instant: true
          title: CPU Quota
          description: "Per-namespace/pod/container table showing CPU usage vs requests and limits, including utilisation percentages."
          transformations:
            - id: joinByField
              options:
                byField: container
                mode: outer
            - id: organize
              options:
                excludeByName:
                    Time: true
                    Time 1: true
                    Time 2: true
                    Time 3: true
                    Time 4: true
                    Time 5: true
                indexByName:
                    Time 1: 0
                    Time 2: 1
                    Time 3: 2
                    Time 4: 3
                    Time 5: 4
                    'Value #A': 6
                    'Value #B': 7
                    'Value #C': 8
                    'Value #D': 9
                    'Value #E': 10
                    container: 5
                renameByName:
                    'Value #A': CPU Usage
                    'Value #B': CPU Requests
                    'Value #C': CPU Requests %
                    'Value #D': CPU Limits
                    'Value #E': CPU Limits %
                    container: Container
          type: table
        # ── Memory Usage ─────────────────────────────────────────────────────
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                custom:
                    fillOpacity: 10
                    showPoints: never
                    spanNulls: true
                unit: bytes
          gridPos:
            h: 7
            w: 24
            x: 0
            "y": 17
          id: 9
          interval: 1m
          options:
            legend:
                asTable: true
                calcs:
                    - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
            tooltip:
                mode: single
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  container_memory_working_set_bytes{job="integrations/kubernetes/cadvisor", cluster="$cluster", namespace="$namespace", pod="$pod", container!="", image!=""}
                  or
                  windows_container_private_working_set_usage{cluster="$cluster", namespace="$namespace", pod="$pod"}
                ) by (container)
              legendFormat: __auto
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: sum(kube_pod_container_resource_requests{job="integrations/kubernetes/kube-state-metrics", cluster="$cluster", namespace="$namespace", pod="$pod", resource="memory"})
              legendFormat: requests
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: sum(kube_pod_container_resource_limits{job="integrations/kubernetes/kube-state-metrics", cluster="$cluster", namespace="$namespace", pod="$pod", resource="memory"})
              legendFormat: limits
          title: Memory Usage (WSS / Private Working Set)
          description: "Memory in use over time. Uses Working Set Size for Linux containers and Private Working Set for Windows containers."
          type: timeseries
        # ── Memory Quota table ───────────────────────────────────────────────
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                unit: bytes
            overrides:
                - matcher:
                    id: byRegexp
                    options: /%/
                  properties:
                    - id: unit
                      value: percentunit
          gridPos:
            h: 7
            w: 24
            x: 0
            "y": 24
          id: 10
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  container_memory_working_set_bytes{job="integrations/kubernetes/cadvisor", cluster="$cluster", namespace="$namespace", pod="$pod", container!="", image!=""}
                  or
                  windows_container_private_working_set_usage{cluster="$cluster", namespace="$namespace", pod="$pod"}
                ) by (container)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  cluster:namespace:pod_memory:active:kube_pod_container_resource_requests{cluster="$cluster", namespace="$namespace", pod="$pod"}
                  or
                  kube_pod_windows_container_resource_memory_request{cluster="$cluster", namespace="$namespace", pod="$pod"}
                ) by (container)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  container_memory_working_set_bytes{job="integrations/kubernetes/cadvisor", cluster="$cluster", namespace="$namespace", pod="$pod", container!="", image!=""}
                  or
                  windows_container_private_working_set_usage{cluster="$cluster", namespace="$namespace", pod="$pod"}
                ) by (container)
                /
                sum(
                  cluster:namespace:pod_memory:active:kube_pod_container_resource_requests{cluster="$cluster", namespace="$namespace", pod="$pod"}
                  or
                  kube_pod_windows_container_resource_memory_request{cluster="$cluster", namespace="$namespace", pod="$pod"}
                ) by (container)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  cluster:namespace:pod_memory:active:kube_pod_container_resource_limits{cluster="$cluster", namespace="$namespace", pod="$pod"}
                  or
                  kube_pod_windows_container_resource_memory_limit{cluster="$cluster", namespace="$namespace", pod="$pod"}
                ) by (container)
              format: table
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  container_memory_working_set_bytes{job="integrations/kubernetes/cadvisor", cluster="$cluster", namespace="$namespace", pod="$pod", container!="", image!=""}
                  or
                  windows_container_private_working_set_usage{cluster="$cluster", namespace="$namespace", pod="$pod"}
                ) by (container)
                /
                sum(
                  cluster:namespace:pod_memory:active:kube_pod_container_resource_limits{cluster="$cluster", namespace="$namespace", pod="$pod"}
                  or
                  kube_pod_windows_container_resource_memory_limit{cluster="$cluster", namespace="$namespace", pod="$pod"}
                ) by (container)
              format: table
              instant: true
          title: Memory Quota
          description: "Per-namespace/pod/container table showing memory usage vs requests and limits."
          transformations:
            - id: joinByField
              options:
                byField: container
                mode: outer
            - id: organize
              options:
                excludeByName:
                    Time: true
                    Time 1: true
                    Time 2: true
                    Time 3: true
                    Time 4: true
                    Time 5: true
                indexByName:
                    Time 1: 0
                    Time 2: 1
                    Time 3: 2
                    Time 4: 3
                    Time 5: 4
                    'Value #A': 6
                    'Value #B': 7
                    'Value #C': 8
                    'Value #D': 9
                    'Value #E': 10
                    container: 5
                renameByName:
                    'Value #A': Memory Usage
                    'Value #B': Memory Requests
                    'Value #C': Memory Requests %
                    'Value #D': Memory Limits
                    'Value #E': Memory Limits %
                    container: Container
          type: table
        # ── Network I/O ──────────────────────────────────────────────────────
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                custom:
                    fillOpacity: 10
                    showPoints: never
                    spanNulls: true
                unit: Bps
          gridPos:
            h: 7
            w: 24
            x: 0
            "y": 31
          id: 11
          interval: 1m
          options:
            legend:
                asTable: true
                calcs:
                    - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
            tooltip:
                mode: single
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  irate(container_network_receive_bytes_total{job="integrations/kubernetes/cadvisor", cluster="$cluster", namespace="$namespace", pod=~"$pod"}[$__rate_interval])
                  or
                  rate(windows_container_network_received_bytes_total{cluster="$cluster", namespace="$namespace", pod="$pod"}[$__rate_interval])
                ) by (pod)
              legendFormat: '{{pod}} rx'
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: |
                sum(
                  rate(container_network_transmit_bytes_total{job="integrations/kubernetes/cadvisor", cluster="$cluster", namespace="$namespace", pod=~"$pod"}[$__rate_interval])
                  or
                  rate(windows_container_network_transmitted_bytes_total{cluster="$cluster", namespace="$namespace", pod="$pod"}[$__rate_interval])
                ) by (pod)
              legendFormat: '{{pod}} tx'
          title: Network I/O
          description: "Network receive and transmit throughput per pod. Linux uses cadvisor metrics; Windows uses windows-exporter container metrics."
          type: timeseries
        # ── Storage IO (Linux only) ──────────────────────────────────────────
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                custom:
                    fillOpacity: 10
                    showPoints: never
                    spanNulls: true
                unit: iops
          gridPos:
            h: 7
            w: 12
            x: 0
            "y": 38
          id: 12
          interval: 1m
          options:
            legend:
                asTable: true
                calcs:
                    - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
            tooltip:
                mode: single
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: ceil(sum by(pod) (rate(container_fs_reads_total{job="integrations/kubernetes/cadvisor", device=~"(/dev.+)|mmcblk.p.+|nvme.+|rbd.+|sd.+|vd.+|xvd.+|dm-.+|dasd.+", container!="", cluster="$cluster", namespace="$namespace", pod=~"$pod"}[$__rate_interval])))
              legendFormat: '{{pod}} reads'
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: ceil(sum by(pod) (rate(container_fs_writes_total{job="integrations/kubernetes/cadvisor", device=~"(/dev.+)|mmcblk.p.+|nvme.+|rbd.+|sd.+|vd.+|xvd.+|dm-.+|dasd.+", container!="", cluster="$cluster",namespace="$namespace", pod=~"$pod"}[$__rate_interval])))
              legendFormat: '{{pod}} writes'
          title: 'IOPS — Linux nodes'
          description: "Read and write I/O operations per second per pod on Linux nodes."
          type: timeseries
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                custom:
                    fillOpacity: 10
                    showPoints: never
                    spanNulls: true
                unit: Bps
          gridPos:
            h: 7
            w: 12
            x: 12
            "y": 38
          id: 13
          interval: 1m
          options:
            legend:
                asTable: true
                calcs:
                    - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
            tooltip:
                mode: single
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: sum by(pod) (rate(container_fs_reads_bytes_total{job="integrations/kubernetes/cadvisor", device=~"(/dev.+)|mmcblk.p.+|nvme.+|rbd.+|sd.+|vd.+|xvd.+|dm-.+|dasd.+", container!="", cluster="$cluster", namespace="$namespace", pod=~"$pod"}[$__rate_interval]))
              legendFormat: '{{pod}} read'
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: sum by(pod) (rate(container_fs_writes_bytes_total{job="integrations/kubernetes/cadvisor", device=~"(/dev.+)|mmcblk.p.+|nvme.+|rbd.+|sd.+|vd.+|xvd.+|dm-.+|dasd.+", container!="", cluster="$cluster", namespace="$namespace", pod=~"$pod"}[$__rate_interval]))
              legendFormat: '{{pod}} write'
          title: 'ThroughPut — Linux nodes'
          description: "Read and write disk throughput per pod on Linux nodes."
          type: timeseries
        # ── QoS class ────────────────────────────────────────────────────────
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                unit: none
          gridPos:
            h: 3
            w: 8
            x: 0
            "y": 45
          id: 14
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: absent(kube_pod_container_resource_requests{job="integrations/kubernetes/kube-state-metrics", cluster="$cluster", namespace="$namespace", pod="$pod"})
              legendFormat: BestEffort
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: "(sum(kube_pod_container_resource_requests{job=\"integrations/kubernetes/kube-state-metrics\", cluster=\"$cluster\", namespace=\"$namespace\", pod=\"$pod\", resource=\"cpu\"}) == sum(kube_pod_container_resource_limits{job=\"integrations/kubernetes/kube-state-metrics\", cluster=\"$cluster\", namespace=\"$namespace\", pod=\"$pod\", resource=\"cpu\"})) * (sum(kube_pod_container_resource_requests{job=\"integrations/kubernetes/kube-state-metrics\", cluster=\"$cluster\", namespace=\"$namespace\", pod=\"$pod\", resource=\"memory\"}) == sum(kube_pod_container_resource_limits{job=\"integrations/kubernetes/kube-state-metrics\", cluster=\"$cluster\", namespace=\"$namespace\", pod=\"$pod\", resource=\"memory\"}))"
              legendFormat: Guaranteed
              instant: true
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: "(sum(kube_pod_container_resource_requests{job=\"integrations/kubernetes/kube-state-metrics\", cluster=\"$cluster\", namespace=\"$namespace\", pod=\"$pod\"}) > 0) unless ((sum(kube_pod_container_resource_requests{job=\"integrations/kubernetes/kube-state-metrics\", cluster=\"$cluster\", namespace=\"$namespace\", pod=\"$pod\", resource=\"cpu\"}) == sum(kube_pod_container_resource_limits{job=\"integrations/kubernetes/kube-state-metrics\", cluster=\"$cluster\", namespace=\"$namespace\", pod=\"$pod\", resource=\"cpu\"})) * (sum(kube_pod_container_resource_requests{job=\"integrations/kubernetes/kube-state-metrics\", cluster=\"$cluster\", namespace=\"$namespace\", pod=\"$pod\", resource=\"memory\"}) == sum(kube_pod_container_resource_limits{job=\"integrations/kubernetes/kube-state-metrics\", cluster=\"$cluster\", namespace=\"$namespace\", pod=\"$pod\", resource=\"memory\"})))"
              legendFormat: Burstable
              instant: true
          title: QoS Class
          description: "Kubernetes Quality of Service class assigned to this pod: Guaranteed (requests == limits), Burstable (requests < limits), or BestEffort (no requests/limits set)."
          type: stat
    refresh: 1m
    schemaVersion: 39
    tags:
        - kubernetes-integration
        - kubernetes-windows-integration
    templating:
        list:
            - current:
                selected: true
                text: duplo-metrics
                value: duplo-metrics
              hide: 0
              label: Data source
              name: datasource
              query: prometheus
              regex: ""
              type: datasource
            - datasource:
                type: prometheus
                uid: ${datasource}
              hide: 0
              label: cluster
              name: cluster
              query: label_values(kube_node_info{job="integrations/kubernetes/kube-state-metrics"}, cluster)
              refresh: 2
              sort: 1
              type: query
            - datasource:
                type: prometheus
                uid: ${datasource}
              hide: 0
              label: namespace
              name: namespace
              query: label_values(kube_namespace_status_phase{job="integrations/kubernetes/kube-state-metrics", cluster="$cluster"}, namespace)
              refresh: 2
              sort: 1
              type: query
            - datasource:
                type: prometheus
                uid: ${datasource}
              hide: 0
              label: pod
              name: pod
              query: label_values(kube_pod_info{job="integrations/kubernetes/kube-state-metrics", cluster="$cluster", namespace="$namespace"}, pod)
              refresh: 2
              sort: 1
              type: query
            - current:
                selected: true
                text:
                    - All
                value:
                    - $__all
              hide: 0
              includeAll: true
              label: Events Data Source
              multi: true
              name: lokids
              options: []
              query: loki
              refresh: 1
              regex: ""
