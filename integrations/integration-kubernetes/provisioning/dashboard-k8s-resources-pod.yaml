apiVersion: grizzly.grafana.com/v1alpha1
kind: Dashboard
metadata:
  folder: integration-kubernetes
  name: k8s-resources-pod
spec:
  annotations:
    list:
    - builtIn: 1
      datasource:
        type: datasource
        uid: grafana
      enable: true
      hide: true
      iconColor: rgba(0, 211, 255, 1)
      name: Annotations & Alerts
      target:
        limit: 100
        matchAny: false
        tags: []
        type: dashboard
      type: dashboard
    - datasource:
        uid: ${lokids}
      enable: true
      expr: '{job!="", cluster="$cluster"} |= "sourcecomponent=kubelet" |~ "sourcehost=$instance" |~ "reason=(Created|Killing|BackOff|SystemOOM|Started)" | logfmt'
      hide: false
      iconColor: blue
      name: K8s events
      tagKeys: reason,type
      target:
        limit: 100
        matchAny: false
        tags: []
        type: dashboard
      textFormat: '{{kind}}: {{name}} in namespace: {{namespace}} on node: {{sourcehost}}'
      titleFormat: '{{msg}}'
  editable: false
  links:
  - asDropdown: true
    includeVars: true
    keepTime: true
    tags:
    - kubernetes-integration
    targetBlank: false
    title: Kubernetes
    type: dashboards
  panels:
  - datasource:
      type: datasource
      uid: -- Mixed --
    fieldConfig:
      defaults:
        custom:
          fillOpacity: 10
          showPoints: never
          spanNulls: true
      overrides:
      - matcher:
          id: byFrameRefID
          options: B
        properties:
        - id: custom.lineStyle
          value:
            fill: dash
        - id: custom.lineWidth
          value: 2
        - id: color
          value:
            fixedColor: red
            mode: fixed
      - matcher:
          id: byFrameRefID
          options: C
        properties:
        - id: custom.lineStyle
          value:
            fill: dash
        - id: custom.lineWidth
          value: 2
        - id: color
          value:
            fixedColor: orange
            mode: fixed
    gridPos:
      h: 7
      w: 24
      x: 0
      "y": 4
    id: 1
    interval: 1m
    options:
      legend:
        asTable: true
        calcs:
        - lastNotNull
        displayMode: table
        placement: right
        showLegend: true
      tooltip:
        mode: single
    pluginVersion: v11.4.0
    targets:
    - datasource:
        type: prometheus
        uid: ${datasource}
      expr: sum(node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{namespace="$namespace", pod="$pod", cluster="$cluster", container!=""}) by (container)
      legendFormat: __auto
    - datasource:
        type: prometheus
        uid: ${datasource}
      expr: "sum(\n    kube_pod_container_resource_requests{job=\"integrations/kubernetes/kube-state-metrics\", cluster=\"$cluster\", namespace=\"$namespace\", pod=\"$pod\", resource=\"cpu\"}\n)\n"
      legendFormat: requests
    - datasource:
        type: prometheus
        uid: ${datasource}
      expr: "sum(\n    kube_pod_container_resource_limits{job=\"integrations/kubernetes/kube-state-metrics\", cluster=\"$cluster\", namespace=\"$namespace\", pod=\"$pod\", resource=\"cpu\"}\n)\n"
      legendFormat: limits
    title: CPU Usage
    type: timeseries
  - datasource:
      type: datasource
      uid: -- Mixed --
    fieldConfig:
      defaults:
        custom:
          axisColorMode: thresholds
          axisSoftMax: 1
          axisSoftMin: 0
          fillOpacity: 10
          showPoints: never
          spanNulls: true
          thresholdsStyle:
            mode: dashed+area
        unit: percentunit
      overrides:
      - matcher:
          id: byFrameRefID
          options: A
        properties:
        - id: thresholds
          value:
            mode: absolute
            steps:
            - color: green
              value: null
            - color: red
              value: 0.25
        - id: color
          value:
            mode: thresholds
            seriesBy: lastNotNull
    gridPos:
      h: 7
      w: 24
      x: 0
      "y": 11
    id: 2
    interval: 1m
    options:
      legend:
        asTable: true
        calcs:
        - lastNotNull
        displayMode: table
        placement: right
        showLegend: true
      tooltip:
        mode: single
    pluginVersion: v11.4.0
    targets:
    - datasource:
        type: prometheus
        uid: ${datasource}
      expr: sum(increase(container_cpu_cfs_throttled_periods_total{job="integrations/kubernetes/cadvisor", namespace="$namespace", pod="$pod", container!="", cluster="$cluster"}[$__rate_interval])) by (container) /sum(increase(container_cpu_cfs_periods_total{job="integrations/kubernetes/cadvisor", namespace="$namespace", pod="$pod", container!="", cluster="$cluster"}[$__rate_interval])) by (container)
      legendFormat: __auto
    title: CPU Throttling
    type: timeseries
  - datasource:
      type: datasource
      uid: -- Mixed --
    fieldConfig:
      overrides:
      - matcher:
          id: byRegexp
          options: /%/
        properties:
        - id: unit
          value: percentunit
    gridPos:
      h: 7
      w: 24
      x: 0
      "y": 18
    id: 3
    pluginVersion: v11.4.0
    targets:
    - datasource:
        type: prometheus
        uid: ${datasource}
      expr: sum(node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{cluster="$cluster", namespace="$namespace", pod="$pod", container!=""}) by (container)
      format: table
      instant: true
    - datasource:
        type: prometheus
        uid: ${datasource}
      expr: sum(cluster:namespace:pod_cpu:active:kube_pod_container_resource_requests{cluster="$cluster", namespace="$namespace", pod="$pod", container!=""}) by (container)
      format: table
      instant: true
    - datasource:
        type: prometheus
        uid: ${datasource}
      expr: sum(node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{cluster="$cluster", namespace="$namespace", pod="$pod", container!=""}) by (container) / sum(cluster:namespace:pod_cpu:active:kube_pod_container_resource_requests{cluster="$cluster", namespace="$namespace", pod="$pod", container!=""}) by (container)
      format: table
      instant: true
    - datasource:
        type: prometheus
        uid: ${datasource}
      expr: sum(cluster:namespace:pod_cpu:active:kube_pod_container_resource_limits{cluster="$cluster", namespace="$namespace", pod="$pod", container!=""}) by (container)
      format: table
      instant: true
    - datasource:
        type: prometheus
        uid: ${datasource}
      expr: sum(node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{cluster="$cluster", namespace="$namespace", pod="$pod", container!=""}) by (container) / sum(cluster:namespace:pod_cpu:active:kube_pod_container_resource_limits{cluster="$cluster", namespace="$namespace", pod="$pod", container!=""}) by (container)
      format: table
      instant: true
    title: CPU Quota
    transformations:
    - id: joinByField
      options:
        byField: container
        mode: outer
    - id: organize
      options:
        excludeByName:
          Time: true
          Time 1: true
          Time 2: true
          Time 3: true
          Time 4: true
          Time 5: true
        indexByName:
          Time 1: 0
          Time 2: 1
          Time 3: 2
          Time 4: 3
          Time 5: 4
          'Value #A': 6
          'Value #B': 7
          'Value #C': 8
          'Value #D': 9
          'Value #E': 10
          container: 5
        renameByName:
          'Value #A': CPU Usage
          'Value #B': CPU Requests
          'Value #C': CPU Requests %
          'Value #D': CPU Limits
          'Value #E': CPU Limits %
          container: Container
    type: table
  - datasource:
      type: datasource
      uid: -- Mixed --
    fieldConfig:
      defaults:
        custom:
          fillOpacity: 10
          showPoints: never
          spanNulls: true
        unit: bytes
      overrides:
      - matcher:
          id: byFrameRefID
