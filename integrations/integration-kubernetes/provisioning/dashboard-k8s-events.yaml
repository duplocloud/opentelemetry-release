apiVersion: grizzly.grafana.com/v1alpha1
kind: Dashboard
metadata:
    folder: integration-kubernetes
    name: k8s-events
spec:
    annotations:
        list:
            - builtIn: 1
              datasource:
                type: datasource
                uid: grafana
              enable: true
              hide: true
              iconColor: rgba(0, 211, 255, 1)
              name: Annotations & Alerts
              target:
                limit: 100
                matchAny: false
                tags: []
                type: dashboard
              type: dashboard
            - datasource:
                uid: ${lokids}
              enable: true
              expr: '{job!="", cluster="$cluster"} |= "sourcecomponent=kubelet" |~ "sourcehost=$instance" |~ "reason=(Created|Killing|BackOff|SystemOOM|Started)" | logfmt'
              hide: false
              iconColor: blue
              name: K8s events
              tagKeys: reason,type
              target:
                limit: 100
                matchAny: false
                tags: []
                type: dashboard
              textFormat: '{{kind}}: {{name}} in namespace: {{namespace}} on node: {{sourcehost}}'
              titleFormat: '{{msg}}'
    description: Kubernetes Events
    editable: false
    fiscalYearStartMonth: 0
    graphTooltip: 0
    links: []
    panels:
        - collapsed: false
          gridPos:
            h: 1
            w: 24
            x: 0
            "y": 0
          id: 34
          panels: []
          title: Kubernetes Events - Details
          description: "Kubernetes Events - Details."
          type: row
        - datasource:
            default: false
            type: loki
            uid: ${datasource}
          fieldConfig:
            defaults:
                color:
                    mode: thresholds
                custom:
                    align: auto
                    cellOptions:
                        type: auto
                    filterable: true
                    inspect: false
                    minWidth: 65
                links: []
                mappings: []
                thresholds:
                    mode: absolute
                    steps:
                        - color: green
            overrides:
                - matcher:
                    id: byName
                    options: labels
                  properties:
                    - id: custom.filterable
                    - id: custom.inspect
                      value: true
                - matcher:
                    id: byName
                    options: reason
                  properties:
                    - id: custom.filterable
                      value: true
                - matcher:
                    id: byName
                    options: type
                  properties:
                    - id: mappings
                      value:
                        - options:
                            Normal:
                                color: text
                                index: 1
                            Warning:
                                color: red
                                index: 0
                          type: value
                    - id: custom.cellOptions
                      value:
                        type: color-text
                    - id: custom.width
                      value: 66
                - matcher:
                    id: byName
                    options: msg
                  properties:
                    - id: custom.minWidth
                      value: 280
                - matcher:
                    id: byName
                    options: name
                  properties:
                    - id: custom.minWidth
                      value: 245
                - matcher:
                    id: byName
                    options: count
                  properties:
                    - id: custom.width
                      value: 55
                - matcher:
                    id: byType
                    options: Time
                  properties:
                    - id: custom.filterable
                      value: false
                    - id: unit
                      value: dateTimeFromNow
                - matcher:
                    id: byName
                    options: lastTimestamp
                  properties:
                    - id: custom.filterable
                - matcher:
                    id: byName
                    options: Message
                  properties:
                    - id: custom.width
                      value: 555
                - matcher:
                    id: byName
                    options: Cluster
                  properties:
                    - id: custom.width
                      value: 135
          gridPos:
            h: 13
            w: 24
            x: 0
            "y": 1
          id: 36
          options:
            cellHeight: sm
            footer:
                countRows: false
                enablePagination: true
                fields: ""
                reducer:
                    - sum
                show: false
            showHeader: true
            sortBy: []
          pluginVersion: 12.0.2+security-01
          targets:
            - datasource:
                type: loki
                uid: ${datasource}
              direction: backward
              editorMode: code
              expr: '{job=~"integrations/kubernetes/eventhandler|infra-monitoring/eventrouter", cluster=~"$cluster", namespace=~"$namespace"} |~ `(?i)$contains` | logfmt  | drop __error__,__error_details__'
              queryType: range
              refId: A
          title: Events Details
          description: "Detailed log of all Kubernetes events in the selected namespace and cluster, including reason, message, and source."
          transformations:
            - id: extractFields
              options:
                replace: false
                source: labels
            - id: filterFieldsByName
              options:
                include:
                    names:
                        - labels
                        - Time
                        - count
                        - kind
                        - msg
                        - name
                        - namespace
                        - reason
                        - sourcecomponent
                        - type
                        - cluster
                    pattern: /^(labels|type|reason|namespace|msg|kind|name|sourcecomponent|count|Time|firstTimestamp|lastTimestamp)$/
            - id: organize
              options:
                excludeByName:
                    firstTimestamp: true
                includeByName: {}
                indexByName:
                    Time: 10
                    cluster: 3
                    count: 9
                    kind: 5
                    labels: 0
                    msg: 2
                    name: 7
                    namespace: 4
                    reason: 6
                    sourcecomponent: 8
                    type: 1
                renameByName:
                    Time: Created
                    cluster: Cluster
                    count: Count
                    firstTimestamp: Age
                    kind: Kind
                    labels: Full event
                    lastTimestamp: Last Seen
                    msg: Message
                    name: Involved Object
                    namespace: Namespace
                    reason: Reason
                    sourcecomponent: Source
                    type: Type
            - id: convertFieldType
              options:
                conversions:
                    - destinationType: Time
                      targetField: creationTimestamp
                fields: {}
            - id: sortBy
              options:
                fields: {}
                sort:
                    - desc: true
                      field: Last Seen
          type: table
        - gridPos:
            h: 8
            w: 24
            x: 0
            "y": 14
          id: 37
          options:
            cellHeight: sm
            footer:
                countRows: false
                enablePagination: true
                fields: ""
                reducer:
                    - sum
                show: false
            showHeader: true
            sortBy: []
          pluginVersion: 12.0.2+security-01
          targets:
            - datasource:
                type: loki
                uid: ${datasource}
              direction: backward
              editorMode: code
              expr: '{job=~"integrations/kubernetes/eventhandler|infra-monitoring/eventrouter", cluster=~"$cluster", namespace!~".+"} | logfmt | drop __error__,__error_details__'
              queryType: range
              refId: A
          title: Cluster-Scoped Events (Node / PV)
          description: "Kubernetes events scoped to cluster-level objects such as Nodes and PersistentVolumes."
          transformations:
            - id: extractFields
              options:
                replace: false
                source: labels
            - id: filterFieldsByName
              options:
                include:
                    names:
                        - labels
                        - Time
                        - count
                        - kind
                        - msg
                        - name
                        - namespace
                        - reason
                        - sourcecomponent
                        - type
                        - cluster
                    pattern: /^(labels|type|reason|namespace|msg|kind|name|sourcecomponent|count|Time|firstTimestamp|lastTimestamp)$/
            - id: organize
              options:
                excludeByName:
                    firstTimestamp: true
                includeByName: {}
                indexByName:
                    Time: 10
                    cluster: 3
                    count: 9
                    kind: 5
                    labels: 0
                    msg: 2
                    name: 7
                    namespace: 4
                    reason: 6
                    sourcecomponent: 8
                    type: 1
                renameByName:
                    Time: Created
                    cluster: Cluster
                    count: Count
                    kind: Kind
                    labels: Full event
                    lastTimestamp: Last Seen
                    msg: Message
                    name: Involved Object
                    namespace: Namespace
                    reason: Reason
                    sourcecomponent: Source
                    type: Type
            - id: convertFieldType
              options:
                conversions:
                    - destinationType: Time
                      targetField: creationTimestamp
                fields: {}
            - id: sortBy
              options:
                fields: {}
                sort:
                    - desc: true
                      field: Last Seen
          type: table
        - collapsed: false
          gridPos:
            h: 1
            w: 24
            x: 0
            "y": 22
          id: 32
          panels: []
          title: Kubernetes Events - Stats
          description: "Kubernetes Events - Stats."
          type: row
        - datasource:
            default: false
            type: loki
            uid: ${datasource}
          fieldConfig:
            defaults:
                color:
                    mode: palette-classic
                custom:
                    axisBorderShow: false
                    axisCenteredZero: false
                    axisColorMode: text
                    axisLabel: ""
                    axisPlacement: left
                    barAlignment: 0
                    barWidthFactor: 0.6
                    drawStyle: bars
                    fillOpacity: 100
                    gradientMode: none
                    hideFrom:
                        legend: false
                        tooltip: false
                        viz: false
                    insertNulls: false
                    lineInterpolation: linear
                    lineWidth: 4
                    pointSize: 26
                    scaleDistribution:
                        type: linear
                    showPoints: auto
                    spanNulls: false
                    stacking:
                        group: A
                        mode: normal
                    thresholdsStyle:
                        mode: "off"
                mappings: []
                thresholds:
                    mode: absolute
                    steps:
                        - color: green
                        - color: red
                          value: 80
            overrides: []
          gridPos:
            h: 10
            w: 15
            x: 0
            "y": 23
          id: 2
          interval: 1m
          maxDataPoints: 100
          options:
            legend:
                calcs: []
                displayMode: list
                placement: bottom
                showLegend: true
            tooltip:
                hideZeros: false
                mode: single
                sort: none
          pluginVersion: 12.0.2+security-01
          targets:
            - datasource:
                type: loki
                uid: ${datasource}
              direction: backward
              editorMode: code
              expr: 'sum by (type) (count_over_time({job=~"integrations/kubernetes/eventhandler|infra-monitoring/eventrouter", cluster=~"$cluster", namespace=~"$namespace"} |~ `(?i)$contains`  | logfmt | drop __error__,__error_details__ [$__interval]))'
              legendFormat: '{{type}}'
              queryType: range
              refId: A
          title: Overview
          description: "Timeline of Kubernetes event counts over time. Spikes indicate periods of cluster activity or instability."
          type: timeseries
        - datasource:
            type: loki
            uid: ${datasource}
          fieldConfig:
            defaults:
                color:
                    mode: palette-classic
                custom:
                    hideFrom:
                        legend: false
                        tooltip: false
                        viz: false
                links:
                    - targetBlank: true
                      title: 'Filter: ${__series.name}'
                      url: /d/k8s-events/k8s-events?${__all_variables}&${__url_time_range}&var-contains=${__field.labels.search_key}
                mappings: []
                noValue: "0"
            overrides: []
          gridPos:
            h: 10
            w: 9
            x: 15
            "y": 23
          id: 4
          interval: 1m
          maxDataPoints: 100
          options:
            displayLabels:
                - value
                - name
            legend:
                displayMode: list
                placement: right
                showLegend: true
                values:
                    - percent
                    - value
            pieType: pie
            reduceOptions:
                calcs:
                    - sum
                fields: ""
                values: false
            tooltip:
                hideZeros: true
                mode: multi
                sort: desc
          pluginVersion: 12.0.2+security-01
          targets:
            - datasource:
                type: loki
                uid: ${datasource}
              direction: backward
              editorMode: code
              expr: |-
                sum by (event_category, search_key) (
                  count_over_time(
                    {job=~"integrations/kubernetes/eventhandler|infra-monitoring/eventrouter", cluster=~"$cluster", namespace=~"$namespace"}
                    |~ `(?i)$contains`
                    | logfmt
                    | drop __error__,__error_details__
                    | reason=~"Failed|Killing|FailedMount|FailedScheduling|OOMKilling|BackOff|TaintManagerEviction|SystemOOM|Evicted|Unhealthy"
                    | label_format
                      event_category=`{{if and (eq .reason "Failed") (contains "Error: ImagePullBackOff" .msg)}}Image Pull Failed{{else if and (eq .reason "Killing") (contains "failed liveness probe" .msg)}}Liveness Probe Failed{{else if and (eq .reason "Killing") (contains "failed startup probe" .msg)}}Startup Probe Failed{{else if and (eq .reason "TaintManagerEviction") (contains "Marking for deletion Pod" .msg)}}Pod Evicted{{else if eq .reason "FailedMount"}}Volume Mount Failed{{else if eq .reason "FailedScheduling"}}Scheduling Failed{{else if eq .reason "OOMKilling"}}Container OOM Killed{{else if eq .reason "BackOff"}}Container Crashed{{else if eq .reason "SystemOOM"}}System OOM{{else if eq .reason "Evicted"}}Node Pressure Eviction{{else if and (eq .reason "Unhealthy") (contains "Readiness probe failed" .msg)}}Readiness Probe Failed{{end}}`,
                      search_key=`{{if and (eq .reason "Failed") (contains "Error: ImagePullBackOff" .msg)}}ImagePullBackOff{{else if and (eq .reason "Killing") (contains "failed liveness probe" .msg)}}failed liveness probe{{else if and (eq .reason "Killing") (contains "failed startup probe" .msg)}}failed startup probe{{else if and (eq .reason "TaintManagerEviction") (contains "Marking for deletion Pod" .msg)}}TaintManagerEviction{{else if eq .reason "FailedMount"}}FailedMount{{else if eq .reason "FailedScheduling"}}FailedScheduling{{else if eq .reason "OOMKilling"}}OOMKilling{{else if eq .reason "BackOff"}}BackOff{{else if eq .reason "SystemOOM"}}SystemOOM{{else if eq .reason "Evicted"}}Evicted{{else if and (eq .reason "Unhealthy") (contains "Readiness probe failed" .msg)}}Readiness probe failed{{end}}`
                    | event_category != ""
                    [$__interval]
                  )
                )
              legendFormat: '{{event_category}}'
              queryType: range
              range: true
              refId: A
          title: Event Reason Counts
          description: "Distribution of events by reason code. Use this to quickly identify the most common failure or warning types."
          type: piechart
        - collapsed: false
          gridPos:
            h: 1
            w: 24
            x: 0
            "y": 33
          id: 40
          panels: []
          title: OOM Killed Pods
          description: "OOM Killed Pods."
          type: row
        - datasource:
            type: datasource
            uid: '-- Dashboard --'
          fieldConfig:
            defaults:
                color:
                    mode: thresholds
                mappings: []
                thresholds:
                    mode: absolute
                    steps:
                        - color: green
                          value: null
                        - color: orange
                          value: 1
                        - color: red
                          value: 5
                unit: short
            overrides: []
          gridPos:
            h: 8
            w: 5
            x: 0
            "y": 34
          id: 42
          options:
            colorMode: background
            graphMode: none
            justifyMode: center
            orientation: auto
            reduceOptions:
                calcs:
                    - lastNotNull
                fields: ""
                values: false
            textMode: auto
          pluginVersion: 12.0.2+security-01
          targets:
            - datasource:
                type: datasource
                uid: '-- Dashboard --'
              panelId: 46
              refId: A
          description: Data sourced from kube-state-metrics (Prometheus), not Kubernetes Events.
          title: OOM Killed Pods Count
          description: "Total number of pods that have been OOM killed in the selected time range."
          transformations:
            - id: labelsToFields
              options:
                mode: columns
            - id: merge
              options: {}
            - id: groupBy
              options:
                fields:
                    namespace:
                        aggregations: []
                        operation: groupby
                    pod:
                        aggregations: []
                        operation: groupby
                    container:
                        aggregations: []
                        operation: groupby
                    Value:
                        aggregations:
                            - max
                        operation: aggregate
            - id: filterFieldsByName
              options:
                include:
                    names:
                        - namespace
            - id: reduce
              options:
                includeTimeField: false
                mode: reduceFields
                reducers:
                    - count
          type: stat
        - datasource:
            type: datasource
            uid: '-- Dashboard --'
          fieldConfig:
            defaults:
                color:
                    mode: thresholds
                custom:
                    align: auto
                    cellOptions:
                        type: auto
                    filterable: true
                    inspect: false
                decimals: 0
                mappings: []
                thresholds:
                    mode: absolute
                    steps:
                        - color: green
                          value: null
            overrides:
                - matcher:
                    id: byName
                    options: OOM Restarts
                  properties:
                    - id: custom.width
                      value: 120
                    - id: thresholds
                      value:
                        mode: absolute
                        steps:
                            - color: orange
                              value: null
                            - color: red
                              value: 5
                    - id: custom.cellOptions
                      value:
                        type: color-background
          gridPos:
            h: 8
            w: 19
            x: 5
            "y": 34
          id: 44
          options:
            cellHeight: sm
            footer:
                countRows: false
                enablePagination: true
                fields: ""
                reducer:
                    - sum
                show: false
            showHeader: true
            sortBy: []
          pluginVersion: 12.0.2+security-01
          targets:
            - datasource:
                type: datasource
                uid: '-- Dashboard --'
              panelId: 46
              refId: A
          description: Data sourced from kube-state-metrics (Prometheus), not Kubernetes Events.
          title: OOM Killed Pod Details
          description: "Details of pods that were OOM killed, including namespace, pod name, container, and time."
          transformations:
            - id: labelsToFields
              options:
                mode: columns
            - id: merge
              options: {}
            - id: groupBy
              options:
                fields:
                    namespace:
                        aggregations: []
                        operation: groupby
                    pod:
                        aggregations: []
                        operation: groupby
                    container:
                        aggregations: []
                        operation: groupby
                    Value:
                        aggregations:
                            - sum
                        operation: aggregate
            - id: sortBy
              options:
                fields:
                    - desc: true
                      displayName: Sum (Value)
          type: table
        - datasource:
            type: prometheus
            uid: duplo-metrics
          fieldConfig:
            defaults:
                color:
                    mode: palette-classic
                custom:
                    axisBorderShow: false
                    axisCenteredZero: false
                    axisColorMode: text
                    axisLabel: ""
                    axisPlacement: auto
                    barAlignment: 0
                    barWidthFactor: 0.6
                    drawStyle: bars
                    fillOpacity: 70
                    gradientMode: none
                    hideFrom:
                        legend: false
                        tooltip: false
                        viz: false
                    insertNulls: false
                    lineInterpolation: linear
                    lineWidth: 1
                    pointSize: 5
                    scaleDistribution:
                        type: linear
                    showPoints: never
                    spanNulls: false
                    stacking:
                        group: A
                        mode: normal
                    thresholdsStyle:
                        mode: "off"
                mappings: []
                thresholds:
                    mode: absolute
                    steps:
                        - color: green
                          value: null
            overrides: []
          gridPos:
            h: 10
            w: 24
            x: 0
            "y": 42
          id: 46
          interval: 1m
          maxDataPoints: 100
          options:
            legend:
                calcs: []
                displayMode: list
                placement: bottom
                showLegend: true
            tooltip:
                hideZeros: true
                mode: multi
                sort: desc
          pluginVersion: 12.0.2+security-01
          targets:
            - datasource:
                type: prometheus
                uid: duplo-metrics
              expr: |-
                (
                  sum by (cluster, namespace, pod, container) (
                    increase(kube_pod_container_status_restarts_total{cluster=~"$cluster", namespace=~"$namespace"}[$__rate_interval])
                  ) * on(cluster, namespace, pod, container) group_left()
                  (
                    max by (cluster, namespace, pod, container) (
                      max_over_time(kube_pod_container_status_last_terminated_reason{reason="OOMKilled", cluster=~"$cluster", namespace=~"$namespace"}[$__range]) == 1
                    )
                  )
                ) > 0
              legendFormat: '{{namespace}}/{{pod}} ({{container}})'
              refId: A
          description: Data sourced from kube-state-metrics (Prometheus), not Kubernetes Events.
          title: OOM Driven Restart Rate
          description: "Rate of container restarts caused by OOM kills. Sustained restarts indicate containers need higher memory limits."
          type: timeseries
        - collapsed: true
          gridPos:
            h: 1
            w: 24
            x: 0
            "y": 52
          id: 38
          panels:
            - datasource:
                type: loki
                uid: ${datasource}
              fieldConfig:
                defaults: {}
                overrides: []
              gridPos:
                h: 13
                w: 24
                x: 0
                "y": 26
              id: 8
              options:
                dedupStrategy: none
                enableInfiniteScrolling: false
                enableLogDetails: true
                prettifyLogMessage: false
                showCommonLabels: false
                showLabels: false
                showTime: true
                sortOrder: Descending
                wrapLogMessage: false
              pluginVersion: 12.0.2+security-01
              targets:
                - datasource:
                    type: loki
                    uid: ${datasource}
                  direction: backward
                  editorMode: code
                  expr: '{job=~"integrations/kubernetes/eventhandler|infra-monitoring/eventrouter", cluster=~"$cluster", namespace=~"$namespace"} |~ `(?i)$contains` | logfmt | json | drop __error__,__error_details__'
                  queryType: range
                  range: true
                  refId: A
              title: ""
              description: "."
              type: logs
          title: Kubernetes Events - Raw Logs
          description: "Kubernetes Events - Raw Logs."
          type: row
        - collapsed: true
          gridPos:
            h: 1
            w: 24
            x: 0
            "y": 53
          id: 30
          panels:
            - datasource:
                type: loki
                uid: ${datasource}
              description: ""
              fieldConfig:
                defaults:
                    color:
                        mode: palette-classic
                    custom:
                        hideFrom:
                            legend: false
                            tooltip: false
                            viz: false
                    mappings: []
                overrides:
                    - matcher:
                        id: byName
                        options: Field
                      properties:
                        - id: color
                          value:
                            mode: thresholds
                        - id: displayName
                          value: Reason
                        - id: color
                          value:
                            fixedColor: '#eab839'
                            mode: fixed
                    - matcher:
                        id: byName
                        options: Total
                      properties:
                        - id: color
                          value:
                            mode: continuous-BlYlRd
                    - __systemRef: hideSeriesFrom
                      matcher:
                        id: byNames
                        options:
                            mode: exclude
                            names:
                                - Completed
                                - Created
                                - FreeDiskSpaceFailed
                                - InProgress
                                - JobAlreadyActive
                                - Killing
                                - Pulled
                                - Pulling
                                - SawCompletedJob
                                - Scheduled
                                - SnapshotDelete
                                - SnapshotError
                                - SnapshotUpdate
                                - Started
                                - SuccessfulCreate
                                - SuccessfulDelete
                                - Unhealthy
                                - Valid
                                - nodeAssigned
                                - unchanged
                                - Value
                            prefix: 'All except:'
                            readOnly: true
                      properties:
                        - id: custom.hideFrom
                          value:
                            legend: false
                            tooltip: false
                            viz: true
              gridPos:
                h: 14
                w: 6
                x: 0
                "y": 27
              id: 26
              interval: 1m
              options:
                legend:
                    displayMode: list
                    placement: bottom
                    showLegend: true
                pieType: pie
                reduceOptions:
                    calcs:
                        - sum
                    fields: ""
                    values: false
                tooltip:
                    mode: multi
                    sort: none
              targets:
                - datasource:
                    type: loki
                    uid: ${datasource}
                  editorMode: code
                  expr: 'sum by (reason) (count_over_time({job=~"integrations/kubernetes/eventhandler|infra-monitoring/eventrouter", cluster=~"$cluster", namespace=~"$namespace"} | logfmt | drop __error__,__error_details__ [$__interval]))'
                  instant: false
                  legendFormat: '{{reason}}'
                  queryType: range
                  range: true
                  refId: A
              title: Events by Reason
              description: "Distribution of events by reason. Identifies the most frequent event types."
              type: piechart
            - datasource:
                type: loki
                uid: ${datasource}
              fieldConfig:
                defaults:
                    color:
                        mode: palette-classic
                    custom:
                        hideFrom:
                            legend: false
                            tooltip: false
                            viz: false
                    mappings: []
                overrides: []
              gridPos:
                h: 14
                w: 6
                x: 6
                "y": 27
              id: 28
              interval: 1m
              options:
                displayLabels: []
                legend:
                    displayMode: list
                    placement: bottom
                    showLegend: true
                pieType: pie
                reduceOptions:
                    calcs:
                        - sum
                    fields: ""
                    values: false
                tooltip:
                    mode: multi
                    sort: none
              targets:
                - datasource:
                    type: loki
                    uid: ${datasource}
                  editorMode: code
                  expr: 'sum by (namespace) (count_over_time({job=~"integrations/kubernetes/eventhandler|infra-monitoring/eventrouter", cluster=~"$cluster", namespace=~"$namespace"} | logfmt | drop __error__,__error_details__ [$__interval]))'
                  legendFormat: '{{namespace}}'
                  queryType: range
                  range: true
                  refId: A
              title: Events by Namespace
              description: "Distribution of events by namespace. Highlights namespaces generating the most activity."
              type: piechart
            - datasource:
                type: loki
                uid: ${datasource}
              fieldConfig:
                defaults:
                    color:
                        mode: palette-classic
                    custom:
                        hideFrom:
                            legend: false
                            tooltip: false
                            viz: false
                    mappings: []
                overrides: []
              gridPos:
                h: 14
                w: 6
                x: 12
                "y": 27
              id: 20
              interval: 1m
