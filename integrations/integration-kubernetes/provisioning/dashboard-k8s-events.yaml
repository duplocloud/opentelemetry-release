apiVersion: grizzly.grafana.com/v1alpha1
kind: Dashboard
metadata:
    folder: integration-kubernetes
    name: k8s-events
spec:
    annotations:
        list:
            - builtIn: 1
              datasource:
                type: datasource
                uid: grafana
              enable: true
              hide: true
              iconColor: rgba(0, 211, 255, 1)
              name: Annotations & Alerts
              target:
                limit: 100
                matchAny: false
                tags: []
                type: dashboard
              type: dashboard
            - datasource:
                uid: ${lokids}
              enable: true
              expr: '{job!="", cluster="$cluster"} |= "sourcecomponent=kubelet" |~ "sourcehost=$instance" |~ "reason=(Created|Killing|BackOff|SystemOOM|Started)" | logfmt'
              hide: false
              iconColor: blue
              name: K8s events
              tagKeys: reason,type
              target:
                limit: 100
                matchAny: false
                tags: []
                type: dashboard
              textFormat: '{{kind}}: {{name}} in namespace: {{namespace}} on node: {{sourcehost}}'
              titleFormat: '{{msg}}'
    description: Kubernetes Events
    editable: false
    fiscalYearStartMonth: 0
    graphTooltip: 0
    links: []
    panels:
        - collapsed: false
          gridPos:
            h: 1
            w: 24
            x: 0
            "y": 0
          id: 34
          panels: []
          title: Kubernetes Events - Details
          type: row
        - datasource:
            default: false
            type: loki
            uid: ${datasource}
          fieldConfig:
            defaults:
                color:
                    mode: thresholds
                custom:
                    align: auto
                    cellOptions:
                        type: auto
                    filterable: true
                    inspect: false
                    minWidth: 65
                links: []
                mappings: []
                thresholds:
                    mode: absolute
                    steps:
                        - color: green
            overrides:
                - matcher:
                    id: byName
                    options: labels
                  properties:
                    - id: custom.filterable
                    - id: custom.inspect
                      value: true
                - matcher:
                    id: byName
                    options: reason
                  properties:
                    - id: custom.filterable
                      value: true
                - matcher:
                    id: byName
                    options: type
                  properties:
                    - id: mappings
                      value:
                        - options:
                            Normal:
                                color: text
                                index: 1
                            Warning:
                                color: red
                                index: 0
                          type: value
                    - id: custom.cellOptions
                      value:
                        type: color-text
                    - id: custom.width
                      value: 66
                - matcher:
                    id: byName
                    options: msg
                  properties:
                    - id: custom.minWidth
                      value: 280
                - matcher:
                    id: byName
                    options: name
                  properties:
                    - id: custom.minWidth
                      value: 245
                - matcher:
                    id: byName
                    options: count
                  properties:
                    - id: custom.width
                      value: 55
                - matcher:
                    id: byType
                    options: Time
                  properties:
                    - id: custom.filterable
                      value: false
                    - id: unit
                      value: dateTimeFromNow
                - matcher:
                    id: byName
                    options: lastTimestamp
                  properties:
                    - id: custom.filterable
                - matcher:
                    id: byName
                    options: Message
                  properties:
                    - id: custom.width
                      value: 555
                - matcher:
                    id: byName
                    options: Cluster
                  properties:
                    - id: custom.width
                      value: 135
          gridPos:
            h: 13
            w: 24
            x: 0
            "y": 1
          id: 36
          options:
            cellHeight: sm
            footer:
                countRows: false
                enablePagination: true
                fields: ""
                reducer:
                    - sum
                show: false
            showHeader: true
            sortBy: []
          pluginVersion: 12.0.2+security-01
          targets:
            - datasource:
                type: loki
                uid: ${datasource}
              direction: backward
              editorMode: code
              expr: '{job=~"integrations/kubernetes/eventhandler|infra-monitoring/eventrouter", cluster=~"$cluster", namespace=~"$namespace"} |~ `(?i)$contains` | logfmt  | drop __error__,__error_details__'
              queryType: range
              refId: A
          title: Events Details
          transformations:
            - id: extractFields
              options:
                replace: false
                source: labels
            - id: filterFieldsByName
              options:
                include:
                    names:
                        - labels
                        - Time
                        - count
                        - kind
                        - msg
                        - name
                        - namespace
                        - reason
                        - sourcecomponent
                        - type
                        - cluster
                    pattern: /^(labels|type|reason|namespace|msg|kind|name|sourcecomponent|count|Time|firstTimestamp|lastTimestamp)$/
            - id: organize
              options:
                excludeByName:
                    firstTimestamp: true
                includeByName: {}
                indexByName:
                    Time: 10
                    cluster: 3
                    count: 9
                    kind: 5
                    labels: 0
                    msg: 2
                    name: 7
                    namespace: 4
                    reason: 6
                    sourcecomponent: 8
                    type: 1
                renameByName:
                    Time: Created
                    cluster: Cluster
                    count: Count
                    firstTimestamp: Age
                    kind: Kind
                    labels: Full event
                    lastTimestamp: Last Seen
                    msg: Message
                    name: Involved Object
                    namespace: Namespace
                    reason: Reason
                    sourcecomponent: Source
                    type: Type
            - id: convertFieldType
              options:
                conversions:
                    - destinationType: Time
                      targetField: creationTimestamp
                fields: {}
            - id: sortBy
              options:
                fields: {}
                sort:
                    - desc: true
                      field: Last Seen
          type: table
        - collapsed: false
          gridPos:
            h: 1
            w: 24
            x: 0
            "y": 14
          id: 32
          panels: []
          title: Kubernetes Events - Stats
          type: row
        - datasource:
            default: false
            type: loki
            uid: ${datasource}
          fieldConfig:
            defaults:
                color:
                    mode: palette-classic
                custom:
                    axisBorderShow: false
                    axisCenteredZero: false
                    axisColorMode: text
                    axisLabel: ""
                    axisPlacement: left
                    barAlignment: 0
                    barWidthFactor: 0.6
                    drawStyle: bars
                    fillOpacity: 100
                    gradientMode: none
                    hideFrom:
                        legend: false
                        tooltip: false
                        viz: false
                    insertNulls: false
                    lineInterpolation: linear
                    lineWidth: 4
                    pointSize: 26
                    scaleDistribution:
                        type: linear
                    showPoints: auto
                    spanNulls: false
                    stacking:
                        group: A
                        mode: normal
                    thresholdsStyle:
                        mode: "off"
                mappings: []
                thresholds:
                    mode: absolute
                    steps:
                        - color: green
                        - color: red
                          value: 80
            overrides: []
          gridPos:
            h: 10
            w: 15
            x: 0
            "y": 15
          id: 2
          interval: 1m
          maxDataPoints: 100
          options:
            legend:
                calcs: []
                displayMode: list
                placement: bottom
                showLegend: true
            tooltip:
                hideZeros: false
                mode: single
                sort: none
          pluginVersion: 12.0.2+security-01
          targets:
            - datasource:
                type: loki
                uid: ${datasource}
              direction: backward
              editorMode: code
              expr: 'sum by (type) (count_over_time({job=~"integrations/kubernetes/eventhandler|infra-monitoring/eventrouter", cluster=~"$cluster", namespace=~"$namespace"} |~ `(?i)$contains`  | logfmt | drop __error__,__error_details__ [$__interval]))'
              legendFormat: '{{type}}'
              queryType: range
              refId: A
          title: Overview
          type: timeseries
        - datasource:
            type: loki
            uid: ${datasource}
          fieldConfig:
            defaults:
                color:
                    mode: palette-classic
                custom:
                    hideFrom:
                        legend: false
                        tooltip: false
                        viz: false
                mappings: []
                noValue: "0"
            overrides:
                - matcher:
                    id: byName
                    options: Failed
                  properties:
                    - id: displayName
                      value: Image Pull Failed
                - matcher:
                    id: byName
                    options: Killing
                  properties:
                    - id: displayName
                      value: Liveness Probe Failed
                - matcher:
                    id: byName
                    options: FailedMount
                  properties:
                    - id: displayName
                      value: Volume Mount Failed
                - matcher:
                    id: byName
                    options: FailedScheduling
                  properties:
                    - id: displayName
                      value: Scheduling Failed
                - matcher:
                    id: byName
                    options: OOMKilling
                  properties:
                    - id: displayName
                      value: Container OOM Killed
                - matcher:
                    id: byName
                    options: BackOff
                  properties:
                    - id: displayName
                      value: Container Crashed
                - matcher:
                    id: byName
                    options: TaintManagerEviction
                  properties:
                    - id: displayName
                      value: Pod Evicted
                - matcher:
                    id: byName
                    options: SystemOOM
                  properties:
                    - id: displayName
                      value: System OOM
          gridPos:
            h: 10
            w: 9
            x: 15
            "y": 15
          id: 4
          interval: 1m
          options:
            displayLabels:
                - value
                - name
            legend:
                displayMode: list
                placement: right
                showLegend: true
                values:
                    - percent
            pieType: pie
            reduceOptions:
                calcs:
                    - sum
                fields: ""
                values: false
            tooltip:
                hideZeros: true
                mode: multi
                sort: desc
          pluginVersion: 12.0.2+security-01
          targets:
            - datasource:
                type: loki
                uid: ${datasource}
              direction: backward
              editorMode: code
              expr: 'sum by (reason) (count_over_time({job=~"integrations/kubernetes/eventhandler|infra-monitoring/eventrouter", cluster=~"$cluster", namespace=~"$namespace"} |~ `(?i)$contains` | logfmt | drop __error__,__error_details__ | reason=~"Failed|Killing|FailedMount|FailedScheduling|OOMKilling|BackOff|TaintManagerEviction|SystemOOM" [$__interval]))'
              legendFormat: '{{reason}}'
              queryType: range
              range: true
              refId: A
          title: Event Reason Counts
          type: piechart
        - collapsed: true
          gridPos:
            h: 1
            w: 24
            x: 0
            "y": 25
          id: 38
          panels:
            - datasource:
                type: loki
                uid: ${datasource}
              fieldConfig:
                defaults: {}
                overrides: []
              gridPos:
                h: 13
                w: 24
                x: 0
                "y": 26
              id: 8
              options:
                dedupStrategy: none
                enableInfiniteScrolling: false
                enableLogDetails: true
                prettifyLogMessage: false
                showCommonLabels: false
                showLabels: false
                showTime: true
                sortOrder: Descending
                wrapLogMessage: false
              pluginVersion: 12.0.2+security-01
              targets:
                - datasource:
                    type: loki
                    uid: ${datasource}
                  direction: backward
                  editorMode: code
                  expr: '{job=~"integrations/kubernetes/eventhandler|infra-monitoring/eventrouter", cluster=~"$cluster", namespace=~"$namespace"} |~ `(?i)$contains` | logfmt | json | drop __error__,__error_details__'
                  queryType: range
                  range: true
                  refId: A
              title: ""
              type: logs
          title: Kubernetes Events - Raw Logs
          type: row
        - collapsed: true
          gridPos:
            h: 1
            w: 24
            x: 0
            "y": 26
          id: 30
          panels:
            - datasource:
                type: loki
                uid: ${datasource}
              description: ""
              fieldConfig:
                defaults:
                    color:
                        mode: palette-classic
                    custom:
                        hideFrom:
                            legend: false
                            tooltip: false
                            viz: false
                    mappings: []
                overrides:
                    - matcher:
                        id: byName
                        options: Field
                      properties:
                        - id: color
                          value:
                            mode: thresholds
                        - id: displayName
                          value: Reason
                        - id: color
                          value:
                            fixedColor: '#eab839'
                            mode: fixed
                    - matcher:
                        id: byName
                        options: Total
                      properties:
                        - id: color
                          value:
                            mode: continuous-BlYlRd
                    - __systemRef: hideSeriesFrom
                      matcher:
                        id: byNames
                        options:
                            mode: exclude
                            names:
                                - Completed
                                - Created
                                - FreeDiskSpaceFailed
                                - InProgress
                                - JobAlreadyActive
                                - Killing
                                - Pulled
                                - Pulling
                                - SawCompletedJob
                                - Scheduled
                                - SnapshotDelete
                                - SnapshotError
                                - SnapshotUpdate
                                - Started
                                - SuccessfulCreate
                                - SuccessfulDelete
                                - Unhealthy
                                - Valid
                                - nodeAssigned
                                - unchanged
                                - Value
                            prefix: 'All except:'
                            readOnly: true
                      properties:
                        - id: custom.hideFrom
                          value:
                            legend: false
                            tooltip: false
                            viz: true
              gridPos:
                h: 14
                w: 6
                x: 0
                "y": 27
              id: 26
              interval: 1m
              options:
                legend:
                    displayMode: list
                    placement: bottom
                    showLegend: true
                pieType: pie
                reduceOptions:
                    calcs:
                        - sum
                    fields: ""
                    values: false
                tooltip:
                    mode: multi
                    sort: none
              targets:
                - datasource:
                    type: loki
                    uid: ${datasource}
                  editorMode: code
                  expr: 'sum by (reason) (count_over_time({job=~"integrations/kubernetes/eventhandler|infra-monitoring/eventrouter", cluster=~"$cluster", namespace=~"$namespace"} | logfmt | drop __error__,__error_details__ [$__interval]))'
                  instant: false
                  legendFormat: '{{reason}}'
                  queryType: range
                  range: true
                  refId: A
              title: Events by Reason
              type: piechart
            - datasource:
                type: loki
                uid: ${datasource}
              fieldConfig:
                defaults:
                    color:
                        mode: palette-classic
                    custom:
                        hideFrom:
                            legend: false
                            tooltip: false
                            viz: false
                    mappings: []
                overrides: []
              gridPos:
                h: 14
                w: 6
                x: 6
                "y": 27
              id: 28
              interval: 1m
              options:
                displayLabels: []
                legend:
                    displayMode: list
                    placement: bottom
                    showLegend: true
                pieType: pie
                reduceOptions:
                    calcs:
                        - sum
                    fields: ""
                    values: false
                tooltip:
                    mode: multi
                    sort: none
              targets:
                - datasource:
                    type: loki
                    uid: ${datasource}
                  editorMode: code
                  expr: 'sum by (namespace) (count_over_time({job=~"integrations/kubernetes/eventhandler|infra-monitoring/eventrouter", cluster=~"$cluster", namespace=~"$namespace"} | logfmt | drop __error__,__error_details__ [$__interval]))'
                  legendFormat: '{{namespace}}'
                  queryType: range
                  range: true
                  refId: A
              title: Events by Namespace
              type: piechart
            - datasource:
                type: loki
                uid: ${datasource}
              fieldConfig:
                defaults:
                    color:
                        mode: palette-classic
                    custom:
                        hideFrom:
                            legend: false
                            tooltip: false
                            viz: false
                    mappings: []
                overrides: []
              gridPos:
                h: 14
                w: 6
                x: 12
                "y": 27
              id: 20
              interval: 1m
              options:
                legend:
                    displayMode: list
                    placement: bottom
                    showLegend: true
                pieType: pie
                reduceOptions:
                    calcs:
                        - sum
                    fields: ""
                    values: false
                tooltip:
                    mode: multi
                    sort: none
              targets:
                - datasource:
                    type: loki
                    uid: ${datasource}
                  editorMode: code
                  expr: 'sum by (sourcecomponent) (count_over_time({job=~"integrations/kubernetes/eventhandler|infra-monitoring/eventrouter", cluster=~"$cluster", namespace=~"$namespace"} | logfmt | drop __error__,__error_details__ [$__interval]))'
                  legendFormat: '{{sourcecomponent}}'
                  queryType: range
                  range: true
                  refId: A
              title: Events by Source
              type: piechart
            - datasource:
                type: loki
                uid: ${datasource}
              fieldConfig:
                defaults:
                    color:
                        mode: palette-classic
                    custom:
                        hideFrom:
                            legend: false
                            tooltip: false
                            viz: false
                    links: []
                    mappings: []
                overrides: []
              gridPos:
                h: 14
                w: 6
                x: 18
                "y": 27
              id: 22
              interval: 1m
              options:
                legend:
                    displayMode: list
                    placement: bottom
                    showLegend: true
                    values: []
                pieType: pie
                reduceOptions:
                    calcs:
                        - sum
                    fields: ""
                    values: false
                tooltip:
                    mode: multi
                    sort: none
              targets:
                - datasource:
                    type: loki
                    uid: ${datasource}
                  editorMode: code
                  expr: 'sum by (kind) (count_over_time({job=~"integrations/kubernetes/eventhandler|infra-monitoring/eventrouter", cluster=~"$cluster", namespace=~"$namespace"} | logfmt | drop __error__,__error_details__ [$__interval]))'
                  legendFormat: '{{kind}}'
                  queryType: range
                  range: true
                  refId: A
              title: Events by Kind
              type: piechart
          title: Kubernetes Events - Distribution
          type: row
    preload: false
    refresh: 2h
    schemaVersion: 41
    tags:
        - kubernetes-integration
        - k8s-events
    templating:
        list:
            - current:
                text: duplo-logging
                value: duplo-logging
              includeAll: false
              label: datasource
              name: datasource
              options: []
              query: loki
              refresh: 1
              regex: ""
              type: datasource
            - allValue: ""
              current:
                text: ""
                value: ""
              datasource:
                type: loki
                uid: ${datasource}
              definition: ""
              includeAll: true
              multi: true
              name: cluster
              options: []
              query:
                label: cluster
                refId: LokiVariableQueryEditor-VariableQuery
                stream: ""
                type: 1
              refresh: 2
              regex: ""
              sort: 5
              type: query
            - allValue: ""
              current:
                text:
                    - All
                value:
                    - $__all
              datasource:
                type: loki
                uid: ${datasource}
              definition: ""
              includeAll: true
              multi: true
              name: namespace
              options: []
              query:
                label: namespace
                refId: LokiVariableQueryEditor-VariableQuery
                stream: '{cluster=~"$cluster"}'
                type: 1
              refresh: 2
              regex: ""
              sort: 5
              type: query
            - current:
                text: ""
                value: ""
              description: Line contains case insensitive. Return log lines that match regex (?i)
              label: Search events
              name: contains
              options:
                - selected: true
                  text: ""
                  value: ""
              query: ""
              type: textbox
            - current:
                text: All
                value:
                    - $__all
              includeAll: true
              label: Events Data Source
              multi: true
              name: lokids
              options: []
              query: loki
              refresh: 1
              regex: ""
              type: datasource
    time:
        from: now-1h
        to: now
    timepicker:
        refresh_intervals:
            - 10s
            - 30s
            - 1m
            - 5m
            - 15m
            - 30m
            - 1h
            - 2h
            - 1d
    timezone: ""
    title: K8s / Events
    uid: k8s-events
    version: 15
