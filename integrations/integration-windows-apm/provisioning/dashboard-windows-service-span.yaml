apiVersion: grizzly.grafana.com/v1alpha1
kind: Dashboard
metadata:
    folder: integration-windows-apm
    name: windows-service-span-dashboard-v3
spec:
    annotations:
        list:
            - builtIn: 1
              datasource:
                type: grafana
                uid: -- Grafana --
              enable: true
              hide: true
              iconColor: rgba(0, 211, 255, 1)
              name: Annotations & Alerts
              type: dashboard
    description: Windows Service Level Dashboard - IIS URI Endpoint Detail
    editable: false
    fiscalYearStartMonth: 0
    graphTooltip: 0
    links:
        - asDropdown: false
          icon: external link
          includeVars: false
          keepTime: true
          tags: []
          targetBlank: false
          title: Back to Windows Services Overview
          tooltip: ""
          type: link
          url: /d/windows-service-overview-dashboard-v3/windows-service-overview-dashboard-v3
        - asDropdown: false
          icon: external link
          includeVars: false
          keepTime: true
          tags: []
          targetBlank: false
          title: Back to Site Dashboard
          tooltip: ""
          type: link
          url: /d/windows-service-dashboard-v3/windows-service-dashboard-v3?var-cluster=${cluster}&var-namespace=${namespace}&var-site=${site}&var-instance=${instance}
        - asDropdown: true
          icon: external link
          includeVars: false
          keepTime: true
          tags:
            - windows-apm
            - service
            - windows-iis
          targetBlank: false
          title: All Windows Services | Dashboards
          tooltip: ""
          type: dashboards
          url: ""
    panels:
        - gridPos:
            h: 3
            w: 24
            x: 0
            "y": 0
          id: 6
          options:
            code:
                language: plaintext
                showLineNumbers: false
                showMiniMap: false
            content: "# \U0001F4CA URI Endpoint Details\n\nReview the Rate, Errors, and Duration (RED) metrics for this specific URI endpoint.\nUse the IIS access logs below to investigate individual requests and response times."
            mode: markdown
          pluginVersion: 11.5.2
          type: text
        - datasource:
            type: prometheus
            uid: duplo-metrics
          fieldConfig:
            defaults:
                color:
                    mode: palette-classic
                custom:
                    axisBorderShow: false
                    axisCenteredZero: false
                    axisColorMode: text
                    axisLabel: ""
                    axisPlacement: auto
                    barAlignment: 0
                    barWidthFactor: 0.6
                    drawStyle: line
                    fillOpacity: 0
                    gradientMode: none
                    hideFrom:
                        legend: false
                        tooltip: false
                        viz: false
                    insertNulls: false
                    lineInterpolation: linear
                    lineWidth: 1
                    pointSize: 5
                    scaleDistribution:
                        type: linear
                    showPoints: auto
                    spanNulls: false
                    stacking:
                        group: A
                        mode: none
                    thresholdsStyle:
                        mode: "off"
                mappings: []
                thresholds:
                    mode: absolute
                    steps:
                        - color: semi-dark-green
                          value: null
                unit: reqps
            overrides:
                - matcher:
                    id: byName
                    options: Rate
                  properties:
                    - id: color
                      value:
                        fixedColor: '#1bc2c9'
                        mode: fixed
          gridPos:
            h: 9
            w: 8
            x: 0
            "y": 3
          id: 2
          options:
            legend:
                calcs: []
                displayMode: list
                placement: bottom
                showLegend: true
            tooltip:
                hideZeros: false
                mode: single
                sort: none
          pluginVersion: 11.5.2
          targets:
            - datasource:
                type: prometheus
                uid: duplo-metrics
              editorMode: code
              exemplar: true
              expr: sum by (uri) (iis:uri_request_rate:rate1m{cluster=~"$cluster", namespace=~"$namespace", site=~"$site", instance=~"$instance", uri=~"$uri"})
              hide: false
              instant: false
              interval: ""
              legendFormat: Rate
              range: true
              refId: serviceRateQuery
          title: Rate
          transformations:
            - id: merge
              options: {}
          type: timeseries
        - datasource:
            type: prometheus
            uid: duplo-metrics
          fieldConfig:
            defaults:
                color:
                    mode: palette-classic
                custom:
                    axisBorderShow: false
                    axisCenteredZero: false
                    axisColorMode: text
                    axisLabel: ""
                    axisPlacement: auto
                    barAlignment: 0
                    barWidthFactor: 0.6
                    drawStyle: line
                    fillOpacity: 0
                    gradientMode: none
                    hideFrom:
                        legend: false
                        tooltip: false
                        viz: false
                    insertNulls: false
                    lineInterpolation: linear
                    lineWidth: 1
                    pointSize: 5
                    scaleDistribution:
                        type: linear
                    showPoints: auto
                    spanNulls: false
                    stacking:
                        group: A
                        mode: none
                    thresholdsStyle:
                        mode: "off"
                mappings: []
                thresholds:
                    mode: absolute
                    steps:
                        - color: semi-dark-green
                          value: null
                max: 1
                min: 0
                unit: percentunit
            overrides:
                - matcher:
                    id: byName
                    options: Errors
                  properties:
                    - id: color
                      value:
                        fixedColor: dark-red
                        mode: fixed
          gridPos:
            h: 9
            w: 8
            x: 8
            "y": 3
          id: 3
          options:
            legend:
                calcs: []
                displayMode: list
                placement: bottom
                showLegend: true
            tooltip:
                hideZeros: false
                mode: single
                sort: none
          pluginVersion: 11.5.2
          targets:
            - datasource:
                type: prometheus
                uid: duplo-metrics
              editorMode: code
              exemplar: true
              expr: |
                clamp_max(
                  (
                    sum by (uri) (iis:uri_error_rate:rate1m{cluster=~"$cluster", namespace=~"$namespace", site=~"$site", instance=~"$instance", uri=~"$uri"})
                    or
                    sum by (uri) (iis:uri_request_rate:rate1m{cluster=~"$cluster", namespace=~"$namespace", site=~"$site", instance=~"$instance", uri=~"$uri"}) * 0
                  )
                  / clamp_min(sum by (uri) (iis:uri_request_rate:rate1m{cluster=~"$cluster", namespace=~"$namespace", site=~"$site", instance=~"$instance", uri=~"$uri"}), 0.001)
                , 1)
              hide: false
              instant: false
              interval: ""
              legendFormat: Errors
              range: true
              refId: serviceErrorsQuery
          title: Errors
          transformations:
            - id: joinByField
              options:
                byField: Time
                mode: outer
            - id: merge
              options: {}
          type: timeseries
        - datasource:
            type: prometheus
            uid: duplo-metrics
          fieldConfig:
            defaults:
                color:
                    mode: palette-classic
                custom:
                    axisBorderShow: false
                    axisCenteredZero: false
                    axisColorMode: text
                    axisLabel: ""
                    axisPlacement: auto
                    barAlignment: 0
                    barWidthFactor: 0.6
                    drawStyle: line
                    fillOpacity: 0
                    gradientMode: none
                    hideFrom:
                        legend: false
                        tooltip: false
                        viz: false
                    insertNulls: false
                    lineInterpolation: linear
                    lineWidth: 1
                    pointSize: 5
                    scaleDistribution:
                        type: linear
                    showPoints: auto
                    spanNulls: false
                    stacking:
                        group: A
                        mode: none
                    thresholdsStyle:
                        mode: "off"
                mappings: []
                thresholds:
                    mode: absolute
                    steps:
                        - color: semi-dark-green
                          value: null
                unit: ms
            overrides:
                - matcher:
                    id: byName
                    options: P99
                  properties:
                    - id: color
                      value:
                        fixedColor: dark-green
                        mode: fixed
                - matcher:
                    id: byName
                    options: P95
                  properties:
                    - id: color
                      value:
                        fixedColor: semi-dark-yellow
                        mode: fixed
                - matcher:
                    id: byName
                    options: AVG
                  properties:
                    - id: color
                      value:
                        fixedColor: blue
                        mode: fixed
          gridPos:
            h: 9
            w: 8
            x: 16
            "y": 3
          id: 4
          options:
            legend:
                calcs: []
                displayMode: list
                placement: bottom
                showLegend: true
            tooltip:
                hideZeros: false
                mode: single
                sort: none
          pluginVersion: 11.5.2
          targets:
            - datasource:
                type: prometheus
                uid: duplo-metrics
              editorMode: code
              exemplar: true
              expr: max by (uri) (iis:uri_response_time_ms_p99:rate1m{cluster=~"$cluster", namespace=~"$namespace", site=~"$site", instance=~"$instance", uri=~"$uri"})
              hide: false
              instant: false
              interval: ""
              legendFormat: P99
              range: true
              refId: serviceP99Query
            - datasource:
                type: prometheus
                uid: duplo-metrics
              editorMode: code
              exemplar: true
              expr: max by (uri) (iis:uri_response_time_ms_p95:rate1m{cluster=~"$cluster", namespace=~"$namespace", site=~"$site", instance=~"$instance", uri=~"$uri"})
              hide: false
              instant: false
              interval: ""
              legendFormat: P95
              range: true
              refId: serviceP95Query
            - datasource:
                type: prometheus
                uid: duplo-metrics
              editorMode: code
              exemplar: true
              expr: max by (uri) (iis:uri_response_time_ms_avg:rate1m{cluster=~"$cluster", namespace=~"$namespace", site=~"$site", instance=~"$instance", uri=~"$uri"})
              hide: false
              instant: false
              interval: ""
              legendFormat: AVG
              range: true
              refId: serviceAvgQuery
          title: Duration
          transformations:
            - id: joinByField
              options:
                byField: Time
                mode: outer
            - id: merge
              options: {}
          type: timeseries
        - collapsed: false
          gridPos:
            h: 1
            w: 24
            x: 0
            "y": 12
          id: 7
          targets: []
          title: Access Logs
          type: row
        - datasource:
            type: loki
            uid: duplo-logging
          fieldConfig:
            defaults:
                custom:
                    align: auto
                    cellOptions:
                        type: auto
                    inspect: false
                mappings: []
                thresholds:
                    mode: absolute
                    steps:
                        - color: green
                          value: null
            overrides: []
          gridPos:
            h: 12
            w: 24
            x: 0
            "y": 13
          id: 8
          options:
            dedupStrategy: none
            enableLogDetails: true
            prettifyLogMessage: false
            showCommonLabels: false
            showLabels: false
            showTime: true
            sortOrder: Descending
            wrapLogMessage: false
          pluginVersion: 11.5.2
          targets:
            - datasource:
                type: loki
                uid: duplo-logging
              editorMode: code
              expr: '{job="integrations/iis", cluster=~"$cluster", namespace=~"$namespace", site=~"$site", instance=~"$instance"} | pattern `<date> <time> <sip> <method> <uri> <query> <port> <user> <cip> <ua> <ref> <status> <sub> <win32> <sent> <received> <time_taken>` | uri=~"$uri"'
              queryType: range
              refId: A
          title: IIS Access Logs
          type: logs
    refresh: ""
    schemaVersion: 40
    tags:
        - windows-apm
        - service
        - windows-iis
        - operation
    templating:
        list:
            - allowCustomValue: false
              current: {}
              datasource:
                type: prometheus
                uid: duplo-metrics
              definition: label_values(iis:request_rate:rate1m,cluster)
              label: Cluster
              name: cluster
              options: []
              query:
                qryType: 1
                query: label_values(iis:request_rate:rate1m,cluster)
                refId: PrometheusVariableQueryEditor-VariableQuery
              refresh: 1
              regex: ""
              type: query
            - allowCustomValue: false
              current: {}
              datasource:
                type: prometheus
                uid: duplo-metrics
              definition: label_values(iis:request_rate:rate1m{cluster=~"$cluster"},namespace)
              label: Namespace
              name: namespace
              options: []
              query:
                qryType: 1
                query: label_values(iis:request_rate:rate1m{cluster=~"$cluster"},namespace)
                refId: PrometheusVariableQueryEditor-VariableQuery
              refresh: 1
              regex: ""
              type: query
            - allowCustomValue: false
              current: {}
              datasource:
                type: prometheus
                uid: duplo-metrics
              definition: label_values(iis:request_rate:rate1m{cluster=~"$cluster", namespace=~"$namespace"},site)
              description: ""
              label: Site
              name: site
              options: []
              query:
                qryType: 1
                query: label_values(iis:request_rate:rate1m{cluster=~"$cluster", namespace=~"$namespace"},site)
                refId: PrometheusVariableQueryEditor-VariableQuery
              refresh: 1
              regex: ""
              type: query
            - allValue: .*
              allowCustomValue: false
              current: {}
              datasource:
                type: prometheus
                uid: duplo-metrics
              definition: label_values(iis:request_rate:rate1m{cluster=~"$cluster", namespace=~"$namespace", site=~"$site"},instance)
              description: ""
              includeAll: true
              label: Instance
              name: instance
              options: []
              query:
                qryType: 1
                query: label_values(iis:request_rate:rate1m{cluster=~"$cluster", namespace=~"$namespace", site=~"$site"},instance)
                refId: PrometheusVariableQueryEditor-VariableQuery
              refresh: 1
              regex: ""
              type: query
            - allowCustomValue: true
              current: {}
              datasource:
                type: prometheus
                uid: duplo-metrics
              definition: label_values(iis:uri_request_rate:rate1m{cluster=~"$cluster", namespace=~"$namespace", site=~"$site"},uri)
              description: ""
              includeAll: true
              label: URI
              multi: true
              name: uri
              options: []
              query:
                qryType: 1
                query: label_values(iis:uri_request_rate:rate1m{cluster=~"$cluster", namespace=~"$namespace", site=~"$site"},uri)
                refId: PrometheusVariableQueryEditor-VariableQuery
              refresh: 1
              regex: ""
              type: query
    time:
        from: now-1h
        to: now
    timepicker: {}
    timezone: ""
    title: Windows Service Span Dashboard
    uid: windows-service-span-dashboard-v3
