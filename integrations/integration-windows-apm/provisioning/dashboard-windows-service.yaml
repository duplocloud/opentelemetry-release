                    insertNulls: false
                    lineInterpolation: linear
                    lineWidth: 1
                    pointSize: 5
                    scaleDistribution:
                        type: linear
                    showPoints: auto
                    spanNulls: false
                    stacking:
                        group: A
                        mode: none
                    thresholdsStyle:
                        mode: "off"
                mappings: []
                thresholds:
                    mode: absolute
                    steps:
                        - color: semi-dark-green
                          value: null
                unit: ms
            overrides:
                - matcher:
                    id: byName
                    options: P99
                  properties:
                    - id: color
                      value:
                        fixedColor: dark-green
                        mode: fixed
                - matcher:
                    id: byName
                    options: P95
                  properties:
