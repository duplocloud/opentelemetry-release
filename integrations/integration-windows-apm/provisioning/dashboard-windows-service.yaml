          title: Duration
          transformations:
            - id: joinByField
              options:
                byField: Time
                mode: outer
            - id: merge
              options: {}
          type: timeseries
        - datasource:
            type: prometheus
            uid: duplo-metrics
          description: "**Apdex Score** measures user satisfaction based on response time thresholds:\n\n\U0001F7E2 **Green (0.94+)**: Excellent performance - Most users are satisfied\n\U0001F7E1 **Yellow (0.75-0.94)**: Acceptable performance - Some users may experience delays\n\U0001F534 **Red (<0.75)**: Poor performance - Many users are experiencing issues\n\n**Calculation**: (Satisfied + Tolerated/2) / Total Requests\n- **Satisfied**: Requests \u2264 1000 ms\n- **Tolerated**: Requests between 1000-4000 ms (counted as half)\n- **Total**: All requests"
          fieldConfig:
