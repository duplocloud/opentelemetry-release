              legendFormat: '{{method}}'
              range: true
              refId: A
          title: Request Rate by HTTP Method
          type: timeseries
        - datasource:
            type: prometheus
            uid: duplo-metrics
          fieldConfig:
            defaults:
                color:
                    mode: palette-classic
                custom:
                    axisBorderShow: false
