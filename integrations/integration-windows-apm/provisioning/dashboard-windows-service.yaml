          type: timeseries
    preload: false
    refresh: ""
    schemaVersion: 40
    tags:
        - apm-v3
        - service
        - windows-iis
        - main
    templating:
        list:
            - allowCustomValue: false
              current: {}
              datasource:
                type: prometheus
                uid: duplo-metrics
              definition: label_values(iis:request_rate:rate1m,cluster)
              label: Cluster
              name: cluster
              options: []
              query:
                qryType: 1
                query: label_values(iis:request_rate:rate1m,cluster)
                refId: PrometheusVariableQueryEditor-VariableQuery
              refresh: 1
              regex: ""
              type: query
            - allowCustomValue: false
              current: {}
              datasource:
                type: prometheus
                uid: duplo-metrics
              definition: label_values(iis:request_rate:rate1m{cluster=~"$cluster"},namespace)
              label: Namespace
              name: namespace
              options: []
              query:
                qryType: 1
                query: label_values(iis:request_rate:rate1m{cluster=~"$cluster"},namespace)
                refId: PrometheusVariableQueryEditor-VariableQuery
              refresh: 1
              regex: ""
              type: query
