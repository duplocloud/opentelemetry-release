              editorMode: code
              expr: increase(windows_iis_server_uri_cache_hits_total{cluster=~"$cluster", namespace=~"$namespace", instance=~"$instance"}[$__interval:]) / clamp_min(increase(windows_iis_server_uri_cache_queries_total{cluster=~"$cluster", namespace=~"$namespace", instance=~"$instance"}[$__interval:]),1)
