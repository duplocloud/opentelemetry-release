                      value:
                        fixedColor: blue
                        mode: fixed
          gridPos:
            h: 9
            w: 8
            x: 16
            "y": 3
          id: 4
          options:
            legend:
                calcs: []
                displayMode: list
                placement: bottom
                showLegend: true
            tooltip:
                hideZeros: false
                mode: single
                sort: none
          pluginVersion: 11.5.2
          targets:
            - datasource:
                type: prometheus
                uid: duplo-metrics
              editorMode: code
              exemplar: true
              expr: max by (site) (iis:response_time_ms_p99:rate1m{cluster=~"$cluster", namespace=~"$namespace", site=~"$site", instance=~"$instance"})
              hide: false
              instant: false
              interval: ""
              legendFormat: P99
              range: true
              refId: serviceP99Query
            - datasource:
