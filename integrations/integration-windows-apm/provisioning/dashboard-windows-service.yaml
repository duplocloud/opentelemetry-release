apiVersion: grizzly.grafana.com/v1alpha1
kind: Dashboard
metadata:
    folder: integration-windows-apm
    name: windows-service-dashboard-v3
spec:
    annotations:
        list:
            - builtIn: 1
              datasource:
                type: grafana
                uid: -- Grafana --
              enable: true
              hide: true
              iconColor: rgba(0, 211, 255, 1)
              name: Annotations & Alerts
              type: dashboard
    description: Windows Service Level Dashboard - IIS Site Detail
    editable: false
    fiscalYearStartMonth: 0
    graphTooltip: 0
    links:
        - asDropdown: false
          icon: external link
          includeVars: true
          keepTime: true
          tags: []
          targetBlank: true
          title: Windows Node Metrics
          tooltip: ""
          type: link
          url: /d/duplo-windows-overview
        - asDropdown: false
          icon: external link
          includeVars: true
          keepTime: true
          tags: []
          targetBlank: true
          title: Windows Node Logs
          tooltip: ""
          type: link
          url: /d/duplo-windows-logs
        - asDropdown: false
          icon: external link
          includeVars: false
          keepTime: true
          tags: []
          targetBlank: false
          title: Back to Windows Services Overview
          tooltip: ""
          type: link
          url: /d/windows-service-overview-dashboard-v3/windows-service-overview-dashboard-v3
        - asDropdown: false
          icon: external link
          includeVars: false
          keepTime: true
          tags: []
          targetBlank: false
          title: Site Operations
          tooltip: ""
          type: link
          url: /d/windows-service-operations-dashboard-v3/windows-service-operations-dashboard-v3?var-cluster=${cluster}&var-namespace=${namespace}&var-site=${site}&var-instance=${instance}
        - asDropdown: true
          icon: external link
          includeVars: false
          keepTime: true
          tags:
            - apm-v3
            - service
            - windows-iis
          targetBlank: false
          title: All Windows Services | Dashboards
          tooltip: ""
          type: dashboards
          url: ""
    panels:
        - fieldConfig:
            defaults: {}
            overrides: []
          gridPos:
            h: 3
            w: 12
            x: 0
            "y": 0
          id: 9
          options:
            code:
                language: plaintext
                showLineNumbers: false
                showMiniMap: false
            content: "# \U0001F6A8 Investigate RED Metrics\n\nPlease drill down to a 3-hour time window.\nThen, open the \U0001F517 Rate, Errors & Duration metrics panel links to investigate further."
            mode: markdown
          pluginVersion: 11.5.2
          title: ""
          type: text
        - datasource:
            type: prometheus
            uid: duplo-metrics
          description: "**Apdex Score** measures user satisfaction based on response time thresholds:\n\n\U0001F7E2 **Green (0.94+)**: Excellent performance - Most users are satisfied\n\U0001F7E1 **Yellow (0.75-0.94)**: Acceptable performance - Some users may experience delays\n\U0001F534 **Red (<0.75)**: Poor performance - Many users are experiencing issues\n\n**Calculation**: (Satisfied + Tolerated/2) / Total Requests\n- **Satisfied**: Requests \u2264 1000 ms\n- **Tolerated**: Requests between 1000-4000 ms (counted as half)\n- **Total**: All requests"
          fieldConfig:
            defaults:
                color:
                    mode: thresholds
                    seriesBy: last
                mappings: []
                max: 1
                min: 0
                thresholds:
                    mode: absolute
                    steps:
                        - color: dark-red
                          value: null
                        - color: light-yellow
                          value: 0.75
                        - color: dark-green
                          value: 0.94
            overrides: []
          gridPos:
            h: 3
            w: 12
            x: 12
            "y": 0
          id: 11
          options:
            colorMode: value
            graphMode: area
            justifyMode: auto
            orientation: auto
            percentChangeColorMode: standard
            reduceOptions:
                calcs:
                    - lastNotNull
                fields: ""
                values: false
            showPercentChange: false
            textMode: auto
            wideLayout: true
          pluginVersion: 11.5.2
          targets:
            - datasource:
                type: prometheus
                uid: duplo-metrics
              editorMode: code
              exemplar: false
              expr: |
                (
                  sum by (site) (iis:requests_satisfied:rate1m{cluster=~"$cluster", namespace=~"$namespace", site=~"$site", instance=~"$instance"})
                  + (
                      sum by (site) (iis:requests_tolerating:rate1m{cluster=~"$cluster", namespace=~"$namespace", site=~"$site", instance=~"$instance"})
                      or
                      sum by (site) (iis:requests_satisfied:rate1m{cluster=~"$cluster", namespace=~"$namespace", site=~"$site", instance=~"$instance"} * 0)
                    ) / 2
                )
                / sum by (site) (iis:request_rate:rate1m{cluster=~"$cluster", namespace=~"$namespace", site=~"$site", instance=~"$instance"})
              hide: false
              instant: true
              interval: ""
              legendFormat: Apdex Score
              range: false
              refId: apdexQuery
          title: Apdex Score (T = 1s)
          type: stat
        - datasource:
            type: prometheus
            uid: duplo-metrics
          fieldConfig:
            defaults:
                color:
                    mode: palette-classic
                custom:
                    axisBorderShow: false
                    axisCenteredZero: false
                    axisColorMode: text
                    axisLabel: ""
                    axisPlacement: auto
                    barAlignment: 0
                    barWidthFactor: 0.6
                    drawStyle: line
                    fillOpacity: 0
                    gradientMode: none
                    hideFrom:
                        legend: false
                        tooltip: false
                        viz: false
                    insertNulls: false
                    lineInterpolation: linear
                    lineWidth: 1
                    pointSize: 5
                    scaleDistribution:
                        type: linear
                    showPoints: auto
                    spanNulls: false
                    stacking:
                        group: A
                        mode: none
                    thresholdsStyle:
                        mode: "off"
                mappings: []
                thresholds:
                    mode: absolute
                    steps:
                        - color: semi-dark-green
                          value: null
                unit: reqps
            overrides:
                - matcher:
                    id: byName
                    options: Rate
                  properties:
                    - id: color
                      value:
                        fixedColor: '#1bc2c9'
                        mode: fixed
          gridPos:
            h: 9
            w: 8
            x: 0
            "y": 3
          id: 2
          options:
            legend:
                calcs: []
                displayMode: list
                placement: bottom
                showLegend: true
            tooltip:
                hideZeros: false
                mode: single
                sort: none
          pluginVersion: 11.5.2
          targets:
            - datasource:
                type: prometheus
                uid: duplo-metrics
              editorMode: code
              exemplar: true
              expr: sum by (site) (iis:request_rate:rate1m{cluster=~"$cluster", namespace=~"$namespace", site=~"$site", instance=~"$instance"})
              hide: false
              instant: false
              interval: ""
              legendFormat: Rate
              range: true
              refId: serviceRateQuery
          title: Rate
          transformations:
            - id: merge
              options: {}
          type: timeseries
        - datasource:
            type: prometheus
            uid: duplo-metrics
          fieldConfig:
            defaults:
                color:
                    mode: palette-classic
                custom:
                    axisBorderShow: false
                    axisCenteredZero: false
                    axisColorMode: text
                    axisLabel: ""
                    axisPlacement: auto
                    barAlignment: 0
                    barWidthFactor: 0.6
                    drawStyle: line
                    fillOpacity: 0
                    gradientMode: none
                    hideFrom:
                        legend: false
                        tooltip: false
                        viz: false
                    insertNulls: false
                    lineInterpolation: linear
                    lineWidth: 1
                    pointSize: 5
                    scaleDistribution:
                        type: linear
                    showPoints: auto
                    spanNulls: false
                    stacking:
                        group: A
                        mode: none
                    thresholdsStyle:
                        mode: "off"
                mappings: []
                thresholds:
                    mode: absolute
                    steps:
                        - color: semi-dark-green
                          value: null
                unit: percentunit
            overrides:
                - matcher:
                    id: byName
                    options: Errors
                  properties:
                    - id: color
                      value:
                        fixedColor: dark-red
                        mode: fixed
          gridPos:
            h: 9
            w: 8
            x: 8
            "y": 3
          id: 3
          options:
            legend:
                calcs: []
                displayMode: list
                placement: bottom
                showLegend: true
            tooltip:
                hideZeros: false
                mode: single
                sort: none
          pluginVersion: 11.5.2
          targets:
            - datasource:
                type: prometheus
                uid: duplo-metrics
              editorMode: code
              exemplar: true
              expr: |
                (
                  sum by (site) (rate(windows_iis_requests_total{cluster=~"$cluster", namespace=~"$namespace", site=~"$site", instance=~"$instance", status_code=~"5.."}[5m]))
                  or
                  sum by (site) (rate(windows_iis_requests_total{cluster=~"$cluster", namespace=~"$namespace", site=~"$site", instance=~"$instance"}[5m])) * 0
                )
                / sum by (site) (rate(windows_iis_requests_total{cluster=~"$cluster", namespace=~"$namespace", site=~"$site", instance=~"$instance"}[5m]))
              hide: false
              instant: false
              interval: ""
              legendFormat: Errors
              range: true
              refId: serviceErrorsQuery
          title: Errors
          transformations:
            - id: joinByField
              options:
                byField: Time
                mode: outer
            - id: merge
              options: {}
          type: timeseries
        - datasource:
            type: prometheus
            uid: duplo-metrics
          fieldConfig:
            defaults:
                color:
                    mode: palette-classic
                custom:
                    axisBorderShow: false
                    axisCenteredZero: false
                    axisColorMode: text
                    axisLabel: ""
                    axisPlacement: auto
                    barAlignment: 0
                    barWidthFactor: 0.6
                    drawStyle: line
                    fillOpacity: 0
                    gradientMode: none
                    hideFrom:
