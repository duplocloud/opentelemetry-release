apiVersion: grizzly.grafana.com/v1alpha1
kind: Dashboard
metadata:
    folder: integration-kubernetes
    name: k8s-windows-cluster-rsrc-use
spec:
    editable: false
    description: "USE method (Utilisation, Saturation, Errors) view of Windows node resources across the cluster. Identifies saturated nodes before they impact workloads."
    links:
        - asDropdown: true
          includeVars: true
          keepTime: true
          tags:
            - kubernetes-integration
          targetBlank: false
          title: Kubernetes
          type: dashboards
    panels:
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                custom:
                    fillOpacity: 10
                    showPoints: never
                    spanNulls: true
                unit: percentunit
          gridPos:
            h: 7
            w: 24
            x: 0
            "y": 0
          id: 1
          interval: 1m
          options:
            legend:
                asTable: true
                calcs:
                    - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
            tooltip:
                mode: single
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: node:windows_node_cpu_utilisation:avg5m{cluster="$cluster"} * node:windows_node_num_cpu:sum{cluster="$cluster"} / scalar(sum(node:windows_node_num_cpu:sum{cluster="$cluster"}))
              legendFormat: '{{instance}}'
          title: CPU Utilisation
          description: "Current CPU utilisation percentage. Derived from node-level metrics."
          type: timeseries
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                custom:
                    fillOpacity: 10
                    showPoints: never
                    spanNulls: true
                unit: percentunit
          gridPos:
            h: 7
            w: 12
            x: 0
            "y": 7
          id: 2
          interval: 1m
          options:
            legend:
                asTable: true
                calcs:
                    - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
            tooltip:
                mode: single
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: node:windows_node_memory_utilisation:ratio{cluster="$cluster"}
              legendFormat: '{{instance}}'
          title: Memory Utilisation
          description: "Current memory utilisation percentage across the cluster."
          type: timeseries
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                custom:
                    fillOpacity: 10
                    showPoints: never
                    spanNulls: true
                unit: short
          gridPos:
            h: 7
            w: 12
            x: 12
            "y": 7
          id: 3
          interval: 1m
          options:
            legend:
                asTable: true
                calcs:
                    - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
            tooltip:
                mode: single
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: node:windows_node_memory_swap_io_pages:irate{cluster="$cluster"}
              legendFormat: '{{instance}}'
          title: Memory Saturation (Swap I/O Pages)
          description: "Rate of swap page operations. Elevated values indicate memory pressure causing paging activity."
          type: timeseries
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                custom:
                    fillOpacity: 10
                    showPoints: never
                    spanNulls: true
                unit: percentunit
          gridPos:
            h: 7
            w: 24
            x: 0
            "y": 14
          id: 4
          interval: 1m
          options:
            legend:
                asTable: true
                calcs:
                    - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
            tooltip:
                mode: single
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: node:windows_node_disk_utilisation:avg_irate{cluster="$cluster"} / scalar(node:windows_node:sum{cluster="$cluster"})
              legendFormat: '{{instance}}'
          title: Disk IO Utilisation
          description: "Percentage of time the disk is busy with read or write operations. Values near 100% indicate saturation."
          type: timeseries
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                custom:
                    fillOpacity: 10
                    showPoints: never
                    spanNulls: true
                unit: Bps
          gridPos:
            h: 7
            w: 12
            x: 0
            "y": 21
          id: 5
          interval: 1m
          options:
            legend:
                asTable: true
                calcs:
                    - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
            tooltip:
                mode: single
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: node:windows_node_net_utilisation:sum_irate{cluster="$cluster"}
              legendFormat: '{{instance}}'
          title: Net Utilisation (Transmitted)
          description: "Total outbound network throughput across all Windows nodes or the selected node."
          type: timeseries
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                custom:
                    fillOpacity: 10
                    showPoints: never
                    spanNulls: true
                unit: Bps
          gridPos:
            h: 7
            w: 12
            x: 12
            "y": 21
          id: 6
          interval: 1m
          options:
            legend:
                asTable: true
                calcs:
                    - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
            tooltip:
                mode: single
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: node:windows_node_net_saturation:sum_irate{cluster="$cluster"}
              legendFormat: '{{instance}}'
          title: Net Utilisation (Dropped)
          description: "Rate of inbound and outbound packets dropped across Windows nodes. Non-zero values indicate network saturation."
          type: timeseries
        - datasource:
            type: datasource
            uid: -- Mixed --
          fieldConfig:
            defaults:
                custom:
                    fillOpacity: 10
                    showPoints: never
                    spanNulls: true
                unit: percentunit
          gridPos:
            h: 7
            w: 24
            x: 0
            "y": 28
          id: 7
          interval: 1m
          options:
            legend:
                asTable: true
                calcs:
                    - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
            tooltip:
                mode: single
          pluginVersion: v11.4.0
          targets:
            - datasource:
                type: prometheus
                uid: ${datasource}
              expr: sum by (instance)(node:windows_node_filesystem_usage:{cluster="$cluster"})
              legendFormat: '{{instance}}'
          title: Disk Capacity
          description: "Disk space utilisation percentage per volume across all Windows nodes."
          type: timeseries
    refresh: 1m
    schemaVersion: 39
    tags:
        - kubernetes-windows-integration
        - kubernetes-integration
    templating:
        list:
            - current:
                selected: true
                text: duplo-metrics
                value: duplo-metrics
              hide: 0
              label: Data source
              name: datasource
              query: prometheus
              regex: ""
              type: datasource
            - datasource:
                type: prometheus
                uid: ${datasource}
              hide: 0
              label: cluster
              name: cluster
              query: label_values(up{job="integrations/windows_exporter"}, cluster)
              refresh: 2
              sort: 1
              type: query
    time:
        from: now-1h
        to: now
    timezone: utc
    title: K8s / USE Method / Cluster
    uid: k8s-windows-cluster-rsrc-use
