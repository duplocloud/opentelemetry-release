apiVersion: grizzly.grafana.com/v1alpha1
kind: Dashboard
metadata:
  folder: integration-jvm
  name: integration-jvm-runtime
spec:
    annotations:
        list:
        - builtIn: 1
          datasource:
            type: datasource
            uid: grafana
          enable: true
          hide: true
          iconColor: rgba(0, 211, 255, 1)
          limit: 100
          name: Annotations & Alerts
          showIn: 0
          type: dashboard
    description: JVM Runtime details (CPU, Threads, Classloading, File Descriptors, Logs)
    editable: true
    fiscalYearStartMonth: 0
    graphTooltip: 1
    links:
    - asDropdown: false
      icon: external link
      includeVars: true
      keepTime: true
      tags: []
      targetBlank: false
      title: Back to JVM Overview
      tooltip: ""
      type: link
      url: /d/integration-jvm-dashboard/jvm-overview?${__url_time_range}&${__all_variables}
    - asDropdown: false
      icon: external link
      includeVars: true
      keepTime: true
      tags: []
      targetBlank: false
      title: JVM Memory
      tooltip: ""
      type: link
      url: /d/integration-jvm-memory/jvm-memory?${__url_time_range}&${__all_variables}
    - asDropdown: false
      icon: external link
      includeVars: true
      keepTime: true
      tags: []
      targetBlank: false
      title: JVM GC
      tooltip: ""
      type: link
      url: /d/integration-jvm-gc/jvm-gc?${__url_time_range}&${__all_variables}
    - asDropdown: false
      icon: external link
      includeVars: true
      keepTime: true
      tags: []
      targetBlank: false
      title: JVM Profiles
      tooltip: ""
      type: link
      url: /d/integration-jvm-profiles/jvm-profiles?${__url_time_range}&${__all_variables}
    panels:
    - collapsed: false
      gridPos:
        h: 1
        w: 24
        x: 0
        y: 0
      id: 1
      panels: []
      title: CPU & Load
      type: row
    - datasource:
        type: prometheus
        uid: duplo-metrics
      fieldConfig:
        defaults:
          custom:
            axisBorderShow: false
            axisCenteredZero: false
            axisColorMode: text
            axisLabel: ""
            axisPlacement: auto
            barAlignment: 0
            drawStyle: line
            fillOpacity: 10
            gradientMode: none
            hideFrom:
              legend: false
              tooltip: false
              viz: false
            lineInterpolation: linear
            lineWidth: 1
            pointSize: 5
            scaleDistribution:
              type: linear
            showPoints: never
            spanNulls: false
            stacking:
              group: A
              mode: none
            thresholdsStyle:
              mode: "off"
          mappings: []
          thresholds:
            mode: absolute
            steps:
            - color: green
            - color: red
              value: 80
          unit: percentunit
        overrides: []
      gridPos:
        h: 10
        w: 12
        x: 0
        y: 1
      id: 2
      options:
        legend:
          calcs: []
          displayMode: list
          placement: bottom
          showLegend: true
        tooltip:
          hideZeros: false
          mode: multi
          sort: desc
      targets:
      - datasource:
          type: prometheus
          uid: duplo-metrics
        expr: avg by(job,instance)({__name__=~"process_cpu_usage|jvm_cpu_recent_utilization_ratio|process_runtime_jvm_cpu_utilization_ratio", cluster="$cluster", job="$application", instance=~"$pod"})
        legendFormat: '{{instance}} process'
        refId: A
      - datasource:
          type: prometheus
          uid: duplo-metrics
        expr: avg by(job,instance)({__name__=~"system_cpu_usage|system_cpu_utilization_ratio|process_runtime_jvm_system_cpu_utilization_ratio", cluster="$cluster", job="$application", instance=~"$pod"})
        legendFormat: '{{instance}} system'
        refId: B
      - datasource:
          type: prometheus
          uid: duplo-metrics
        expr: avg_over_time(({__name__=~"process_cpu_usage|jvm_cpu_recent_utilization_ratio|process_runtime_jvm_cpu_utilization_ratio", cluster="$cluster", job="$application", instance=~"$pod"})[15m:])
        legendFormat: '{{instance}} avg 15m'
        refId: C
      title: CPU Usage
      type: timeseries
    - datasource:
        type: prometheus
        uid: duplo-metrics
      fieldConfig:
        defaults:
          custom:
            axisBorderShow: false
            axisCenteredZero: false
            axisColorMode: text
            axisLabel: ""
            axisPlacement: auto
            barAlignment: 0
            drawStyle: line
            fillOpacity: 10
            gradientMode: none
            hideFrom:
              legend: false
              tooltip: false
              viz: false
            lineInterpolation: linear
            lineWidth: 1
            pointSize: 5
            scaleDistribution:
              type: linear
            showPoints: never
            spanNulls: false
            stacking:
              group: A
              mode: none
            thresholdsStyle:
              mode: "off"
          mappings: []
          thresholds:
            mode: absolute
            steps:
            - color: green
            - color: red
              value: 80
          unit: short
        overrides: []
      gridPos:
        h: 10
        w: 12
        x: 12
        y: 1
      id: 3
      options:
        legend:
          calcs: []
          displayMode: list
          placement: bottom
          showLegend: true
        tooltip:
          hideZeros: false
          mode: multi
          sort: desc
      targets:
      - datasource:
          type: prometheus
          uid: duplo-metrics
        expr: avg by(job,instance)({__name__=~"system_load_average_1m|process_runtime_jvm_system_cpu_load_1m", cluster="$cluster", job="$application", instance=~"$pod"})
        legendFormat: '{{instance}} load 1m'
        refId: A
      - datasource:
          type: prometheus
          uid: duplo-metrics
        expr: avg by(job,instance)({__name__=~"system_cpu_count|jvm_cpu_count", cluster="$cluster", job="$application", instance=~"$pod"})
        legendFormat: '{{instance}} processors'
        refId: B
      title: Load
      type: timeseries
    - collapsed: false
      gridPos:
        h: 1
        w: 24
        x: 0
        y: 11
      id: 4
      panels: []
      title: Threads
      type: row
    - datasource:
        type: prometheus
        uid: duplo-metrics
      fieldConfig:
        defaults:
          custom:
            axisBorderShow: false
            axisCenteredZero: false
            axisColorMode: text
            axisLabel: ""
            axisPlacement: auto
            barAlignment: 0
            drawStyle: line
            fillOpacity: 10
            gradientMode: none
            hideFrom:
              legend: false
              tooltip: false
              viz: false
            lineInterpolation: linear
            lineWidth: 1
            pointSize: 5
            scaleDistribution:
              type: linear
            showPoints: never
            spanNulls: false
            stacking:
              group: A
              mode: none
            thresholdsStyle:
              mode: "off"
          mappings: []
          thresholds:
            mode: absolute
            steps:
            - color: green
            - color: red
              value: 80
          unit: short
        overrides: []
      gridPos:
        h: 10
        w: 12
        x: 0
        y: 12
      id: 5
      options:
        legend:
          calcs: []
          displayMode: list
          placement: bottom
          showLegend: true
        tooltip:
          hideZeros: false
          mode: multi
          sort: desc
      targets:
      - datasource:
          type: prometheus
          uid: duplo-metrics
        expr: avg by(job,instance)({__name__=~"jvm_threads_live|jvm_thread_count|process_runtime_jvm_threads_count", cluster="$cluster", job="$application", instance=~"$pod"})
        legendFormat: '{{instance}} live'
        refId: A
      - datasource:
          type: prometheus
          uid: duplo-metrics
        expr: avg by(job,instance)({__name__=~"jvm_threads_daemon|jvm_thread_daemon_count", cluster="$cluster", job="$application", instance=~"$pod"})
        legendFormat: '{{instance}} daemon'
        refId: B
      - datasource:
          type: prometheus
          uid: duplo-metrics
        expr: avg by(job,instance)({__name__=~"jvm_threads_peak|jvm_thread_peak_count", cluster="$cluster", job="$application", instance=~"$pod"})
        legendFormat: '{{instance}} peak'
        refId: C
      title: Threads
      type: timeseries
    - datasource:
        type: prometheus
        uid: duplo-metrics
      fieldConfig:
        defaults:
          custom:
            axisBorderShow: false
            axisCenteredZero: false
            axisColorMode: text
            axisLabel: ""
            axisPlacement: auto
            barAlignment: 0
            drawStyle: line
            fillOpacity: 10
            gradientMode: none
            hideFrom:
              legend: false
              tooltip: false
              viz: false
            lineInterpolation: linear
            lineWidth: 1
            pointSize: 5
            scaleDistribution:
              type: linear
            showPoints: never
            spanNulls: false
            stacking:
              group: A
              mode: normal
            thresholdsStyle:
              mode: "off"
          mappings: []
          thresholds:
            mode: absolute
            steps:
            - color: green
            - color: red
              value: 80
          unit: short
        overrides: []
      gridPos:
        h: 10
        w: 12
        x: 12
        y: 12
      id: 6
      options:
        legend:
          calcs: []
          displayMode: list
          placement: bottom
          showLegend: true
        tooltip:
          hideZeros: false
          mode: multi
          sort: desc
      targets:
      - datasource:
          type: prometheus
          uid: duplo-metrics
        expr: sum(jvm_threads_states{state="runnable", cluster="$cluster", job="$application", instance=~"$pod"}) or sum(jvm_thread_count{jvm_thread_state="RUNNABLE", cluster="$cluster", job="$application", instance=~"$pod"})
        legendFormat: runnable
        refId: A
      - datasource:
          type: prometheus
          uid: duplo-metrics
        expr: sum(jvm_threads_states{state="blocked", cluster="$cluster", job="$application", instance=~"$pod"}) or sum(jvm_thread_count{jvm_thread_state="BLOCKED", cluster="$cluster", job="$application", instance=~"$pod"})
        legendFormat: blocked
        refId: B
      - datasource:
          type: prometheus
          uid: duplo-metrics
        expr: sum(jvm_threads_states{state="waiting", cluster="$cluster", job="$application", instance=~"$pod"}) or sum(jvm_thread_count{jvm_thread_state="WAITING", cluster="$cluster", job="$application", instance=~"$pod"})
        legendFormat: waiting
        refId: C
      - datasource:
          type: prometheus
          uid: duplo-metrics
        expr: sum(jvm_threads_states{state="timed-waiting", cluster="$cluster", job="$application", instance=~"$pod"}) or sum(jvm_thread_count{jvm_thread_state="TIMED_WAITING", cluster="$cluster", job="$application", instance=~"$pod"})
        legendFormat: timed-waiting
        refId: D
      - datasource:
          type: prometheus
          uid: duplo-metrics
        expr: sum(jvm_threads_states{state="new", cluster="$cluster", job="$application", instance=~"$pod"}) or sum(jvm_thread_count{jvm_thread_state="NEW", cluster="$cluster", job="$application", instance=~"$pod"})
        legendFormat: new
        refId: E
      - datasource:
          type: prometheus
          uid: duplo-metrics
        expr: sum(jvm_threads_states{state="terminated", cluster="$cluster", job="$application", instance=~"$pod"}) or sum(jvm_thread_count{jvm_thread_state="TERMINATED", cluster="$cluster", job="$application", instance=~"$pod"})
        legendFormat: terminated
        refId: F
      title: Thread States
      type: timeseries
    - collapsed: false
      gridPos:
        h: 1
        w: 24
        x: 0
        y: 22
      id: 7
      panels: []
      title: System Resources
      type: row
    - datasource:
        type: prometheus
        uid: duplo-metrics
      fieldConfig:
        defaults:
          custom:
            axisBorderShow: false
            axisCenteredZero: false
            axisColorMode: text
            axisLabel: ""
            axisPlacement: auto
            barAlignment: 0
            drawStyle: line
            fillOpacity: 10
            gradientMode: none
            hideFrom:
              legend: false
              tooltip: false
              viz: false
            lineInterpolation: linear
            lineWidth: 1
            pointSize: 5
            scaleDistribution:
              type: linear
            showPoints: never
            spanNulls: false
            stacking:
              group: A
              mode: none
            thresholdsStyle:
              mode: "off"
          mappings: []
          thresholds:
            mode: absolute
            steps:
            - color: green
            - color: red
              value: 80
          unit: short
        overrides: []
      gridPos:
        h: 10
        w: 12
        x: 0
        y: 23
      id: 8
      options:
        legend:
          calcs: []
          displayMode: list
          placement: bottom
          showLegend: true
        tooltip:
          hideZeros: false
          mode: multi
          sort: desc
      targets:
      - datasource:
          type: prometheus
          uid: duplo-metrics
        expr: '{__name__=~"process_files_open|process_open_fds|process_open_file_descriptor_count", cluster="$cluster", job="$application", instance=~"$pod"}'
        legendFormat: '{{instance}} open'
        refId: A
      - datasource:
          type: prometheus
          uid: duplo-metrics
        expr: '{__name__=~"process_files_max|process_max_fds|process_max_file_descriptor_count", cluster="$cluster", job="$application", instance=~"$pod"}'
        legendFormat: '{{instance}} max'
        refId: B
      title: File Descriptors
      type: timeseries
    - datasource:
        type: prometheus
        uid: duplo-metrics
      fieldConfig:
        defaults:
          custom:
            axisBorderShow: false
            axisCenteredZero: false
            axisColorMode: text
            axisLabel: ""
            axisPlacement: auto
            barAlignment: 0
            drawStyle: line
            fillOpacity: 10
            gradientMode: none
            hideFrom:
              legend: false
              tooltip: false
              viz: false
            lineInterpolation: linear
            lineWidth: 1
            pointSize: 5
            scaleDistribution:
              type: linear
            showPoints: never
            spanNulls: false
            stacking:
              group: A
              mode: none
            thresholdsStyle:
              mode: "off"
          mappings: []
          thresholds:
            mode: absolute
            steps:
            - color: green
            - color: red
              value: 80
          unit: short
        overrides: []
      gridPos:
        h: 10
        w: 12
        x: 12
        y: 23
      id: 9
      options:
        legend:
          calcs: []
          displayMode: list
          placement: bottom
          showLegend: true
        tooltip:
          hideZeros: false
          mode: multi
          sort: desc
      targets:
      - datasource:
          type: prometheus
          uid: duplo-metrics
        expr: increase(logback_events_total{cluster="$cluster", job="$application", instance=~"$pod"}[1m])
        legendFormat: '{{instance}} {{level}}'
        refId: A
      title: Log Events
      type: timeseries
    - collapsed: false
      gridPos:
        h: 1
        w: 24
        x: 0
        y: 33
      id: 10
      panels: []
      title: Classloading
      type: row
    - datasource:
        type: prometheus
        uid: duplo-metrics
      fieldConfig:
        defaults:
          custom:
            axisBorderShow: false
            axisCenteredZero: false
            axisColorMode: text
            axisLabel: ""
            axisPlacement: auto
            barAlignment: 0
            drawStyle: line
            fillOpacity: 10
            gradientMode: none
            hideFrom:
              legend: false
              tooltip: false
              viz: false
            lineInterpolation: linear
            lineWidth: 1
            pointSize: 5
            scaleDistribution:
              type: linear
            showPoints: never
            spanNulls: false
            stacking:
              group: A
              mode: none
            thresholdsStyle:
              mode: "off"
          mappings: []
          thresholds:
            mode: absolute
            steps:
            - color: green
            - color: red
              value: 80
          unit: short
        overrides: []
      gridPos:
        h: 10
        w: 12
        x: 0
        y: 34
      id: 11
      options:
        legend:
          calcs: []
          displayMode: list
          placement: bottom
          showLegend: true
        tooltip:
          hideZeros: false
          mode: multi
          sort: desc
      targets:
      - datasource:
          type: prometheus
          uid: duplo-metrics
        expr: avg by(job,instance)({__name__=~"jvm_classes_loaded|jvm_class_count|jvm_class_loaded_total|process_runtime_jvm_classes_current_loaded", cluster="$cluster", job="$application", instance=~"$pod"})
        legendFormat: '{{instance}}'
        refId: A
      title: Classes Loaded
      type: timeseries
    - datasource:
        type: prometheus
        uid: duplo-metrics
      fieldConfig:
        defaults:
          custom:
            axisBorderShow: false
            axisCenteredZero: false
            axisColorMode: text
            axisLabel: ""
            axisPlacement: auto
            barAlignment: 0
            drawStyle: line
            fillOpacity: 10
            gradientMode: none
            hideFrom:
              legend: false
              tooltip: false
              viz: false
            lineInterpolation: linear
            lineWidth: 1
            pointSize: 5
            scaleDistribution:
              type: linear
            showPoints: never
            spanNulls: false
            stacking:
              group: A
              mode: none
            thresholdsStyle:
              mode: "off"
          mappings: []
          thresholds:
            mode: absolute
            steps:
            - color: green
            - color: red
              value: 80
          unit: short
        overrides: []
      gridPos:
        h: 10
        w: 12
        x: 12
        y: 34
      id: 12
      options:
        legend:
          calcs: []
          displayMode: list
          placement: bottom
          showLegend: true
        tooltip:
          hideZeros: false
          mode: multi
          sort: desc
      targets:
      - datasource:
          type: prometheus
          uid: duplo-metrics
        expr: delta(({__name__=~"jvm_classes_loaded|jvm_class_count|process_runtime_jvm_classes_current_loaded", cluster="$cluster", job="$application", instance=~"$pod"})[1m:])
        legendFormat: '{{instance}} delta'
        refId: A
      - datasource:
          type: prometheus
          uid: duplo-metrics
        expr: increase({__name__=~"jvm_classes_unloaded|jvm_class_unloaded_total|process_runtime_jvm_classes_unloaded_total", cluster="$cluster", job="$application", instance=~"$pod"}[1m])
        legendFormat: '{{instance}} unloaded'
        refId: B
      title: Class Delta
      type: timeseries
    schemaVersion: 39
    tags:
    - jvm
    - java
    - runtime
    templating:
        list:
        - current:
            selected: false
            text: ""
            value: ""
          datasource:
            type: prometheus
            uid: duplo-metrics
          definition: label_values(jvm_memory_used_bytes, cluster)
          includeAll: false
          multi: false
          name: cluster
          query:
            qryType: 1
            query: label_values(jvm_memory_used_bytes, cluster)
            refId: PrometheusVariableQueryEditor-VariableQuery
          refresh: 2
          sort: 1
          type: query
        - allValue: .*
          current:
            selected: false
            text: All
            value: $__all
          datasource:
            type: prometheus
            uid: duplo-metrics
          definition: label_values(jvm_memory_used_bytes{cluster="$cluster"}, instance)
          includeAll: true
          multi: true
          name: namespace
          query:
            qryType: 1
            query: label_values(jvm_memory_used_bytes{cluster="$cluster"}, instance)
            refId: PrometheusVariableQueryEditor-VariableQuery
          refresh: 2
          regex: /^([^.]+)\..+/
          sort: 1
          type: query
        - current:
            selected: false
            text: ""
            value: ""
          datasource:
            type: prometheus
            uid: duplo-metrics
          definition: label_values(jvm_memory_used_bytes{cluster="$cluster", instance=~"($namespace)\\..+"}, job)
          includeAll: false
          label: Job
          multi: false
          name: application
          query:
            qryType: 1
            query: label_values(jvm_memory_used_bytes{cluster="$cluster", instance=~"($namespace)\\..+"}, job)
            refId: PrometheusVariableQueryEditor-VariableQuery
          refresh: 2
          sort: 1
          type: query
        - allValue: .*
          current:
            selected: false
            text: All
            value: $__all
          datasource:
            type: prometheus
            uid: duplo-metrics
          definition: label_values(jvm_memory_used_bytes{cluster="$cluster", job="$application", instance=~"($namespace)\\..+"}, instance)
          includeAll: true
          multi: true
          name: pod
          query:
            qryType: 1
            query: label_values(jvm_memory_used_bytes{cluster="$cluster", job="$application", instance=~"($namespace)\\..+"}, instance)
            refId: PrometheusVariableQueryEditor-VariableQuery
          refresh: 2
          sort: 1
          type: query
    time:
        from: now-6h
        to: now
    timepicker: {}
    timezone: ""
    title: JVM Runtime
    uid: integration-jvm-runtime
