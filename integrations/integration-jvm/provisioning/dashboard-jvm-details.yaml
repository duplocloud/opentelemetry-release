      refId: A
    title: Log Events
    type: timeseries
  - collapsed: false
    gridPos:
      h: 1
      w: 24
      x: 0
      y: 36
    id: 17
    panels: []
    title: Classloading
    type: row
  - datasource:
      type: prometheus
      uid: duplo-metrics
    fieldConfig:
      defaults:
        custom:
          axisBorderShow: false
          axisCenteredZero: false
          axisColorMode: text
          axisLabel: ''
          axisPlacement: auto
          barAlignment: 0
          drawStyle: line
          fillOpacity: 10
          gradientMode: none
          hideFrom:
            legend: false
            tooltip: false
            viz: false
          lineInterpolation: linear
          lineWidth: 1
          pointSize: 5
          scaleDistribution:
            type: linear
          showPoints: never
          spanNulls: false
          stacking:
            group: A
            mode: none
          thresholdsStyle:
            mode: 'off'
        mappings: []
        thresholds:
          mode: absolute
          steps:
          - color: green
          - color: red
            value: 80
        unit: short
      overrides: []
    gridPos:
      h: 10
      w: 12
      x: 0
      y: 37
    id: 18
    options:
      legend:
        calcs: []
        displayMode: list
        placement: bottom
        showLegend: true
      tooltip:
        hideZeros: false
        mode: multi
        sort: desc
    targets:
    - datasource:
        type: prometheus
        uid: duplo-metrics
      expr: avg by(job,instance)({__name__=~"jvm_classes_loaded|jvm_class_count|jvm_class_loaded_total|process_runtime_jvm_classes_current_loaded", cluster="$cluster", job="$application", instance=~"$pod"})
      legendFormat: '{{instance}}'
      refId: A
    title: Classes Loaded
    type: timeseries
  - datasource:
      type: prometheus
      uid: duplo-metrics
    fieldConfig:
      defaults:
        custom:
          axisBorderShow: false
          axisCenteredZero: false
          axisColorMode: text
