      overrides: []
    gridPos:
      h: 4
      w: 6
      x: 12
      y: 5
    id: 10
    options:
      colorMode: value
      graphMode: none
      justifyMode: auto
      orientation: horizontal
      reduceOptions:
        calcs:
        - lastNotNull
        fields: ''
        values: false
      showPercentChange: false
      textMode: auto
      wideLayout: true
    targets:
    - datasource:
        type: prometheus
        uid: duplo-metrics
      expr: max({__name__=~"process_files_open|process_open_fds|process_open_file_descriptor_count", cluster="$cluster", job="$application", instance=~"$pod"})
      format: time_series
      legendFormat: ''
      refId: A
    title: Max Open FDs
    type: stat
  - datasource:
      type: prometheus
      uid: duplo-metrics
    fieldConfig:
      defaults:
        color:
          mode: thresholds
        mappings: []
        thresholds:
          mode: absolute
          steps:
          - color: green
            value: null
          - color: yellow
            value: 1
          - color: red
            value: 10
        unit: short
      overrides: []
    gridPos:
      h: 4
      w: 6
      x: 18
      y: 5
    id: 11
    options:
      colorMode: value
      graphMode: none
      justifyMode: auto
      orientation: horizontal
      reduceOptions:
        calcs:
        - lastNotNull
        fields: ''
        values: false
      showPercentChange: false
      textMode: auto
      wideLayout: true
    targets:
    - datasource:
        type: prometheus
        uid: duplo-metrics
      expr: sum(rate(logback_events_total{cluster="$cluster", job="$application", level="error", instance=~"$pod"}[2m]))*60
      format: time_series
      legendFormat: ''
      refId: A
    title: Error Logs /min
    type: stat
  - collapsed: false
    gridPos:
      h: 1
      w: 24
      x: 0
      y: 9
    id: 12
    panels: []
    title: JVM Memory Overview
    type: row
  - datasource:
      type: prometheus
      uid: duplo-metrics
    fieldConfig:
      defaults:
        color:
          mode: palette-classic
        custom:
          axisBorderShow: false
          axisCenteredZero: false
          axisColorMode: text
          axisLabel: ''
          axisPlacement: auto
          barAlignment: 0
          barWidthFactor: 0.6
          drawStyle: line
          fillOpacity: 10
          gradientMode: none
          hideFrom:
            legend: false
            tooltip: false
            viz: false
          insertNulls: false
          lineInterpolation: linear
          lineWidth: 1
          pointSize: 5
          scaleDistribution:
            type: linear
          showPoints: never
          spanNulls: false
          stacking:
            group: A
            mode: none
          thresholdsStyle:
            mode: 'off'
        mappings: []
        thresholds:
          mode: absolute
          steps:
          - color: green
          - color: red
            value: 80
        unit: bytes
      overrides: []
    gridPos:
      h: 10
      w: 12
      x: 0
      y: 10
    id: 13
    options:
      legend:
        calcs: []
        displayMode: list
        placement: bottom
        showLegend: true
      tooltip:
        hideZeros: false
        mode: multi
        sort: desc
    targets:
    - datasource:
        type: prometheus
        uid: duplo-metrics
      expr: avg by(job,instance)(jvm_memory_used_bytes{cluster="$cluster", job="$application", instance=~"$pod", area="heap"}) or avg by(job,instance)(jvm_memory_used_bytes{cluster="$cluster", job="$application", instance=~"$pod", jvm_memory_type="heap"}) or avg by(job,instance)(process_runtime_jvm_memory_usage_bytes{cluster="$cluster", job="$application", instance=~"$pod", type="heap"})
      format: time_series
      hide: false
      intervalFactor: 2
      legendFormat: '{{instance}} used'
      refId: A
    - datasource:
        type: prometheus
        uid: duplo-metrics
      expr: avg by(job,instance)(jvm_memory_committed_bytes{cluster="$cluster", job="$application", instance=~"$pod", area="heap"}) or avg by(job,instance)(jvm_memory_committed_bytes{cluster="$cluster", job="$application", instance=~"$pod", jvm_memory_type="heap"}) or avg by(job,instance)(process_runtime_jvm_memory_committed_bytes{cluster="$cluster", job="$application", instance=~"$pod", type="heap"})
      format: time_series
      hide: false
      intervalFactor: 2
      legendFormat: '{{instance}} committed'
      refId: B
    - datasource:
        type: prometheus
        uid: duplo-metrics
      expr: avg by(job,instance)(jvm_memory_max_bytes{cluster="$cluster", job="$application", instance=~"$pod", area="heap"}) or avg by(job,instance)(jvm_memory_limit_bytes{cluster="$cluster", job="$application", instance=~"$pod", jvm_memory_type="heap"}) or avg by(job,instance)(process_runtime_jvm_memory_limit_bytes{cluster="$cluster", job="$application", instance=~"$pod", type="heap"})
      format: time_series
      hide: false
      intervalFactor: 2
      legendFormat: '{{instance}} max'
      refId: C
    title: JVM Heap
    type: timeseries
  - datasource:
      type: prometheus
      uid: duplo-metrics
    fieldConfig:
      defaults:
        color:
