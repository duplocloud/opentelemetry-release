apiVersion: grizzly.grafana.com/v1alpha1
kind: Dashboard
metadata:
    folder: integration-jvm
    name: integration-jvm-dashboard
spec:
    annotations:
        list:
            - builtIn: 1
              datasource:
                type: datasource
                uid: grafana
              enable: true
              hide: true
              iconColor: rgba(0, 211, 255, 1)
              name: Annotations & Alerts
              target:
                limit: 100
                matchAny: false
                tags: []
                type: dashboard
              type: dashboard
            - datasource:
                type: prometheus
                uid: duplo-metrics
              enable: true
              expr: resets(process_uptime_seconds{cluster="$cluster", job="$application"}[1m]) > 0
              hide: false
              iconColor: rgba(255, 96, 96, 1)
              name: Restart Detection
              showIn: 0
              step: 1m
              tagKeys: restart-tag
              textFormat: uptime reset
              titleFormat: Restart
    description: Dashboard for Micrometer instrumented applications (Java, Spring Boot, Micronaut)
    editable: false
    fiscalYearStartMonth: 0
    graphTooltip: 1
    links:
        - asDropdown: false
          icon: external link
          includeVars: true
          keepTime: true
          tags: []
          targetBlank: false
          title: JVM Memory
          tooltip: ""
          type: link
          url: /d/integration-jvm-memory/jvm-memory?${__url_time_range}&${__all_variables}
        - asDropdown: false
          icon: external link
          includeVars: true
          keepTime: true
          tags: []
          targetBlank: false
          title: JVM Runtime
          tooltip: ""
          type: link
          url: /d/integration-jvm-runtime/jvm-runtime?${__url_time_range}&${__all_variables}
        - asDropdown: false
          icon: external link
          includeVars: true
          keepTime: true
          tags: []
          targetBlank: false
          title: JVM GC
          tooltip: ""
          type: link
          url: /d/integration-jvm-gc/jvm-gc?${__url_time_range}&${__all_variables}
        - asDropdown: false
          icon: external link
          includeVars: true
          keepTime: true
          tags: []
          targetBlank: false
          title: JVM Profiles
          tooltip: ""
          type: link
          url: /d/integration-jvm-profiles/jvm-profiles?${__url_time_range}&${__all_variables}
    panels:
        - collapsed: false
          gridPos:
            h: 1
            w: 24
            x: 0
            "y": 0
          id: 1
          panels: []
          title: Quick Facts
          type: row
        - datasource:
            type: prometheus
            uid: duplo-metrics
          fieldConfig:
            defaults:
                color:
                    fixedColor: green
                    mode: fixed
                mappings: []
                thresholds:
                    mode: absolute
                    steps:
                        - color: green
                          value: null
                unit: s
            overrides: []
          gridPos:
            h: 4
            w: 4
            x: 0
            "y": 1
          id: 2
          options:
            colorMode: value
            graphMode: none
            justifyMode: auto
            orientation: horizontal
            reduceOptions:
                calcs:
                    - lastNotNull
                fields: ""
                values: false
            showPercentChange: false
            textMode: auto
            wideLayout: true
          targets:
            - datasource:
                type: prometheus
                uid: duplo-metrics
              expr: max(process_uptime_seconds{cluster="$cluster", job="$application"})
              format: time_series
              legendFormat: ""
              refId: A
          title: Uptime
          type: stat
        - datasource:
            type: prometheus
            uid: duplo-metrics
          fieldConfig:
            defaults:
                color:
                    fixedColor: green
                    mode: fixed
                mappings: []
                thresholds:
                    mode: absolute
                    steps:
                        - color: green
                          value: null
                unit: dateTimeAsIso
            overrides: []
          gridPos:
            h: 4
            w: 4
            x: 4
            "y": 1
          id: 3
          options:
            colorMode: value
            graphMode: none
            justifyMode: auto
            orientation: horizontal
            reduceOptions:
                calcs:
                    - lastNotNull
                fields: ""
                values: false
            showPercentChange: false
            textMode: auto
            wideLayout: true
          targets:
            - datasource:
                type: prometheus
                uid: duplo-metrics
              expr: min(process_start_time_seconds{cluster="$cluster", job="$application"})*1000
              format: time_series
              legendFormat: ""
              refId: A
          title: Start time
          type: stat
        - datasource:
            type: prometheus
            uid: duplo-metrics
          fieldConfig:
            defaults:
                color:
                    mode: thresholds
                mappings: []
                thresholds:
                    mode: absolute
                    steps:
                        - color: green
                          value: null
                        - color: yellow
                          value: 70
                        - color: red
                          value: 90
                unit: percent
            overrides: []
          gridPos:
            h: 4
            w: 4
            x: 8
            "y": 1
          id: 4
          options:
            colorMode: value
            graphMode: none
            justifyMode: auto
            orientation: horizontal
            reduceOptions:
                calcs:
                    - lastNotNull
                fields: ""
                values: false
            showPercentChange: false
            textMode: auto
            wideLayout: true
          targets:
            - datasource:
                type: prometheus
                uid: duplo-metrics
              expr: sum(jvm_memory_used_bytes{cluster="$cluster", job="$application", area="heap"})*100/sum(jvm_memory_max_bytes{cluster="$cluster", job="$application", area="heap"}) or sum(jvm_memory_used_bytes{cluster="$cluster", job="$application", jvm_memory_type="heap"})*100/clamp_min(sum(jvm_memory_limit_bytes{cluster="$cluster", job="$application", jvm_memory_type="heap"}),1) or sum(process_runtime_jvm_memory_usage_bytes{cluster="$cluster", job="$application", type="heap"})*100/sum(process_runtime_jvm_memory_limit_bytes{cluster="$cluster", job="$application", type="heap"})
              format: time_series
              legendFormat: ""
              refId: A
          title: Heap Used
          type: stat
        - datasource:
            type: prometheus
            uid: duplo-metrics
          fieldConfig:
            defaults:
                color:
                    mode: thresholds
                mappings: []
                thresholds:
                    mode: absolute
                    steps:
                        - color: green
                          value: null
                        - color: yellow
                          value: 70
                        - color: red
                          value: 90
                unit: percent
            overrides: []
          gridPos:
            h: 4
            w: 4
            x: 12
            "y": 1
          id: 5
          options:
            colorMode: value
            graphMode: none
            justifyMode: auto
            orientation: horizontal
            reduceOptions:
                calcs:
                    - lastNotNull
                fields: ""
                values: false
            showPercentChange: false
            textMode: auto
            wideLayout: true
          targets:
            - datasource:
                type: prometheus
                uid: duplo-metrics
              expr: sum(jvm_memory_used_bytes{cluster="$cluster", job="$application", area="nonheap"})*100/clamp_min(sum(jvm_memory_max_bytes{cluster="$cluster", job="$application", area="nonheap"}),1) or sum(jvm_memory_used_bytes{cluster="$cluster", job="$application", jvm_memory_type="non_heap"})*100/clamp_min(sum(jvm_memory_limit_bytes{cluster="$cluster", job="$application", jvm_memory_type="non_heap"}),1) or sum(process_runtime_jvm_memory_usage_bytes{cluster="$cluster", job="$application", type="nonheap"})*100/clamp_min(sum(process_runtime_jvm_memory_limit_bytes{cluster="$cluster", job="$application", type="nonheap"}),1)
              format: time_series
              legendFormat: ""
              refId: A
          title: Non-Heap Used
          type: stat
        - datasource:
            type: prometheus
            uid: duplo-metrics
          fieldConfig:
            defaults:
                color:
                    mode: thresholds
                mappings: []
                thresholds:
                    mode: absolute
                    steps:
                        - color: green
                          value: null
                        - color: red
                          value: 1
                unit: reqps
            overrides: []
          gridPos:
            h: 4
            w: 4
            x: 16
            "y": 1
          id: 6
          options:
            colorMode: value
            graphMode: none
            justifyMode: auto
            orientation: horizontal
            reduceOptions:
                calcs:
                    - lastNotNull
                fields: ""
                values: false
            showPercentChange: false
            textMode: auto
            wideLayout: true
          targets:
            - datasource:
                type: prometheus
                uid: duplo-metrics
              expr: sum(rate(http_server_requests_seconds_count{cluster="$cluster", job="$application", status=~"5.."}[2m])) or sum(rate(http_server_request_duration_seconds_count{cluster="$cluster", job="$application", http_response_status_code=~"5.."}[2m])) or sum(rate(http_server_duration_milliseconds_count{cluster="$cluster", job="$application", http_status_code=~"5.."}[2m]))
              format: time_series
              legendFormat: ""
              refId: A
          title: HTTP Error Rate
          type: stat
        - datasource:
            type: prometheus
            uid: duplo-metrics
          fieldConfig:
            defaults:
                color:
                    mode: thresholds
                mappings: []
                thresholds:
                    mode: absolute
                    steps:
                        - color: green
                          value: null
                        - color: yellow
                          value: 500
                        - color: red
                          value: 2000
                unit: ms
            overrides: []
          gridPos:
            h: 4
            w: 4
            x: 20
            "y": 1
          id: 7
          options:
            colorMode: value
            graphMode: none
            justifyMode: auto
            orientation: horizontal
            reduceOptions:
                calcs:
                    - lastNotNull
                fields: ""
                values: false
            showPercentChange: false
            textMode: auto
            wideLayout: true
          targets:
            - datasource:
                type: prometheus
                uid: duplo-metrics
              expr: (max(http_server_requests_max_seconds{cluster="$cluster", job="$application"}) or histogram_quantile(0.99, sum(rate(http_server_request_duration_seconds_bucket{cluster="$cluster", job="$application"}[2m]))))*1000
              format: time_series
              legendFormat: ""
              refId: A
          title: HTTP Latency Max
          type: stat
        - datasource:
            type: prometheus
            uid: duplo-metrics
          fieldConfig:
            defaults:
                color:
                    mode: thresholds
                mappings: []
                thresholds:
                    mode: absolute
                    steps:
                        - color: green
                          value: null
                        - color: yellow
                          value: 70
                        - color: red
                          value: 90
                unit: percent
            overrides: []
          gridPos:
            h: 4
            w: 4
            x: 0
            "y": 5
          id: 8
          options:
            colorMode: value
            graphMode: none
            justifyMode: auto
            orientation: horizontal
            reduceOptions:
                calcs:
                    - lastNotNull
                fields: ""
                values: false
            showPercentChange: false
            textMode: auto
            wideLayout: true
          targets:
            - datasource:
                type: prometheus
                uid: duplo-metrics
              expr: max({__name__=~"process_cpu_usage|jvm_cpu_recent_utilization_ratio|process_runtime_jvm_cpu_utilization_ratio", cluster="$cluster", job="$application"})*100
              format: time_series
              legendFormat: ""
              refId: A
          title: CPU Max
          type: stat
        - datasource:
            type: prometheus
            uid: duplo-metrics
          fieldConfig:
            defaults:
                color:
                    mode: thresholds
                mappings: []
                thresholds:
                    mode: absolute
                    steps:
                        - color: green
                          value: null
                        - color: yellow
                          value: 10
                        - color: red
                          value: 30
                unit: percent
            overrides: []
          gridPos:
            h: 4
            w: 4
            x: 4
            "y": 5
          id: 9
          options:
            colorMode: value
            graphMode: none
            justifyMode: auto
            orientation: horizontal
            reduceOptions:
                calcs:
                    - lastNotNull
                fields: ""
                values: false
            showPercentChange: false
            textMode: auto
            wideLayout: true
          targets:
            - datasource:
                type: prometheus
                uid: duplo-metrics
              expr: max(sum by(job,instance)(rate({__name__=~"jvm_gc_pause_seconds_sum|jvm_gc_duration_seconds_sum|process_runtime_jvm_gc_duration_seconds_sum", cluster="$cluster", job="$application"}[2m])) / on(job,instance) {__name__=~"system_cpu_count|jvm_cpu_count", cluster="$cluster", job="$application"})*100
              format: time_series
              legendFormat: ""
              refId: A
          title: GC Overhead
          type: stat
        - datasource:
            type: prometheus
            uid: duplo-metrics
          fieldConfig:
            defaults:
                color:
                    fixedColor: green
                    mode: fixed
                mappings: []
                thresholds:
                    mode: absolute
                    steps:
                        - color: green
                          value: null
                unit: short
            overrides: []
          gridPos:
            h: 4
            w: 4
            x: 8
            "y": 5
          id: 10
          options:
            colorMode: value
            graphMode: none
            justifyMode: auto
            orientation: horizontal
            reduceOptions:
                calcs:
                    - lastNotNull
                fields: ""
                values: false
            showPercentChange: false
            textMode: auto
            wideLayout: true
          targets:
            - datasource:
                type: prometheus
                uid: duplo-metrics
              expr: max({__name__=~"jvm_threads_live|jvm_thread_count|process_runtime_jvm_threads_count", cluster="$cluster", job="$application"})
              format: time_series
              legendFormat: ""
              refId: A
          title: Max Live Threads
          type: stat
        - datasource:
            type: prometheus
            uid: duplo-metrics
          fieldConfig:
            defaults:
                color:
                    mode: thresholds
                mappings: []
                thresholds:
                    mode: absolute
                    steps:
                        - color: green
                          value: null
                        - color: yellow
                          value: 1
                        - color: red
                          value: 10
                unit: short
            overrides: []
          gridPos:
            h: 4
            w: 4
            x: 12
            "y": 5
          id: 11
          options:
            colorMode: value
            graphMode: none
            justifyMode: auto
            orientation: horizontal
            reduceOptions:
                calcs:
                    - lastNotNull
                fields: ""
                values: false
            showPercentChange: false
            textMode: auto
            wideLayout: true
          targets:
            - datasource:
                type: prometheus
                uid: duplo-metrics
              expr: sum({__name__=~"jvm_threads_states", cluster="$cluster", job="$application", state="blocked"}) or sum(jvm_thread_count{cluster="$cluster", job="$application", jvm_thread_state="BLOCKED"})
              format: time_series
              legendFormat: ""
              refId: A
          title: Blocked Threads
          type: stat
        - datasource:
            type: prometheus
            uid: duplo-metrics
          fieldConfig:
            defaults:
                color:
                    fixedColor: green
                    mode: fixed
                mappings: []
                thresholds:
                    mode: absolute
                    steps:
                        - color: green
                          value: null
                unit: short
            overrides: []
          gridPos:
            h: 4
            w: 4
            x: 16
            "y": 5
          id: 12
          options:
            colorMode: value
            graphMode: none
            justifyMode: auto
            orientation: horizontal
            reduceOptions:
                calcs:
                    - lastNotNull
                fields: ""
                values: false
            showPercentChange: false
            textMode: auto
            wideLayout: true
          targets:
            - datasource:
                type: prometheus
                uid: duplo-metrics
              expr: max({__name__=~"process_files_open|process_open_fds|process_open_file_descriptor_count", cluster="$cluster", job="$application"})
              format: time_series
              legendFormat: ""
              refId: A
          title: Max Open FDs
          type: stat
        - datasource:
            type: prometheus
            uid: duplo-metrics
          fieldConfig:
            defaults:
                color:
                    mode: thresholds
                mappings: []
                thresholds:
                    mode: absolute
                    steps:
                        - color: green
                          value: null
                        - color: yellow
                          value: 1
                        - color: red
                          value: 10
                unit: short
            overrides: []
          gridPos:
            h: 4
            w: 4
            x: 20
            "y": 5
          id: 13
          options:
            colorMode: value
            graphMode: none
            justifyMode: auto
            orientation: horizontal
            reduceOptions:
                calcs:
                    - lastNotNull
                fields: ""
                values: false
            showPercentChange: false
            textMode: auto
            wideLayout: true
          targets:
            - datasource:
                type: prometheus
                uid: duplo-metrics
              expr: sum(rate(logback_events_total{cluster="$cluster", job="$application", level="error"}[2m]))*60
              format: time_series
              legendFormat: ""
              refId: A
          title: Error Logs /min
          type: stat
        - collapsed: false
          gridPos:
            h: 1
            w: 24
            x: 0
            "y": 9
          id: 14
          panels: []
          title: I/O Overview
          type: row
        - datasource:
            type: prometheus
            uid: duplo-metrics
          fieldConfig:
            defaults:
                color:
                    mode: palette-classic
                custom:
                    axisCenteredZero: false
                    axisColorMode: text
                    axisLabel: ""
                    axisPlacement: auto
                    barAlignment: 0
                    drawStyle: line
                    fillOpacity: 0
                    gradientMode: none
                    hideFrom:
                        legend: false
                        tooltip: false
                        viz: false
                    lineInterpolation: linear
                    lineWidth: 1
                    pointSize: 5
                    scaleDistribution:
                        type: linear
                    showPoints: auto
                    spanNulls: false
                    stacking:
                        group: A
                        mode: none
                    thresholdsStyle:
                        mode: "off"
                mappings: []
                thresholds:
                    mode: absolute
                    steps:
                        - color: green
                          value: null
                        - color: red
                          value: 80
                unit: reqps
            overrides: []
          gridPos:
            h: 10
            w: 12
            x: 0
            "y": 10
          id: 15
          options:
            legend:
                calcs: []
                displayMode: list
                placement: bottom
                showLegend: true
            tooltip:
                hideZeros: false
                mode: multi
                sort: desc
          targets:
            - datasource:
                type: prometheus
                uid: duplo-metrics
              expr: sum(rate(http_server_requests_seconds_count{cluster="$cluster", job="$application"}[1m])) or sum(rate(http_server_request_duration_seconds_count{cluster="$cluster", job="$application"}[1m])) or sum(rate(http_server_duration_milliseconds_count{cluster="$cluster", job="$application"}[1m]))
              format: time_series
              legendFormat: Rate
              refId: A
          title: Rate
          type: timeseries
        - datasource:
            type: prometheus
            uid: duplo-metrics
          fieldConfig:
            defaults:
                color:
                    fixedColor: dark-red
                    mode: fixed
                custom:
                    axisCenteredZero: false
                    axisColorMode: text
                    axisLabel: ""
                    axisPlacement: auto
                    barAlignment: 0
                    drawStyle: line
                    fillOpacity: 0
                    gradientMode: none
                    hideFrom:
                        legend: false
                        tooltip: false
                        viz: false
                    lineInterpolation: linear
                    lineWidth: 1
                    pointSize: 5
                    scaleDistribution:
                        type: linear
                    showPoints: auto
                    spanNulls: false
                    stacking:
                        group: A
                        mode: none
                    thresholdsStyle:
                        mode: "off"
                mappings: []
                thresholds:
                    mode: absolute
                    steps:
                        - color: green
                          value: null
                        - color: red
                          value: 80
                unit: reqps
            overrides: []
          gridPos:
            h: 10
            w: 12
            x: 12
            "y": 10
          id: 16
          options:
            legend:
                calcs: []
                displayMode: list
                placement: bottom
                showLegend: true
            tooltip:
                hideZeros: false
                mode: multi
                sort: desc
          targets:
            - datasource:
                type: prometheus
                uid: duplo-metrics
              expr: sum(rate(http_server_requests_seconds_count{cluster="$cluster", job="$application", status=~"5.."}[1m])) or sum(rate(http_server_request_duration_seconds_count{cluster="$cluster", job="$application", http_response_status_code=~"5.."}[1m])) or sum(rate(http_server_duration_milliseconds_count{cluster="$cluster", job="$application", http_status_code=~"5.."}[1m]))
              format: time_series
              legendFormat: Errors
              refId: A
          title: Errors
          type: timeseries
        - datasource:
            type: prometheus
            uid: duplo-metrics
          fieldConfig:
            defaults:
                color:
                    mode: palette-classic
                custom:
                    axisCenteredZero: false
                    axisColorMode: text
                    axisLabel: ""
                    axisPlacement: auto
                    barAlignment: 0
                    drawStyle: line
                    fillOpacity: 0
                    gradientMode: none
                    hideFrom:
                        legend: false
                        tooltip: false
                        viz: false
                    lineInterpolation: linear
                    lineWidth: 1
                    pointSize: 5
                    scaleDistribution:
                        type: linear
                    showPoints: auto
                    spanNulls: false
                    stacking:
                        group: A
                        mode: none
                    thresholdsStyle:
                        mode: "off"
                mappings: []
                thresholds:
                    mode: absolute
                    steps:
                        - color: green
                          value: null
                        - color: red
                          value: 80
                unit: s
            overrides: []
          gridPos:
            h: 10
            w: 12
            x: 0
            "y": 20
          id: 17
          options:
            legend:
                calcs: []
                displayMode: list
                placement: bottom
                showLegend: true
            tooltip:
                hideZeros: false
                mode: multi
                sort: desc
          targets:
            - datasource:
                type: prometheus
                uid: duplo-metrics
              expr: sum(rate(http_server_requests_seconds_sum{cluster="$cluster", job="$application", status!~"5.."}[1m]))/sum(rate(http_server_requests_seconds_count{cluster="$cluster", job="$application", status!~"5.."}[1m])) or sum(rate(http_server_request_duration_seconds_sum{cluster="$cluster", job="$application", http_response_status_code!~"5.."}[1m]))/sum(rate(http_server_request_duration_seconds_count{cluster="$cluster", job="$application", http_response_status_code!~"5.."}[1m])) or sum(rate(http_server_duration_milliseconds_sum{cluster="$cluster", job="$application", http_status_code!~"5.."}[1m]))/sum(rate(http_server_duration_milliseconds_count{cluster="$cluster", job="$application", http_status_code!~"5.."}[1m]))/1000
              format: time_series
              legendFormat: Average
              refId: A
            - datasource:
                type: prometheus
                uid: duplo-metrics
              expr: max(http_server_requests_max_seconds{cluster="$cluster", job="$application", status!~"5.."}) or histogram_quantile(0.99, sum by(le)(rate(http_server_request_duration_seconds_bucket{cluster="$cluster", job="$application", http_response_status_code!~"5.."}[1m]))) or histogram_quantile(0.99, sum by(le)(rate(http_server_duration_milliseconds_bucket{cluster="$cluster", job="$application", http_status_code!~"5.."}[1m])))/1000
              format: time_series
              legendFormat: Max
              refId: B
          title: Duration
          type: timeseries
        - datasource:
            type: prometheus
            uid: duplo-metrics
          fieldConfig:
            defaults:
                color:
                    mode: palette-classic
                custom:
                    axisCenteredZero: false
                    axisColorMode: text
                    axisLabel: ""
                    axisPlacement: auto
                    barAlignment: 0
                    drawStyle: line
                    fillOpacity: 0
                    gradientMode: none
                    hideFrom:
                        legend: false
                        tooltip: false
                        viz: false
                    lineInterpolation: linear
                    lineWidth: 1
                    pointSize: 5
                    scaleDistribution:
                        type: linear
                    showPoints: auto
                    spanNulls: false
                    stacking:
                        group: A
                        mode: none
                    thresholdsStyle:
                        mode: "off"
                mappings: []
                thresholds:
                    mode: absolute
                    steps:
                        - color: green
                          value: null
                        - color: red
                          value: 80
            overrides: []
          gridPos:
            h: 10
            w: 12
            x: 12
            "y": 20
          id: 18
          options:
            legend:
                calcs: []
                displayMode: list
                placement: bottom
                showLegend: true
            tooltip:
                hideZeros: false
                mode: multi
                sort: desc
          targets:
            - datasource:
                type: prometheus
                uid: duplo-metrics
              expr: '{__name__=~"executor_active_threads", cluster="$cluster", job="$application", instance=~"$pod"}'
              format: time_series
              legendFormat: '{{instance}} busy'
              refId: A
            - datasource:
                type: prometheus
                uid: duplo-metrics
              expr: '{__name__=~"executor_pool_size_threads", cluster="$cluster", job="$application", instance=~"$pod"}'
              format: time_series
              legendFormat: '{{instance}} current'
              refId: B
            - datasource:
                type: prometheus
                uid: duplo-metrics
              expr: '{__name__=~"executor_pool_max_threads", cluster="$cluster", job="$application", instance=~"$pod"}'
              format: time_series
              legendFormat: '{{instance}} max'
              refId: C
          title: Thread Pool / Utilisation
          type: timeseries
        - collapsed: false
          gridPos:
            h: 1
