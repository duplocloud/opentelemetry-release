      expr: avg by(job,instance)(jvm_memory_max_bytes{cluster="$cluster", job="$application", instance=~"$pod", area="nonheap"}) or avg by(job,instance)(jvm_memory_limit_bytes{cluster="$cluster", job="$application", instance=~"$pod", jvm_memory_type="non_heap"}) or avg by(job,instance)(process_runtime_jvm_memory_limit_bytes{cluster="$cluster", job="$application", instance=~"$pod", type="nonheap"})
