        placement: bottom
        showLegend: true
      tooltip:
        hideZeros: false
        mode: multi
        sort: desc
    targets:
    - datasource:
        type: prometheus
        uid: duplo-metrics
      expr: avg by(job,instance)(jvm_memory_used_bytes{cluster="$cluster", job="$application", instance=~"$pod", area="nonheap"}) or avg by(job,instance)(jvm_memory_used_bytes{cluster="$cluster", job="$application", instance=~"$pod", jvm_memory_type="non_heap"}) or avg by(job,instance)(process_runtime_jvm_memory_usage_bytes{cluster="$cluster", job="$application", instance=~"$pod", type="nonheap"})
