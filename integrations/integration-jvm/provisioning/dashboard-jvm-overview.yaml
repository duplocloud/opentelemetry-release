      expr: sum({__name__=~"jvm_memory_used_bytes|process_runtime_jvm_memory_usage_bytes", cluster="$cluster", job="$application", instance=~"$pod"})
      format: time_series
      hide: false
      intervalFactor: 2
      legendFormat: Used
      refId: A
    - datasource:
        type: prometheus
        uid: duplo-metrics
      expr: sum({__name__=~"jvm_memory_committed_bytes|process_runtime_jvm_memory_committed_bytes", cluster="$cluster", job="$application", instance=~"$pod"})
      format: time_series
      hide: false
      intervalFactor: 2
      legendFormat: Committed
      refId: B
    - datasource:
