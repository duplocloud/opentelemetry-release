apiVersion: grizzly.grafana.com/v1alpha1
kind: Dashboard
metadata:
  folder: integration-jvm
  name: integration-jvm-dashboard
spec:
  annotations:
    list:
    - builtIn: 1
      datasource:
        type: datasource
        uid: grafana
      enable: true
      hide: true
      iconColor: rgba(0, 211, 255, 1)
      name: Annotations & Alerts
      target:
        limit: 100
        matchAny: false
        tags: []
        type: dashboard
      type: dashboard
    - datasource:
        type: prometheus
        uid: duplo-metrics
      enable: true
      expr: resets(process_uptime_seconds{cluster="$cluster", job="$application"}[1m]) > 0
      hide: false
      iconColor: rgba(255, 96, 96, 1)
      name: Restart Detection
      showIn: 0
      step: 1m
      tagKeys: restart-tag
      textFormat: uptime reset
      titleFormat: Restart
  description: JVM Overview dashboard - key metrics for Java applications
  editable: false
  fiscalYearStartMonth: 0
  graphTooltip: 1
  links:
  - asDropdown: false
    icon: external link
    includeVars: true
    keepTime: true
    tags: []
    targetBlank: false
    title: JVM Details
    tooltip: Deep-dive into memory pools, GC generations, classloading and more
    type: link
    url: /d/integration-jvm-details/jvm-details
  - asDropdown: false
    icon: external link
    includeVars: false
    keepTime: false
    tags: []
    targetBlank: true
    title: Pyroscope Profiles Explorer
    tooltip: Explore Java application profiles in Pyroscope
    type: link
    url: /a/grafana-pyroscope-app/explore?searchText=&panelType=time-series&layout=grid&hideNoData=off&explorationType=flame-graph&var-serviceName=ebpf%2F${namespace}%2F${application}&var-profileMetricId=process_cpu%3Acpu%3Ananoseconds%3Acpu%3Ananoseconds&var-groupBy=all&var-dataSource=duplo-profiling&var-filters=&var-filtersBaseline=&var-filtersComparison=&maxNodes=16384
  panels:
  - collapsed: false
    gridPos:
      h: 1
      w: 24
      x: 0
      y: 0
    id: 1
    panels: []
    title: Quick Facts
    type: row
  - datasource:
      type: prometheus
      uid: duplo-metrics
    fieldConfig:
      defaults:
        color:
          fixedColor: green
          mode: fixed
        mappings: []
        thresholds:
          mode: absolute
          steps:
          - color: green
            value: null
        unit: s
      overrides: []
    gridPos:
      h: 4
      w: 4
      x: 0
      y: 1
    id: 2
    options:
      colorMode: value
      graphMode: none
      justifyMode: auto
      orientation: horizontal
      reduceOptions:
        calcs:
        - lastNotNull
        fields: ''
        values: false
      showPercentChange: false
      textMode: auto
      wideLayout: true
    targets:
    - datasource:
        type: prometheus
        uid: duplo-metrics
      expr: max(process_uptime_seconds{cluster="$cluster", job="$application", instance=~"$pod"})
      format: time_series
      legendFormat: ''
      refId: A
    title: Uptime
    type: stat
  - datasource:
      type: prometheus
      uid: duplo-metrics
    fieldConfig:
      defaults:
        color:
          fixedColor: green
          mode: fixed
        mappings: []
        thresholds:
          mode: absolute
          steps:
          - color: green
            value: null
        unit: dateTimeAsIso
      overrides: []
    gridPos:
      h: 4
      w: 4
      x: 4
      y: 1
    id: 3
    options:
      colorMode: value
      graphMode: none
      justifyMode: auto
      orientation: horizontal
      reduceOptions:
        calcs:
        - lastNotNull
        fields: ''
        values: false
      showPercentChange: false
      textMode: auto
      wideLayout: true
    targets:
    - datasource:
        type: prometheus
        uid: duplo-metrics
      expr: min(process_start_time_seconds{cluster="$cluster", job="$application", instance=~"$pod"})*1000
      format: time_series
      legendFormat: ''
      refId: A
    title: Start time
    type: stat
  - datasource:
      type: prometheus
      uid: duplo-metrics
    fieldConfig:
      defaults:
        color:
          mode: thresholds
        mappings: []
        thresholds:
          mode: absolute
          steps:
          - color: green
            value: null
          - color: yellow
            value: 70
          - color: red
            value: 90
        unit: percent
      overrides: []
    gridPos:
      h: 4
      w: 4
      x: 8
      y: 1
    id: 4
    options:
      colorMode: value
      graphMode: none
      justifyMode: auto
      orientation: horizontal
      reduceOptions:
        calcs:
        - lastNotNull
        fields: ''
        values: false
      showPercentChange: false
      textMode: auto
      wideLayout: true
    targets:
    - datasource:
        type: prometheus
        uid: duplo-metrics
      expr: sum(jvm_memory_used_bytes{cluster="$cluster", job="$application", area="heap", instance=~"$pod"})*100/sum(jvm_memory_max_bytes{cluster="$cluster", job="$application", area="heap", instance=~"$pod"}) or sum(jvm_memory_used_bytes{cluster="$cluster", job="$application", jvm_memory_type="heap", instance=~"$pod"})*100/clamp_min(sum(jvm_memory_limit_bytes{cluster="$cluster", job="$application", jvm_memory_type="heap", instance=~"$pod"}),1) or sum(process_runtime_jvm_memory_usage_bytes{cluster="$cluster", job="$application", type="heap", instance=~"$pod"})*100/sum(process_runtime_jvm_memory_limit_bytes{cluster="$cluster", job="$application", type="heap", instance=~"$pod"})
      format: time_series
      legendFormat: ''
      refId: A
    title: Heap Used
    type: stat
  - datasource:
      type: prometheus
      uid: duplo-metrics
    fieldConfig:
      defaults:
        color:
          mode: thresholds
        mappings: []
        thresholds:
          mode: absolute
          steps:
          - color: green
            value: null
          - color: yellow
            value: 70
          - color: red
            value: 90
        unit: percent
      overrides: []
    gridPos:
      h: 4
      w: 4
      x: 12
      y: 1
    id: 5
    options:
      colorMode: value
      graphMode: none
      justifyMode: auto
      orientation: horizontal
      reduceOptions:
        calcs:
        - lastNotNull
        fields: ''
        values: false
      showPercentChange: false
      textMode: auto
      wideLayout: true
    targets:
    - datasource:
        type: prometheus
        uid: duplo-metrics
      expr: sum(jvm_memory_used_bytes{cluster="$cluster", job="$application", area="nonheap", instance=~"$pod"})*100/clamp_min(sum(jvm_memory_max_bytes{cluster="$cluster", job="$application", area="nonheap", instance=~"$pod"}),1) or sum(jvm_memory_used_bytes{cluster="$cluster", job="$application", jvm_memory_type="non_heap", instance=~"$pod"})*100/clamp_min(sum(jvm_memory_limit_bytes{cluster="$cluster", job="$application", jvm_memory_type="non_heap", instance=~"$pod"}),1) or sum(process_runtime_jvm_memory_usage_bytes{cluster="$cluster", job="$application", type="nonheap", instance=~"$pod"})*100/clamp_min(sum(process_runtime_jvm_memory_limit_bytes{cluster="$cluster", job="$application", type="nonheap", instance=~"$pod"}),1)
      format: time_series
      legendFormat: ''
      refId: A
    title: Non-Heap Used
    type: stat
  - datasource:
      type: prometheus
      uid: duplo-metrics
    fieldConfig:
      defaults:
        color:
          mode: thresholds
        mappings: []
        thresholds:
          mode: absolute
          steps:
          - color: green
            value: null
          - color: yellow
            value: 70
          - color: red
            value: 90
        unit: percent
      overrides: []
    gridPos:
      h: 4
      w: 4
      x: 16
      y: 1
    id: 6
    options:
      colorMode: value
      graphMode: none
      justifyMode: auto
      orientation: horizontal
      reduceOptions:
        calcs:
        - lastNotNull
        fields: ''
        values: false
      showPercentChange: false
      textMode: auto
      wideLayout: true
    targets:
    - datasource:
        type: prometheus
        uid: duplo-metrics
      expr: max({__name__=~"process_cpu_usage|jvm_cpu_recent_utilization_ratio|process_runtime_jvm_cpu_utilization_ratio", cluster="$cluster", job="$application", instance=~"$pod"})*100
      format: time_series
      legendFormat: ''
      refId: A
    title: CPU Max
    type: stat
  - datasource:
      type: prometheus
      uid: duplo-metrics
    fieldConfig:
      defaults:
        color:
          mode: thresholds
        mappings: []
        thresholds:
          mode: absolute
          steps:
          - color: green
            value: null
          - color: yellow
            value: 10
          - color: red
            value: 30
        unit: percent
      overrides: []
    gridPos:
      h: 4
      w: 4
      x: 20
      y: 1
    id: 7
    options:
      colorMode: value
      graphMode: none
      justifyMode: auto
      orientation: horizontal
      reduceOptions:
        calcs:
        - lastNotNull
        fields: ''
        values: false
      showPercentChange: false
      textMode: auto
      wideLayout: true
    targets:
    - datasource:
        type: prometheus
        uid: duplo-metrics
      expr: max(sum by(job,instance)(rate({__name__=~"jvm_gc_pause_seconds_sum|jvm_gc_duration_seconds_sum|process_runtime_jvm_gc_duration_seconds_sum", cluster="$cluster", job="$application", instance=~"$pod"}[2m])) / on(job,instance) {__name__=~"system_cpu_count|jvm_cpu_count", cluster="$cluster", job="$application", instance=~"$pod"})*100
      format: time_series
      legendFormat: ''
      refId: A
    title: GC Overhead
    type: stat
  - datasource:
      type: prometheus
      uid: duplo-metrics
    fieldConfig:
      defaults:
        color:
          fixedColor: green
          mode: fixed
        mappings: []
        thresholds:
          mode: absolute
          steps:
          - color: green
            value: null
        unit: short
      overrides: []
    gridPos:
      h: 4
      w: 6
      x: 0
      y: 5
    id: 8
    options:
      colorMode: value
      graphMode: none
      justifyMode: auto
      orientation: horizontal
      reduceOptions:
        calcs:
        - lastNotNull
        fields: ''
        values: false
      showPercentChange: false
      textMode: auto
      wideLayout: true
    targets:
    - datasource:
        type: prometheus
        uid: duplo-metrics
      expr: max({__name__=~"jvm_threads_live|jvm_thread_count|process_runtime_jvm_threads_count", cluster="$cluster", job="$application", instance=~"$pod"})
      format: time_series
      legendFormat: ''
      refId: A
    title: Max Live Threads
    type: stat
  - datasource:
      type: prometheus
      uid: duplo-metrics
    fieldConfig:
      defaults:
        color:
          mode: thresholds
        mappings: []
        thresholds:
          mode: absolute
          steps:
          - color: green
            value: null
          - color: yellow
            value: 1
          - color: red
            value: 10
        unit: short
      overrides: []
    gridPos:
      h: 4
      w: 6
      x: 6
      y: 5
    id: 9
    options:
      colorMode: value
      graphMode: none
      justifyMode: auto
      orientation: horizontal
      reduceOptions:
        calcs:
        - lastNotNull
        fields: ''
        values: false
      showPercentChange: false
      textMode: auto
      wideLayout: true
    targets:
    - datasource:
        type: prometheus
        uid: duplo-metrics
      expr: sum({__name__=~"jvm_threads_states", cluster="$cluster", job="$application", state="blocked", instance=~"$pod"}) or sum(jvm_thread_count{cluster="$cluster", job="$application", jvm_thread_state="BLOCKED", instance=~"$pod"})
      format: time_series
      legendFormat: ''
      refId: A
    title: Blocked Threads
    type: stat
  - datasource:
      type: prometheus
      uid: duplo-metrics
    fieldConfig:
