      hide: false
      intervalFactor: 2
      legendFormat: '{{instance}} used'
      refId: A
    - datasource:
        type: prometheus
        uid: duplo-metrics
      expr: sum by(job,instance)({__name__=~"jvm_memory_committed_bytes|process_runtime_jvm_memory_committed_bytes", cluster="$cluster", job="$application", instance=~"$pod"})
      format: time_series
      hide: false
      intervalFactor: 2
