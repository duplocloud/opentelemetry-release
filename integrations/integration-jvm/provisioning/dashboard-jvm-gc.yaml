apiVersion: grizzly.grafana.com/v1alpha1
kind: Dashboard
metadata:
    folder: integration-jvm
    name: integration-jvm-gc
spec:
    graphTooltip: 1
    links:
        - asDropdown: false
          icon: external link
          includeVars: true
          keepTime: true
          tags: []
          targetBlank: false
          title: Back to JVM Overview
          tooltip: ""
          type: link
          url: /d/integration-jvm-dashboard/jvm-overview?${__url_time_range}&${__all_variables}
        - asDropdown: false
          icon: external link
          includeVars: true
          keepTime: true
          tags: []
          targetBlank: false
          title: JVM Memory
          tooltip: ""
          type: link
          url: /d/integration-jvm-memory/jvm-memory?${__url_time_range}&${__all_variables}
        - asDropdown: false
          icon: external link
          includeVars: true
          keepTime: true
          tags: []
          targetBlank: false
          title: JVM Runtime
          tooltip: ""
          type: link
          url: /d/integration-jvm-runtime/jvm-runtime?${__url_time_range}&${__all_variables}
        - asDropdown: false
          icon: external link
          includeVars: true
          keepTime: true
          tags: []
          targetBlank: false
          title: JVM Profiles
          tooltip: ""
          type: link
          url: /d/integration-jvm-profiles/jvm-profiles?${__url_time_range}&${__all_variables}
    panels:
        - collapsed: false
          gridPos:
              h: 1
              w: 24
              x: 0
              "y": 0
          id: 1
          title: GC Overview
          type: row
        - datasource:
              type: prometheus
              uid: duplo-metrics
          description: "Proportion of CPU time spent in GC. Values above 10% indicate GC pressure."
          fieldConfig:
              defaults:
                  unit: percentunit
              overrides: []
          gridPos:
              h: 10
              w: 24
              x: 0
              "y": 1
          id: 2
          options:
              legend:
                  calcs: []
                  displayMode: list
                  placement: bottom
                  showLegend: true
              tooltip:
                  hideZeros: false
                  mode: multi
                  sort: desc
          targets:
              - datasource:
                    type: prometheus
                    uid: duplo-metrics
                expr: sum by(job, instance)(rate({__name__=~"jvm_gc_pause_seconds_sum|jvm_gc_duration_seconds_sum", cluster="$cluster", namespace=~"$namespace", job="$application", instance=~"$pod"}[1m])) / on(job, instance) {__name__=~"system_cpu_count|jvm_cpu_count", cluster="$cluster", namespace=~"$namespace", job="$application", instance=~"$pod"}
                legendFormat: '{{instance}}'
                refId: A
          title: GC Pressure
          type: timeseries
        - collapsed: false
          gridPos:
              h: 1
              w: 24
              x: 0
              "y": 11
          id: 3
          title: Garbage Collection
          type: row
        - datasource:
              type: prometheus
              uid: duplo-metrics
          fieldConfig:
              defaults:
                  unit: ops
              overrides: []
          gridPos:
              h: 10
              w: 12
              x: 0
              "y": 12
          id: 4
          options:
              legend:
                  calcs: []
                  displayMode: list
                  placement: bottom
                  showLegend: true
              tooltip:
                  hideZeros: false
                  mode: multi
                  sort: desc
          targets:
              - datasource:
                    type: prometheus
                    uid: duplo-metrics
                expr: label_replace(avg by(job,instance,action,cause)(rate({__name__=~"jvm_gc_pause_seconds_count|jvm_gc_duration_seconds_count", cluster="$cluster", namespace=~"$namespace", job="$application", instance=~"$pod"}[1m])),"action","$1","action","end of (.+)")
                legendFormat: '{{instance}} {{action}} ({{cause}})'
                refId: A
          title: Collections
          type: timeseries
        - datasource:
              type: prometheus
              uid: duplo-metrics
          fieldConfig:
              defaults:
                  unit: s
              overrides: []
          gridPos:
              h: 10
              w: 12
              x: 12
              "y": 12
          id: 5
          options:
              legend:
                  calcs: []
                  displayMode: list
                  placement: bottom
                  showLegend: true
              tooltip:
                  hideZeros: false
                  mode: multi
                  sort: desc
          targets:
              - datasource:
                    type: prometheus
                    uid: duplo-metrics
                expr: label_replace(avg by(job,instance,action,cause)(rate({__name__=~"jvm_gc_pause_seconds_sum|jvm_gc_duration_seconds_sum", cluster="$cluster", namespace=~"$namespace", job="$application", instance=~"$pod"}[1m])) / avg by(job,instance,action,cause)(rate({__name__=~"jvm_gc_pause_seconds_count|jvm_gc_duration_seconds_count", cluster="$cluster", namespace=~"$namespace", job="$application", instance=~"$pod"}[1m])),"action","$1","action","end of (.+)")
                legendFormat: '{{instance}} {{action}} avg'
                refId: A
              - datasource:
                    type: prometheus
                    uid: duplo-metrics
                expr: '{__name__=~"jvm_gc_pause_seconds_max|jvm_gc_pause_max_seconds", cluster="$cluster", namespace=~"$namespace", job="$application", instance=~"$pod"}'
                legendFormat: '{{instance}} {{action}} max'
                refId: B
          title: Pause Durations
          type: timeseries
        - collapsed: false
          gridPos:
              h: 1
              w: 24
              x: 0
              "y": 22
          id: 6
          title: Memory Allocation
          type: row
        - datasource:
              type: prometheus
              uid: duplo-metrics
          fieldConfig:
              defaults:
                  unit: Bps
              overrides: []
          gridPos:
              h: 10
              w: 12
              x: 0
              "y": 23
          id: 7
          options:
              legend:
                  calcs: []
                  displayMode: list
                  placement: bottom
                  showLegend: true
              tooltip:
                  hideZeros: false
                  mode: multi
                  sort: desc
          targets:
              - datasource:
                    type: prometheus
                    uid: duplo-metrics
                expr: rate(jvm_gc_memory_allocated_bytes_total{cluster="$cluster", namespace=~"$namespace", job="$application", instance=~"$pod"}[1m])
                legendFormat: '{{instance}} allocated'
                refId: A
              - datasource:
                    type: prometheus
                    uid: duplo-metrics
                expr: rate(jvm_gc_memory_promoted_bytes_total{cluster="$cluster", namespace=~"$namespace", job="$application", instance=~"$pod"}[1m])
                legendFormat: '{{instance}} promoted'
                refId: B
          title: Allocated/Promoted
          type: timeseries
        - datasource:
              type: prometheus
              uid: duplo-metrics
          description: "Memory usage after last GC. Rising trend may indicate a memory leak."
          fieldConfig:
              defaults:
                  unit: bytes
              overrides: []
          gridPos:
              h: 10
              w: 12
              x: 12
              "y": 23
          id: 8
          options:
              legend:
                  calcs: []
                  displayMode: list
                  placement: bottom
                  showLegend: true
              tooltip:
                  hideZeros: false
                  mode: multi
                  sort: desc
          targets:
              - datasource:
                    type: prometheus
                    uid: duplo-metrics
                expr: avg by(job,instance,pool)(process_runtime_jvm_memory_usage_after_last_gc_bytes{cluster="$cluster", namespace=~"$namespace", job="$application", instance=~"$pod", type="heap"})
                legendFormat: '{{instance}} {{pool}}'
                refId: A
          title: Memory After Last GC (Leak Detector)
          type: timeseries
        - collapsed: true
          gridPos:
              h: 1
              w: 24
              x: 0
              "y": 33
          id: 9
          panels:
              - datasource:
                    type: prometheus
                    uid: duplo-metrics
                fieldConfig:
                    defaults:
                        unit: s
                    overrides: []
                gridPos:
                    h: 10
                    w: 12
                    x: 0
                    "y": 34
                id: 10
                options:
                    legend:
                        calcs: []
                        displayMode: list
                        placement: bottom
                        showLegend: true
                    tooltip:
                        hideZeros: false
                        mode: multi
                        sort: desc
                targets:
                    - datasource:
                          type: prometheus
                          uid: duplo-metrics
                      expr: label_replace(histogram_quantile(0.95, sum by(le,job,instance,gc,action)(rate(process_runtime_jvm_gc_duration_seconds_bucket{cluster="$cluster", namespace=~"$namespace", job="$application", instance=~"$pod"}[1m]))),"action","$1","action","end of (.+)")
                      legendFormat: '{{instance}} {{action}} p95'
                      refId: A
                    - datasource:
                          type: prometheus
                          uid: duplo-metrics
                      expr: label_replace(histogram_quantile(0.50, sum by(le,job,instance,gc,action)(rate(process_runtime_jvm_gc_duration_seconds_bucket{cluster="$cluster", namespace=~"$namespace", job="$application", instance=~"$pod"}[1m]))),"action","$1","action","end of (.+)")
                      legendFormat: '{{instance}} {{action}} p50'
                      refId: B
                title: GC Pause Duration - p50 / p95 (Histogram)
                type: timeseries
          title: GC Diagnostics (Advanced)
          type: row
    schemaVersion: 39
    tags:
        - jvm
        - java
        - gc
    templating:
        list:
            - datasource:
                  type: prometheus
                  uid: duplo-metrics
              includeAll: false
              name: cluster
              query:
                  qryType: 1
                  query: label_values(jvm_memory_used_bytes, cluster)
                  refId: PrometheusVariableQueryEditor-VariableQuery
              type: query
            - allValue: ".*"
              datasource:
                  type: prometheus
                  uid: duplo-metrics
              includeAll: true
              multi: true
              name: namespace
              query:
                  qryType: 1
                  query: label_values(jvm_memory_used_bytes{cluster="$cluster"}, namespace)
                  refId: PrometheusVariableQueryEditor-VariableQuery
              type: query
            - datasource:
                  type: prometheus
                  uid: duplo-metrics
              includeAll: false
              label: Job
              name: application
              query:
                  qryType: 1
                  query: label_values(jvm_memory_used_bytes{cluster="$cluster", namespace=~"$namespace"}, job)
                  refId: PrometheusVariableQueryEditor-VariableQuery
              type: query
            - allValue: ".*"
              datasource:
                  type: prometheus
                  uid: duplo-metrics
              includeAll: true
              multi: true
              name: pod
              query:
                  qryType: 1
                  query: label_values(jvm_memory_used_bytes{cluster="$cluster", namespace=~"$namespace", job="$application"}, instance)
                  refId: PrometheusVariableQueryEditor-VariableQuery
              type: query
    time:
        from: now-30m
        to: now
    title: JVM Garbage Collection
    uid: integration-jvm-gc
