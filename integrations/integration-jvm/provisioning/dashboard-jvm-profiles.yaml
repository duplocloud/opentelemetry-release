apiVersion: grizzly.grafana.com/v1alpha1
kind: Dashboard
metadata:
    folder: integration-jvm
    name: integration-jvm-profiles
spec:
    graphTooltip: 1
    links:
        - asDropdown: false
          icon: external link
          includeVars: true
          keepTime: true
          tags: []
          targetBlank: false
          title: Back to JVM Overview
          tooltip: ""
          type: link
          url: /d/integration-jvm-dashboard/jvm-overview        - asDropdown: false
          icon: external link
          includeVars: true
          keepTime: true
          tags: []
          targetBlank: false
          title: JVM Memory
          tooltip: ""
          type: link
          url: /d/integration-jvm-memory/jvm-memory        - asDropdown: false
          icon: external link
          includeVars: true
          keepTime: true
          tags: []
          targetBlank: false
          title: JVM Runtime
          tooltip: ""
          type: link
          url: /d/integration-jvm-runtime/jvm-runtime        - asDropdown: false
          icon: external link
          includeVars: true
          keepTime: true
          tags: []
          targetBlank: false
          title: JVM GC
          tooltip: ""
          type: link
          url: /d/integration-jvm-gc/jvm-gc    panels:
        - gridPos:
              h: 2
              w: 24
              x: 0
              y: 0
          id: 1
          options:
              content: "# Java Application Profiles\nExplore CPU, memory allocation, lock contention, and wall clock profiles for your Java applications. Select a profile type from the dropdown above to switch between different profiling views. Profiles are collected via Pyroscope continuous profiling."
              mode: markdown
          title: ""
          type: text
        - collapsed: false
          gridPos:
              h: 1
              w: 24
              x: 0
              y: 2
          id: 2
          title: Profile Overview
          type: row
        - datasource:
              type: grafana-pyroscope-datasource
              uid: duplo-profiling
          gridPos:
              h: 18
              w: 24
              x: 0
              y: 3
          id: 3
          targets:
              - datasource:
                    type: grafana-pyroscope-datasource
                    uid: duplo-profiling
                labelSelector: '{service_name=~"java/$namespace/$application"}'
                profileTypeId: "$profile_type"
                queryType: profile
                refId: A
          title: "$profile_type Profile"
          type: flamegraph
        - collapsed: false
          gridPos:
              h: 1
              w: 24
              x: 0
              y: 21
          id: 4
          title: Profile Trends
          type: row
        - datasource:
              type: grafana-pyroscope-datasource
              uid: duplo-profiling
          gridPos:
              h: 10
              w: 24
              x: 0
              y: 22
          id: 5
          options:
              legend:
                  calcs: []
                  displayMode: list
                  placement: bottom
                  showLegend: true
              tooltip:
                  hideZeros: false
                  mode: multi
                  sort: desc
          targets:
              - datasource:
                    type: grafana-pyroscope-datasource
                    uid: duplo-profiling
                groupBy:
                    - service_name
                labelSelector: '{service_name=~"java/$namespace/$application"}'
                profileTypeId: "$profile_type"
                queryType: metrics
                refId: A
          title: "$profile_type Trend"
          type: timeseries
        - collapsed: true
          gridPos:
              h: 1
              w: 24
              x: 0
              y: 32
          id: 6
          panels:
              - datasource:
                    type: grafana-pyroscope-datasource
                    uid: duplo-profiling
                gridPos:
                    h: 16
                    w: 12
                    x: 0
                    y: 33
                id: 7
                targets:
                    - datasource:
                          type: grafana-pyroscope-datasource
                          uid: duplo-profiling
                      labelSelector: '{service_name=~"java/$namespace/$application"}'
                      profileTypeId: "process_cpu:cpu:nanoseconds:cpu:nanoseconds"
                      queryType: profile
                      refId: A
                title: CPU Profile
                type: flamegraph
              - datasource:
                    type: grafana-pyroscope-datasource
                    uid: duplo-profiling
                gridPos:
                    h: 16
                    w: 12
                    x: 12
                    y: 33
                id: 8
                targets:
                    - datasource:
                          type: grafana-pyroscope-datasource
                          uid: duplo-profiling
                      labelSelector: '{service_name=~"java/$namespace/$application"}'
                      profileTypeId: "memory:alloc_in_new_tlab_bytes:bytes:space:bytes"
                      queryType: profile
                      refId: A
                title: Memory Allocation Profile
                type: flamegraph
              - datasource:
                    type: grafana-pyroscope-datasource
                    uid: duplo-profiling
                gridPos:
                    h: 16
                    w: 12
                    x: 0
                    y: 49
                id: 9
                targets:
                    - datasource:
                          type: grafana-pyroscope-datasource
                          uid: duplo-profiling
                      labelSelector: '{service_name=~"java/$namespace/$application"}'
                      profileTypeId: "lock:contentions:count:lock:nanoseconds"
                      queryType: profile
                      refId: A
                title: Lock Contention Profile
                type: flamegraph
              - datasource:
                    type: grafana-pyroscope-datasource
                    uid: duplo-profiling
                gridPos:
                    h: 16
                    w: 12
                    x: 12
                    y: 49
                id: 10
                targets:
                    - datasource:
                          type: grafana-pyroscope-datasource
                          uid: duplo-profiling
                      labelSelector: '{service_name=~"java/$namespace/$application"}'
                      profileTypeId: "wall:wall:nanoseconds:wall:nanoseconds"
                      queryType: profile
                      refId: A
                title: Wall Clock Profile
                type: flamegraph
          title: Comparison Profiles
          type: row
    schemaVersion: 39
    tags:
        - jvm
        - java
        - profiling
    templating:
        list:
            - datasource:
                  type: prometheus
                  uid: duplo-metrics
              includeAll: false
              multi: false
              name: cluster
              query:
                  qryType: 1
                  query: label_values(jvm_memory_used_bytes, cluster)
                  refId: PrometheusVariableQueryEditor-VariableQuery
              refresh: 1
              type: query
            - allValue: ".*"
              datasource:
                  type: prometheus
                  uid: duplo-metrics
              includeAll: true
              multi: true
              name: namespace
              query:
                  qryType: 1
                  query: 'label_values(jvm_memory_used_bytes{cluster="$cluster"}, instance)'
                  refId: PrometheusVariableQueryEditor-VariableQuery
              refresh: 1
              regex: /^([^.]+)\..+/
              sort: 1
              type: query
            - datasource:
                  type: prometheus
                  uid: duplo-metrics
              definition: 'label_values(jvm_memory_used_bytes{cluster="$cluster", instance=~"($namespace)\\..+"}, job)'
              includeAll: false
              label: Job
              multi: false
              name: application
              query:
                  qryType: 1
                  query: 'label_values(jvm_memory_used_bytes{cluster="$cluster", instance=~"($namespace)\\..+"}, job)'
                  refId: PrometheusVariableQueryEditor-VariableQuery
              refresh: 1
              type: query
            - allValue: ".*"
              datasource:
                  type: prometheus
                  uid: duplo-metrics
              includeAll: true
              multi: true
              name: pod
              query:
                  qryType: 1
                  query: 'label_values(jvm_memory_used_bytes{cluster="$cluster", job="$application", instance=~"($namespace)\\..+"}, instance)'
                  refId: PrometheusVariableQueryEditor-VariableQuery
              refresh: 1
              type: query
            - current:
                  selected: true
                  text: CPU
                  value: "process_cpu:cpu"
              includeAll: false
              label: Profile Type
              multi: false
              name: profile_type
              options:
                  - selected: true
                    text: CPU
                    value: "process_cpu:cpu:nanoseconds:cpu:nanoseconds"
                  - selected: false
                    text: Allocations - Bytes
                    value: "memory:alloc_in_new_tlab_bytes:bytes:space:bytes"
                  - selected: false
                    text: Allocations - Objects
                    value: "memory:alloc_in_new_tlab_objects:count:space:bytes"
                  - selected: false
                    text: Live Heap
                    value: "memory:live:bytes:space:bytes"
                  - selected: false
                    text: Wall Clock
                    value: "wall:wall:nanoseconds:wall:nanoseconds"
                  - selected: false
                    text: Lock Contentions
                    value: "lock:contentions:count:lock:nanoseconds"
                  - selected: false
                    text: Lock Delay
                    value: "lock:delay:nanoseconds:lock:nanoseconds"
                  - selected: false
                    text: "CPU - itimer"
                    value: "itimer:cpu:nanoseconds:cpu:nanoseconds"
              query: "process_cpu:cpu:nanoseconds:cpu:nanoseconds : CPU,memory:alloc_in_new_tlab_bytes:bytes:space:bytes : Allocations - Bytes,memory:alloc_in_new_tlab_objects:count:space:bytes : Allocations - Objects,memory:live:bytes:space:bytes : Live Heap,wall:wall:nanoseconds:wall:nanoseconds : Wall Clock,lock:contentions:count:lock:nanoseconds : Lock Contentions,lock:delay:nanoseconds:lock:nanoseconds : Lock Delay,itimer:cpu:nanoseconds:cpu:nanoseconds : CPU - itimer"
              type: custom
    time:
        from: now-1h
        to: now
    title: JVM Profiles
    uid: integration-jvm-profiles
