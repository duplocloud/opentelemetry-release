apiVersion: grizzly.grafana.com/v1alpha1
kind: Dashboard
metadata:
    folder: integration-jvm
    name: integration-jvm-memory
spec:
    annotations:
        list:
        - builtIn: 1
          datasource:
            type: datasource
            uid: grafana
          enable: true
          hide: true
          iconColor: rgba(0, 211, 255, 1)
          limit: 100
          name: Annotations & Alerts
          showIn: 0
          type: dashboard
    description: JVM Memory details dashboard for Micrometer instrumented applications
    editable: true
    fiscalYearStartMonth: 0
    graphTooltip: 1
    links:
    - asDropdown: false
      icon: external link
      includeVars: true
      keepTime: true
      tags: []
      targetBlank: false
      title: Back to JVM Overview
      tooltip: ""
      type: link
      url: /d/integration-jvm-dashboard/jvm-overview?${__url_time_range}&${__all_variables}
    - asDropdown: false
      icon: external link
      includeVars: true
      keepTime: true
      tags: []
      targetBlank: false
      title: JVM Runtime
      tooltip: ""
      type: link
      url: /d/integration-jvm-runtime/jvm-runtime?${__url_time_range}&${__all_variables}
    - asDropdown: false
      icon: external link
      includeVars: true
      keepTime: true
      tags: []
      targetBlank: false
      title: JVM GC
      tooltip: ""
      type: link
      url: /d/integration-jvm-gc/jvm-gc?${__url_time_range}&${__all_variables}
    - asDropdown: false
      icon: external link
      includeVars: true
      keepTime: true
      tags: []
      targetBlank: false
      title: JVM Profiles
      tooltip: ""
      type: link
      url: /d/integration-jvm-profiles/jvm-profiles?${__url_time_range}&${__all_variables}
    panels:
    - collapsed: false
      gridPos:
        h: 1
        w: 24
        x: 0
        y: 0
      id: 1
      panels: []
      title: JVM Memory Overview
      type: row
    - datasource:
        type: prometheus
        uid: duplo-metrics
      fieldConfig:
        defaults:
          color:
            mode: palette-classic
          custom:
            axisBorderShow: false
            axisCenteredZero: false
            axisColorMode: text
            axisLabel: ''
            axisPlacement: auto
            barAlignment: 0
            barWidthFactor: 0.6
            drawStyle: line
            fillOpacity: 10
            gradientMode: none
            hideFrom:
              legend: false
              tooltip: false
              viz: false
            insertNulls: false
            lineInterpolation: linear
            lineWidth: 1
            pointSize: 5
            scaleDistribution:
              type: linear
            showPoints: never
            spanNulls: false
            stacking:
              group: A
              mode: none
            thresholdsStyle:
              mode: 'off'
          mappings: []
          thresholds:
            mode: absolute
            steps:
            - color: green
            - color: red
              value: 80
          unit: bytes
        overrides: []
      gridPos:
        h: 10
        w: 12
        x: 0
        y: 1
      id: 2
      options:
        legend:
          calcs: []
          displayMode: list
          placement: bottom
          showLegend: true
        tooltip:
          hideZeros: false
          mode: multi
          sort: desc
      targets:
      - datasource:
          type: prometheus
          uid: duplo-metrics
        expr: avg by(job,instance)(jvm_memory_used_bytes{cluster="$cluster", job="$application", instance=~"$pod", area="heap"}) or avg by(job,instance)(process_runtime_jvm_memory_usage_bytes{cluster="$cluster", job="$application", instance=~"$pod", type="heap"})
        format: time_series
        hide: false
        intervalFactor: 2
        legendFormat: '{{instance}} used'
        refId: A
      - datasource:
          type: prometheus
          uid: duplo-metrics
        expr: avg by(job,instance)(jvm_memory_committed_bytes{cluster="$cluster", job="$application", instance=~"$pod", area="heap"}) or avg by(job,instance)(process_runtime_jvm_memory_committed_bytes{cluster="$cluster", job="$application", instance=~"$pod", type="heap"})
        format: time_series
        hide: false
        intervalFactor: 2
        legendFormat: '{{instance}} committed'
        refId: B
      - datasource:
          type: prometheus
          uid: duplo-metrics
        expr: avg by(job,instance)(jvm_memory_max_bytes{cluster="$cluster", job="$application", instance=~"$pod", area="heap"}) or avg by(job,instance)(process_runtime_jvm_memory_limit_bytes{cluster="$cluster", job="$application", instance=~"$pod", type="heap"})
        format: time_series
        hide: false
        intervalFactor: 2
        legendFormat: '{{instance}} max'
        refId: C
      title: JVM Heap
      type: timeseries
