apiVersion: grizzly.grafana.com/v1alpha1
kind: Dashboard
metadata:
    folder: integration-blackbox-exporter
    name: blackbox-exporter-overview
spec:
    annotations:
        list:
            - builtIn: 1
              datasource:
                type: grafana
                uid: -- Grafana --
              enable: true
              hide: true
              iconColor: rgba(0, 211, 255, 1)
              name: Annotations & Alerts
              type: dashboard
    description: Monitor HTTP endpoint availability, SSL certificates, probe latency, and overall health across all targets.
    editable: true
    fiscalYearStartMonth: 0
    graphTooltip: 1
    links: []
    panels:
        - datasource:
            type: prometheus
            uid: ${DS_PROMETHEUS}
          description: Percentage of successful probes over the dashboard's selected time range, averaged across all probes in the selected namespace(s).
          fieldConfig:
            defaults:
                color:
                    mode: thresholds
                decimals: 2
                fieldMinMax: false
                mappings: []
                noValue: 0%
                thresholds:
                    mode: absolute
                    steps:
                        - color: red
                        - color: green
                          value: 99.9
                unit: percent
            overrides: []
          gridPos:
            h: 6
            w: 5
            x: 0
            "y": 0
          options:
            colorMode: background
            graphMode: area
            justifyMode: center
            orientation: auto
            percentChangeColorMode: same_as_value
            reduceOptions:
                calcs:
                    - mean
                fields: ""
                values: false
            showPercentChange: false
            textMode: value
            wideLayout: true
          targets:
            - datasource:
                type: prometheus
                uid: ${DS_PROMETHEUS}
              editorMode: code
              expr: avg(avg_over_time(probe_success{job=~"$job", namespace=~"$namespace"}[$__range])) * 100
              range: true
              refId: A
          title: Global Uptime
          transformations:
            - id: reduce
              options:
                includeTimeField: false
                labelsToFields: false
                mode: seriesToRows
                reducers:
                    - mean
          type: stat
        - datasource:
            type: prometheus
            uid: ${DS_PROMETHEUS}
          description: Total number of endpoints currently being monitored
          fieldConfig:
            defaults:
                mappings: []
                thresholds:
                    mode: absolute
                    steps:
                        - color: green
            overrides: []
          gridPos:
            h: 6
            w: 4
            x: 5
            "y": 0
          options:
            colorMode: background
            graphMode: none
            justifyMode: auto
            orientation: auto
            percentChangeColorMode: standard
            reduceOptions:
                calcs:
                    - lastNotNull
                fields: ""
                values: false
            showPercentChange: false
            textMode: value
            wideLayout: true
          targets:
            - datasource:
                type: prometheus
                uid: ${DS_PROMETHEUS}
              editorMode: code
              expr: count(last_over_time(probe_success{job=~"$job", namespace=~"$namespace"}[31m]))
              range: true
              refId: A
          title: Total Targets
          type: stat
        - datasource:
            type: prometheus
            uid: ${DS_PROMETHEUS}
          description: Endpoints actively responding with a successful probe
          fieldConfig:
            defaults:
                mappings: []
                noValue: "0"
                thresholds:
                    mode: absolute
                    steps:
                        - color: green
            overrides: []
          gridPos:
            h: 6
            w: 5
            x: 9
            "y": 0
          options:
            colorMode: background
            graphMode: none
            justifyMode: auto
            orientation: auto
            percentChangeColorMode: standard
            reduceOptions:
                calcs:
                    - lastNotNull
                fields: ""
                values: false
            showPercentChange: false
            textMode: value
            wideLayout: true
          targets:
            - datasource:
                type: prometheus
                uid: ${DS_PROMETHEUS}
              editorMode: code
              expr: count(last_over_time(probe_success{job=~"$job", namespace=~"$namespace"}[31m]) == 1) or vector(0)
              range: true
              refId: A
          title: Healthy Targets
          type: stat
        - datasource:
            type: prometheus
            uid: ${DS_PROMETHEUS}
          description: Endpoints that are currently down or unreachable
          fieldConfig:
            defaults:
                color:
                    mode: thresholds
                mappings: []
                noValue: "0"
                thresholds:
                    mode: absolute
                    steps:
                        - color: green
                        - color: red
                          value: 1
            overrides: []
          gridPos:
            h: 6
            w: 5
            x: 14
            "y": 0
          options:
            colorMode: background
            graphMode: area
            justifyMode: auto
            orientation: auto
            percentChangeColorMode: standard
            reduceOptions:
                calcs:
                    - lastNotNull
                fields: ""
                values: false
            showPercentChange: false
            textMode: value
            wideLayout: true
          targets:
            - datasource:
                type: prometheus
                uid: ${DS_PROMETHEUS}
              editorMode: code
              expr: count(last_over_time(probe_success{job=~"$job", namespace=~"$namespace"}[31m]) == 0) or vector(0)
              legendFormat: Targets Down
              range: true
              refId: A
          title: Critical Failures
          type: stat
        - datasource:
            type: prometheus
            uid: ${DS_PROMETHEUS}
          description: Mean probe response time across all monitored targets
          fieldConfig:
            defaults:
                color:
                    mode: thresholds
                mappings: []
                thresholds:
                    mode: absolute
                    steps:
                        - color: green
                        - color: orange
                          value: 0.5
                        - color: red
                          value: 1
                unit: s
            overrides: []
          gridPos:
            h: 6
            w: 5
            x: 19
            "y": 0
          options:
            colorMode: value
            graphMode: area
            justifyMode: auto
            orientation: auto
            percentChangeColorMode: standard
            reduceOptions:
                calcs:
                    - mean
                fields: ""
                values: false
            showPercentChange: true
            textMode: auto
            wideLayout: true
          targets:
            - datasource:
                type: prometheus
                uid: ${DS_PROMETHEUS}
              editorMode: code
              expr: avg(last_over_time(probe_duration_seconds{job=~"$job", namespace=~"$namespace"}[31m]))
              range: true
              refId: A
          title: Average Latency
          type: stat
        - datasource:
            type: prometheus
            uid: ${DS_PROMETHEUS}
          description: Per-endpoint breakdown of HTTP status, SSL validity, certificate expiry, probe duration, and DNS lookup time. Click an instance to view details.
          fieldConfig:
            defaults:
                color:
                    mode: thresholds
                custom:
                    align: left
                    cellOptions:
                        type: auto
                    filterable: true
                    inspect: false
                mappings: []
                min: 0
                thresholds:
                    mode: absolute
                    steps:
                        - color: green
            overrides:
                - matcher:
                    id: byName
                    options: SSL Cert Expiry (days)
                  properties:
                    - id: decimals
                      value: 0
                    - id: thresholds
                      value:
                        mode: absolute
                        steps:
                            - color: rgba(0,0,0,0)
                            - color: red
                              value: 0
                            - color: red
                              value: 1
                            - color: orange
                              value: 15
                            - color: green
                              value: 30
                    - id: custom.cellOptions
                      value:
                        mode: basic
                        type: gauge
                    - id: min
                      value: 0
                    - id: max
                      value: 365
                    - id: custom.filterable
                      value: false
                    - id: custom.width
                      value: 176
                - matcher:
                    id: byName
                    options: Status
                  properties:
                    - id: mappings
                      value:
                        - options:
                            "0":
                                text: DOWN
                            "1":
                                text: UP
                          type: value
                    - id: thresholds
                      value:
                        mode: absolute
                        steps:
                            - color: red
                            - color: green
                              value: 1
                    - id: custom.cellOptions
                      value:
                        mode: gradient
                        type: color-background
                    - id: custom.width
                      value: 80
                - matcher:
                    id: byName
                    options: Code
                  properties:
                    - id: thresholds
                      value:
                        mode: absolute
                        steps:
                            - color: rgba(0, 0, 0, 0)
                            - color: green
                              value: 200
                            - color: yellow
                              value: 300
                            - color: super-light-red
                              value: 400
                            - color: dark-red
                              value: 500
                    - id: custom.cellOptions
                      value:
                        applyToRow: false
                        type: color-background
                        wrapText: false
                    - id: mappings
                      value:
                        - options:
                            "0":
                                text: ""
                          type: value
                    - id: custom.width
                      value: 72
                - matcher:
                    id: byName
                    options: SSL
                  properties:
                    - id: mappings
                      value:
                        - options:
                            "0":
                                text: "NO"
                            "1":
                                text: OK
                          type: value
                    - id: thresholds
                      value:
                        mode: absolute
                        steps:
                            - color: rgba(3, 3, 3, 0)
                            - color: red
                              value: 0
                            - color: green
                              value: 1
                    - id: custom.cellOptions
                      value:
                        mode: gradient
                        type: color-background
                    - id: custom.width
                      value: 64
                - matcher:
                    id: byName
                    options: Probe Duration (s)
                  properties:
                    - id: thresholds
                      value:
                        mode: absolute
                        steps:
                            - color: green
                            - color: yellow
                              value: 0.8
                            - color: red
                              value: 2
                    - id: custom.cellOptions
                      value:
                        mode: basic
                        type: gauge
                    - id: custom.filterable
                      value: false
                    - id: decimals
                      value: 2
                    - id: max
                      value: 3
                    - id: custom.width
                      value: 155
                - matcher:
                    id: byName
                    options: DNS Lookup Duration (s)
                  properties:
                    - id: thresholds
                      value:
                        mode: absolute
                        steps:
                            - color: green
                            - color: yellow
                              value: 0.1
                            - color: red
                              value: 0.2
                    - id: max
                      value: 0.3
                    - id: custom.cellOptions
                      value:
                        mode: basic
                        type: gauge
                    - id: custom.filterable
                      value: false
                    - id: decimals
                      value: 3
                - matcher:
                    id: byName
                    options: Instance
                  properties:
                    - id: links
                      value:
                        - targetBlank: true
                          title: ${__data.fields.Instance}
                          url: /d/blackbox-exporter-details/blackbox-exporter-details?var-DS_PROMETHEUS=${DS_PROMETHEUS}&var-job=${job}&var-target=${__data.fields.Instance}
                    - id: custom.width
                      value: 521
                - matcher:
                    id: byName
                    options: TLS Version
                  properties:
                    - id: custom.width
                      value: 121
          gridPos:
            h: 20
            w: 24
            x: 0
            "y": 6
          options:
            cellHeight: md
            footer:
                countRows: true
                fields: ""
                reducer:
                    - count
                show: true
            showHeader: true
            sortBy:
                - desc: false
                  displayName: SSL Cert Expiry (days)
          targets:
            - datasource:
                type: prometheus
                uid: ${DS_PROMETHEUS}
              editorMode: code
              expr: last_over_time(probe_success{job=~"$job", instance=~"$target"}[31m])
              format: table
              instant: true
              interval: ""
              legendFormat: ""
              refId: A
            - datasource:
                type: prometheus
                uid: ${DS_PROMETHEUS}
              editorMode: code
              expr: last_over_time(probe_http_ssl{job=~"$job", instance=~"$target"}[31m]) > 0
              format: table
              instant: true
              interval: ""
              legendFormat: ""
              refId: B
            - datasource:
                type: prometheus
                uid: ${DS_PROMETHEUS}
              editorMode: code
              expr: (last_over_time(probe_ssl_earliest_cert_expiry{job=~"$job", instance=~"$target"}[31m]) - time()) / 3600 / 24
              format: table
              instant: true
              interval: ""
              legendFormat: ""
              refId: C
            - datasource:
                type: prometheus
                uid: ${DS_PROMETHEUS}
              editorMode: code
              expr: last_over_time(probe_http_status_code{job=~"$job", instance=~"$target"}[31m]) > 0
              format: table
              instant: true
              interval: ""
              legendFormat: ""
              refId: D
            - datasource:
                type: prometheus
                uid: ${DS_PROMETHEUS}
              editorMode: code
              expr: avg_over_time(probe_duration_seconds{job=~"$job", instance=~"$target"}[31m])
              format: table
              hide: false
              instant: false
              interval: ""
              intervalFactor: 1
              legendFormat: ""
              refId: E
            - datasource:
                type: prometheus
                uid: ${DS_PROMETHEUS}
              editorMode: code
              expr: last_over_time(probe_tls_version_info{job=~"$job", instance=~"$target"}[31m])
              format: table
              instant: true
              interval: ""
              legendFormat: ""
              refId: F
            - datasource:
                type: prometheus
                uid: ${DS_PROMETHEUS}
              editorMode: code
              expr: avg_over_time(probe_dns_lookup_time_seconds{job=~"$job", instance=~"$target"}[31m])
              format: table
              instant: true
              interval: ""
              legendFormat: ""
              refId: G
          title: HTTP Probe Overview
          transformations:
            - id: seriesToColumns
              options:
                byField: instance
            - id: filterFieldsByName
              options:
                byVariable: false
                include:
                    pattern: ^(?!.*\s[2-9]$)(?!.*\s\d{2,}$).+
            - id: renameByRegex
              options:
                regex: ^(.*) 1$
                renamePattern: $1
            - id: organize
              options:
                excludeByName:
                    __name__: true
                    __name__ 1: true
                    __name__ 2: true
                    __name__ 3: true
                    __name__ 4: true
                    __name__ 5: true
                    __name__ 6: true
                    __name__ 7: true
                    Time: true
                    Time 1: true
                    Time 2: true
                    Time 3: true
                    Time 4: true
                    Time 5: true
                    Time 6: true
                    Time 7: true
                    Time 8: true
                    Value: false
                    'Value #A': false
                    'Value #B': false
                    'Value #F': true
                    app 1: true
                    app 2: true
                    app 3: true
                    app 4: true
                    app 5: true
                    app 6: true
                    app 7: true
                    cluster: true
                    cluster 1: true
                    cluster 2: true
                    cluster 3: true
                    cluster 4: true
                    cluster 5: true
                    cluster 6: true
                    cluster 7: true
                    container 1: true
                    container 2: true
                    container 3: true
                    container 4: true
                    container 5: true
                    container 6: true
                    container 7: true
                    endpoint 1: true
                    endpoint 2: true
                    endpoint 3: true
                    endpoint 4: true
                    endpoint 5: true
                    endpoint 6: true
                    endpoint 7: true
                    environment: false
                    environment 1: false
                    environment 2: true
                    environment 3: true
                    environment 4: true
                    environment 5: true
                    environment 6: true
                    environment 7: true
                    job: true
                    job 1: true
                    job 2: true
                    job 3: true
                    job 4: true
                    job 5: true
                    job 6: true
                    job 7: true
                    job 8: true
                    namespace: true
                    namespace 1: true
                    namespace 2: true
                    namespace 3: true
                    namespace 4: true
                    namespace 5: true
                    namespace 6: true
                    namespace 7: true
                    phase: true
                    pod 1: true
                    pod 2: true
                    pod 3: true
                    pod 4: true
                    pod 5: true
                    pod 6: true
                    pod 7: true
                    product 1: false
                    product 2: true
                    product 3: true
                    product 4: true
                    product 5: true
                    product 6: true
                    product 7: true
                    region 1: false
                    region 2: true
                    region 3: true
                    region 4: true
                    region 5: true
                    region 6: true
                    region 7: true
                    repo 2: true
                    repo 3: true
                    repo 4: true
                    repo 5: true
                    repo 6: true
                    repo 7: true
                    service 1: true
                    service 2: true
                    service 3: true
                    service 4: true
                    service 5: true
                    service 6: true
                    service 7: true
                    type: true
                    type 1: true
                    type 2: true
                    type 3: true
                    type 4: true
                    type 5: true
                    type 6: true
                    type 7: true
                    type 8: true
                    version: false
                includeByName: {}
                indexByName:
                    __name__ 1: 10
                    __name__ 2: 14
                    __name__ 3: 21
                    __name__ 4: 25
                    __name__ 5: 29
                    Time 1: 9
                    Time 2: 13
                    Time 3: 17
                    Time 4: 20
                    Time 5: 24
                    Time 6: 28
                    Time 7: 32
                    'Value #A': 1
                    'Value #B': 3
                    'Value #C': 5
                    'Value #D': 2
                    'Value #E': 6
                    'Value #F': 8
                    'Value #G': 7
                    instance: 0
                    job 1: 11
                    job 2: 15
                    job 3: 18
                    job 4: 22
                    job 5: 26
                    job 6: 30
                    type 1: 12
                    type 2: 16
                    type 3: 19
                    type 4: 23
                    type 5: 27
                    type 6: 31
                    version: 4
                renameByName:
                    Value: Up
                    'Value #A': Status
                    'Value #B': SSL
                    'Value #C': SSL Cert Expiry (days)
                    'Value #D': Code
                    'Value #E': Probe Duration (s)
                    'Value #F': ""
                    'Value #G': DNS Lookup Duration (s)
                    'Value #H': Probe IP
                    environment 1: Environment
                    instance: Instance
                    product 1: Product
                    region 1: Region
                    repo 1: Repo
                    type 6: ""
                    version: TLS Version
          type: table
    preload: false
    refresh: 5m
    tags:
        - blackbox
        - overview
    templating:
        list:
            - current:
                text: duplo-metrics
                value: duplo-metrics
              includeAll: false
              label: Datasource
              name: DS_PROMETHEUS
              options: []
              query: prometheus
              refresh: 1
              regex: ""
              type: datasource
            - allowCustomValue: true
              current:
                text: All
                value:
                    - $__all
              datasource:
                type: prometheus
                uid: ${DS_PROMETHEUS}
              definition: label_values(probe_success,namespace)
              includeAll: true
              label: Namespace
              multi: true
              name: namespace
              options: []
              query:
                qryType: 1
                query: label_values(probe_success,namespace)
                refId: PrometheusVariableQueryEditor-VariableQuery
              refresh: 1
              regex: ""
              type: query
            - current: {}
              datasource:
                type: prometheus
                uid: ${DS_PROMETHEUS}
              definition: label_values(probe_success{job="aos-blackbox-exporter"},job)
              hide: 2
              includeAll: false
              label: Job
              name: job
              options: []
              query:
                qryType: 1
                query: label_values(probe_success{job="aos-blackbox-exporter"},job)
                refId: PrometheusVariableQueryEditor-VariableQuery
              refresh: 1
              regex: ""
              sort: 1
              type: query
            - allowCustomValue: false
              current:
                text: All
                value: $__all
              datasource:
                type: prometheus
                uid: ${DS_PROMETHEUS}
              definition: label_values(probe_success{job="$job", namespace=~"$namespace"},instance)
              includeAll: true
              label: Target
              name: target
              options: []
              query:
                qryType: 1
                query: label_values(probe_success{job="$job", namespace=~"$namespace"},instance)
                refId: PrometheusVariableQueryEditor-VariableQuery
              refresh: 1
              regex: ""
              sort: 1
              type: query
    time:
        from: now-1h
        to: now
    timepicker: {}
    timezone: ""
    title: Blackbox Exporter Overview
    uid: blackbox-exporter-overview