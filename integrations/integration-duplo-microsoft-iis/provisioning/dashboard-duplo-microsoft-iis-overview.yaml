              expr: rate(windows_iis_files_received_total{job=~"$job", cluster=~"$cluster", namespace=~"$namespace", instance=~"$instance",  site=~"$site"}[$__rate_interval])
              format: time_series
              intervalFactor: 2
              legendFormat: '{{instance}} - {{site}}'
          title: Files received
