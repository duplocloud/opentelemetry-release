        - datasource:
            uid: ${prometheus_datasource}
          description: The number of current connections to an IIS site.
          fieldConfig:
            defaults:
                color:
                    fixedColor: '#5794f2'
                    mode: palette-classic
                custom:
                    fillOpacity: 30
                    gradientMode: opacity
                    lineInterpolation: smooth
                    lineWidth: 2
                    showPoints: never
                thresholds:
                    mode: absolute
                    steps: []
                unit: pps
            overrides: []
          gridPos:
            h: 8
            w: 12
            x: 0
            "y": 45
          id: 10
          options:
            legend:
                calcs: []
                displayMode: list
                placement: bottom
                showLegend: true
            tooltip:
                mode: single
