          gridPos:
            h: 8
            w: 12
            x: 12
            "y": 37
          id: 9
          options:
            legend:
                calcs: []
                displayMode: list
                placement: bottom
                showLegend: true
            tooltip:
                mode: single
                sort: none
          targets:
