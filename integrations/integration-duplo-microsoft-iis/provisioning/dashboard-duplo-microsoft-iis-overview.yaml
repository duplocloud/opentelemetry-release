        - datasource:
            uid: ${prometheus_datasource}
          description: The number of attempted connections to an IIS site.
          fieldConfig:
            defaults:
                color:
                    fixedColor: '#5794f2'
                    mode: palette-classic
                custom:
                    fillOpacity: 30
                    gradientMode: opacity
                    lineInterpolation: smooth
                    lineWidth: 2
                    showPoints: never
                thresholds:
                    mode: absolute
                    steps: []
                unit: pps
            overrides: []
          gridPos:
            h: 8
            w: 12
            x: 12
            "y": 45
          id: 11
          options:
            legend:
                calcs: []
                displayMode: list
                placement: bottom
                showLegend: true
            tooltip:
                mode: single
                sort: none
          targets:
            - datasource:
                uid: ${prometheus_datasource}
              expr: increase(windows_iis_connection_attempts_all_instances_total{job=~"$job", cluster=~"$cluster", namespace=~"$namespace", instance=~"$instance", site=~"$site"}[$__interval:])
