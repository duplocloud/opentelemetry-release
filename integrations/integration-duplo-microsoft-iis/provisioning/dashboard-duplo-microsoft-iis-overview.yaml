apiVersion: grizzly.grafana.com/v1alpha1
kind: Dashboard
metadata:
    folder: integration-duplo-microsoft-iis
    name: duplo-microsoft-iis-overview
spec:
    __inputs: []
    __requires: []
    annotations:
        list: []
    description: ""
    editable: false
    gnetId: null
    graphTooltip: 0
    hideControls: false
    links:
        - keepTime: true
          includeVars: true
          title: Windows Node Metrics
          type: link
          icon: external link
          targetBlank: true
          url: /d/duplo-windows-overview
        - keepTime: true
          includeVars: true
          icon: external link
          targetBlank: true
          title: Windows Node Logs
          type: link
          url: /d/duplo-windows-logs
        - asDropdown: false
          icon: external link
          includeVars: true
          keepTime: true
          tags:
            - duplo-microsoft-iis-integration
          targetBlank: false
          title: Other Microsoft IIS dashboards
          type: dashboards
          url: ""
    panels:
        - collapsed: false
          gridPos:
            h: 1
            w: 24
            x: 0
            "y": 0
          id: 18
          targets: []
          title: Apdex Score
          type: row
        - datasource:
            uid: ${prometheus_datasource}
          description: |
            **Apdex Score** measures user satisfaction based on response time thresholds.

            🟢 **Green (0.94+)**: Excellent — most users satisfied
            🟡 **Yellow (0.75–0.94)**: Acceptable — some delays
            🔴 **Red (<0.75)**: Poor — many users experiencing issues

            **Calculation**: (Satisfied + Tolerating/2) / Total
            - Satisfied: time_taken ≤ 1000 ms
            - Tolerating: 1000–4000 ms (counted as half)
            - Frustrated: > 4000 ms (counted as zero)
          fieldConfig:
            defaults:
                color:
                    mode: thresholds
                    seriesBy: last

                mappings: []
                max: 1
                min: 0
                thresholds:
                    mode: absolute
                    steps:
                        - color: dark-red
                          value: null
                        - color: light-yellow
                          value: 0.75
                        - color: dark-green
                          value: 0.94
            overrides: []
          gridPos:
            h: 4
            w: 8
            x: 0
            "y": 1
          id: 19
          options:
            colorMode: value
            graphMode: area
            justifyMode: auto
            orientation: auto
            reduceOptions:
                calcs:
                    - lastNotNull
                fields: ""
                values: false
            textMode: auto
            wideLayout: true
          targets:
            - datasource:
                uid: ${prometheus_datasource}
              editorMode: code
              expr: |
                (
                  sum by (site) (iis:requests_satisfied:rate1m{cluster=~"$cluster", namespace=~"$namespace", site=~"$site", instance=~"$instance"})
                  + (
                      sum by (site) (iis:requests_tolerating:rate1m{cluster=~"$cluster", namespace=~"$namespace", site=~"$site", instance=~"$instance"})
                      or
                      sum by (site) (iis:requests_satisfied:rate1m{cluster=~"$cluster", namespace=~"$namespace", site=~"$site", instance=~"$instance"} * 0)
                    ) / 2
                )
                / sum by (site) (iis:request_rate:rate1m{cluster=~"$cluster", namespace=~"$namespace", site=~"$site", instance=~"$instance"})
              instant: true
              legendFormat: '{{site}}'
              range: false
              refId: apdexQuery
          title: Apdex Score (T = 1s)
          type: stat
        - datasource:
            uid: ${prometheus_datasource}
          description: Total IIS request rate (req/s) across selected sites, derived from Loki recording rules.
          fieldConfig:
            defaults:
                color:
                    mode: thresholds
                mappings: []
                thresholds:
                    mode: absolute
                    steps:
                        - color: blue
                          value: null
                unit: reqps
            overrides: []
          gridPos:
            h: 4
            w: 8
            x: 8
            "y": 1
          id: 20
          options:
            colorMode: background
            graphMode: area
            justifyMode: auto
            orientation: auto
            reduceOptions:
                calcs:
                    - lastNotNull
                fields: ""
                values: false
            textMode: auto
            wideLayout: true
          targets:
            - datasource:
                uid: ${prometheus_datasource}
              editorMode: code
              expr: sum(iis:request_rate:rate1m{cluster=~"$cluster", namespace=~"$namespace", site=~"$site", instance=~"$instance"})
              instant: true
              legendFormat: req/s
              range: false
              refId: A
          title: Request Rate
          type: stat
        - datasource:
            uid: ${prometheus_datasource}
          description: 'P95 response time in ms from IIS access logs. Green <1 s | Yellow 1–4 s | Red >4 s'
          fieldConfig:
            defaults:
                color:
                    mode: thresholds
                mappings: []
                thresholds:
                    mode: absolute
                    steps:
                        - color: dark-green
                          value: null
                        - color: light-yellow
                          value: 1000
                        - color: dark-red
                          value: 4000
                unit: ms
            overrides: []
          gridPos:
            h: 4
            w: 8
            x: 16
            "y": 1
          id: 21
          options:
            colorMode: value
            graphMode: area
            justifyMode: auto
            orientation: auto
            reduceOptions:
                calcs:
                    - lastNotNull
                fields: ""
                values: false
            textMode: auto
            wideLayout: true
          targets:
            - datasource:
                uid: ${prometheus_datasource}
              editorMode: code
              expr: max(iis:response_time_ms_p95:rate1m{cluster=~"$cluster", namespace=~"$namespace", site=~"$site", instance=~"$instance"})
              instant: true
              legendFormat: P95 ms
              range: false
              refId: A
          title: P95 Response Time
          type: stat
        - datasource:
            uid: ${prometheus_datasource}
          description: |
            **Apdex Score** over time per IIS site.

            🟢 **Green (0.94+)**: Excellent
            🟡 **Yellow (0.75–0.94)**: Acceptable
            🔴 **Red (<0.75)**: Poor

            **Calculation**: (Satisfied + Tolerating/2) / Total Requests
          fieldConfig:
            defaults:
                color:
                    fixedColor: red
                    mode: thresholds
                custom:
                    axisBorderShow: false
                    axisCenteredZero: false
                    axisColorMode: text
                    axisGridShow: true
                    axisLabel: ""
                    axisPlacement: auto
                    barAlignment: 0
                    barWidthFactor: 0.6
                    drawStyle: line
                    fillOpacity: 0
                    gradientMode: scheme
                    hideFrom:
                        legend: false
                        tooltip: false
                        viz: false
                    insertNulls: false
                    lineInterpolation: linear
                    lineWidth: 1
                    pointSize: 5
                    scaleDistribution:
                        type: linear
                    showPoints: auto
                    spanNulls: false
                    stacking:
                        group: A
                        mode: none
                    thresholdsStyle:
                        mode: area
                max: 1
                min: 0.5
                mappings: []
                thresholds:
                    mode: absolute
                    steps:
                        - color: red
                          value: null
                        - color: "#EAB839"
                          value: 0.75
                        - color: dark-green
                          value: 0.94
            overrides: []
          gridPos:
            h: 8
            w: 12
            x: 0
            "y": 5
          id: 22
          options:
            legend:
                calcs:
                    - mean
                    - max
                    - min
                displayMode: list
                placement: bottom
                showLegend: true
            tooltip:
                hideZeros: false
                mode: single
                sort: none
          targets:
            - datasource:
                uid: ${prometheus_datasource}
              editorMode: code
              exemplar: true
              expr: |
                (
                  sum by (site) (iis:requests_satisfied:rate1m{cluster=~"$cluster", namespace=~"$namespace", site=~"$site", instance=~"$instance"})
                  + (
                      sum by (site) (iis:requests_tolerating:rate1m{cluster=~"$cluster", namespace=~"$namespace", site=~"$site", instance=~"$instance"})
                      or
                      sum by (site) (iis:requests_satisfied:rate1m{cluster=~"$cluster", namespace=~"$namespace", site=~"$site", instance=~"$instance"} * 0)
                    ) / 2
                )
                / sum by (site) (iis:request_rate:rate1m{cluster=~"$cluster", namespace=~"$namespace", site=~"$site", instance=~"$instance"})
              hide: false
              instant: false
              interval: ""
              legendFormat: '{{site}}'
              range: true
              refId: apdexQuery
          title: Apdex Score (T = 1s)
          type: timeseries
        - datasource:
            uid: ${prometheus_datasource}
          description: P50 (dashed), P95 (solid), P99 (long-dash) response times in ms from IIS access logs.
          fieldConfig:
            defaults:
                color:
                    fixedColor: '#5794f2'
                    mode: palette-classic
                custom:
                    fillOpacity: 5
                    lineWidth: 2
                    showPoints: never
                    spanNulls: false
                mappings: []
                thresholds:
                    mode: absolute
                    steps:
                        - color: dark-green
                          value: null
                        - color: light-yellow
                          value: 1000
                        - color: dark-red
                          value: 4000
                unit: ms
            overrides:
                - matcher:
                    id: byFrameRefID
                    options: p50
                  properties:
                    - id: custom.lineStyle
                      value:
                        dash:
                            - 4
                            - 4
                        fill: dash
                - matcher:
                    id: byFrameRefID
                    options: p99
                  properties:
                    - id: custom.lineStyle
                      value:
                        dash:
                            - 10
                            - 5
                        fill: dash
          gridPos:
            h: 8
            w: 12
            x: 12
            "y": 5
          id: 23
          options:
            legend:
                displayMode: list
                placement: bottom
                showLegend: true
            tooltip:
                mode: multi
                sort: desc
          targets:
            - datasource:
                uid: ${prometheus_datasource}
              editorMode: code
              expr: avg by (site) (iis:response_time_ms_p50:rate1m{cluster=~"$cluster", namespace=~"$namespace", site=~"$site", instance=~"$instance"})
              instant: false
              legendFormat: 'P50 - {{site}}'
              range: true
              refId: p50
            - datasource:
                uid: ${prometheus_datasource}
              editorMode: code
              expr: avg by (site) (iis:response_time_ms_p95:rate1m{cluster=~"$cluster", namespace=~"$namespace", site=~"$site", instance=~"$instance"})
              instant: false
              legendFormat: 'P95 - {{site}}'
              range: true
              refId: p95
            - datasource:
                uid: ${prometheus_datasource}
              editorMode: code
              expr: avg by (site) (iis:response_time_ms_p99:rate1m{cluster=~"$cluster", namespace=~"$namespace", site=~"$site", instance=~"$instance"})
              instant: false
              legendFormat: 'P99 - {{site}}'
              range: true
              refId: p99
          title: Response Time Percentiles (P50/P95/P99)
          type: timeseries
        - datasource:
            uid: ${prometheus_datasource}
          description: The request rate split by HTTP Method for an IIS site
          fieldConfig:
            defaults:
                color:
                    fixedColor: '#5794f2'
                    mode: palette-classic
                custom:
                    fillOpacity: 30
                    gradientMode: opacity
                    lineInterpolation: smooth
                    lineWidth: 2
                    showPoints: never
                thresholds:
                    mode: absolute
                    steps: []
                unit: reqps
            overrides: []
          gridPos:
            h: 8
            w: 12
            x: 0
            "y": 13
          id: 2
          options:
            legend:
                calcs: []
                displayMode: list
                placement: right
                showLegend: true
            tooltip:
                mode: single
                sort: none
          targets:
            - datasource:
                uid: ${prometheus_datasource}
              expr: rate(windows_iis_requests_total{job=~"$job", cluster=~"$cluster", namespace=~"$namespace", instance=~"$instance", site=~"$site"}[$__rate_interval])
              format: time_series
              intervalFactor: 2
              legendFormat: '{{site}} - {{method}}'
          title: Requests
          type: timeseries
        - datasource:
            uid: ${prometheus_datasource}
          description: Requests that have resulted in errors for an IIS site.
          fieldConfig:
            defaults:
                color:
                    fixedColor: '#ff7383'
                    mode: shades
                custom:
                    drawStyle: bars
                    fillOpacity: 100
                    gradientMode: opacity
                    lineInterpolation: smooth
                    lineWidth: 2
                    showPoints: never
                    stacking:
                        mode: normal
                noValue: No errors
                thresholds:
                    mode: absolute
                    steps: []
                unit: errors/sec
            overrides: []
          gridPos:
            h: 8
            w: 12
            x: 12
            "y": 13
          id: 3
          options:
            legend:
                calcs: []
                displayMode: list
                placement: bottom
                showLegend: true
            tooltip:
                mode: single
                sort: none
          targets:
            - datasource:
                uid: ${prometheus_datasource}
              expr: rate(windows_iis_locked_errors_total{job=~"$job", cluster=~"$cluster", namespace=~"$namespace", instance=~"$instance", site=~"$site"}[$__rate_interval])
              format: time_series
              intervalFactor: 2
              legendFormat: '{{site}} - locked'
            - datasource:
                uid: ${prometheus_datasource}
              expr: rate(windows_iis_not_found_errors_total{job=~"$job", cluster=~"$cluster", namespace=~"$namespace", instance=~"$instance", site=~"$site"}[$__rate_interval])
              format: time_series
              intervalFactor: 2
              legendFormat: '{{site}} - not found'
          title: Request errors
          type: timeseries
        - datasource:
            uid: ${prometheus_datasource}
          description: Number of async I/O requests that are currently queued for an IIS site.
          fieldConfig:
            defaults:
                color:
                    fixedColor: '#5794f2'
                    mode: palette-classic
                custom:
                    fillOpacity: 30
                    gradientMode: opacity
                    lineInterpolation: smooth
                    lineWidth: 2
                    showPoints: never
                thresholds:
                    mode: absolute
                    steps: []
                unit: requests
            overrides: []
          gridPos:
            h: 8
            w: 12
            x: 0
            "y": 21
          id: 4
          options:
            legend:
                calcs: []
                displayMode: list
                placement: bottom
                showLegend: true
            tooltip:
                mode: none
                sort: none
          targets:
            - datasource:
                uid: ${prometheus_datasource}
              expr: increase(windows_iis_blocked_async_io_requests_total{job=~"$job", cluster=~"$cluster", namespace=~"$namespace", instance=~"$instance", site=~"$site"}[$__interval:])
              format: time_series
              interval: 1m
              intervalFactor: 2
              legendFormat: '{{instance}} - {{site}}'
          title: Blocked async I/O requests
          type: timeseries
        - datasource:
            uid: ${prometheus_datasource}
          description: Number of async I/O requests that have been rejected for an IIS site.
          fieldConfig:
            defaults:
                color:
                    fixedColor: '#5794f2'
                    mode: palette-classic
                custom:
                    fillOpacity: 30
                    gradientMode: opacity
                    lineInterpolation: smooth
                    lineWidth: 2
                    showPoints: never
                thresholds:
                    mode: absolute
                    steps: []
                unit: requests
            overrides: []
          gridPos:
            h: 8
            w: 12
            x: 12
            "y": 21
          id: 5
          options:
            legend:
                calcs: []
                displayMode: list
                placement: bottom
                showLegend: true
            tooltip:
                mode: single
                sort: none
          targets:
            - datasource:
                uid: ${prometheus_datasource}
              expr: increase(windows_iis_rejected_async_io_requests_total{job=~"$job", cluster=~"$cluster", namespace=~"$namespace", instance=~"$instance", site=~"$site"}[$__interval:])
              format: time_series
              interval: 1m
              intervalFactor: 2
              legendFormat: '{{instance}} - {{site}}'
          title: Rejected async I/O requests
          type: timeseries
        - datasource:
            uid: ${prometheus_datasource}
          description: The traffic sent by an IIS site.
          fieldConfig:
            defaults:
                color:
                    fixedColor: '#5794f2'
                    mode: palette-classic
                custom:
                    fillOpacity: 30
                    gradientMode: opacity
                    lineInterpolation: smooth
                    lineWidth: 2
                    showPoints: never
                thresholds:
                    mode: absolute
                    steps: []
                unit: Bps
            overrides: []
          gridPos:
            h: 8
            w: 12
            x: 0
            "y": 29
          id: 6
          options:
            legend:
                calcs: []
                displayMode: list
                placement: bottom
                showLegend: true
            tooltip:
                mode: single
                sort: none
          targets:
            - datasource:
                uid: ${prometheus_datasource}
              expr: rate(windows_iis_sent_bytes_total{job=~"$job", cluster=~"$cluster", namespace=~"$namespace", instance=~"$instance", site=~"$site"}[$__rate_interval])
              format: time_series
              intervalFactor: 2
              legendFormat: '{{instance}} - {{site}}'
          title: Traffic sent
          type: timeseries
        - datasource:
            uid: ${prometheus_datasource}
          description: The traffic received by an IIS site.
          fieldConfig:
            defaults:
                color:
                    fixedColor: '#5794f2'
                    mode: palette-classic
                custom:
                    fillOpacity: 30
                    gradientMode: opacity
                    lineInterpolation: smooth
                    lineWidth: 2
                    showPoints: never
                thresholds:
                    mode: absolute
                    steps: []
                unit: Bps
            overrides: []
          gridPos:
            h: 8
            w: 12
            x: 12
            "y": 29
          id: 7
          options:
            legend:
                calcs: []
                displayMode: list
                placement: bottom
                showLegend: true
            tooltip:
                mode: single
                sort: none
          targets:
            - datasource:
                uid: ${prometheus_datasource}
              expr: rate(windows_iis_received_bytes_total{job=~"$job", cluster=~"$cluster", namespace=~"$namespace", instance=~"$instance", site=~"$site"}[$__rate_interval])
              format: time_series
              intervalFactor: 2
              legendFormat: '{{instance}} - {{site}}'
          title: Traffic received
          type: timeseries
        - datasource:
            uid: ${prometheus_datasource}
          description: The files sent by an IIS site.
          fieldConfig:
            defaults:
                color:
                    fixedColor: '#5794f2'
                    mode: palette-classic
                custom:
                    fillOpacity: 30
                    gradientMode: opacity
                    lineInterpolation: smooth
                    lineWidth: 2
                    showPoints: never
                thresholds:
                    mode: absolute
                    steps: []
                unit: files/s
            overrides: []
          gridPos:
            h: 8
            w: 12
            x: 0
            "y": 37
          id: 8
          options:
            legend:
                calcs: []
                displayMode: list
                placement: bottom
                showLegend: true
            tooltip:
                mode: single
                sort: none
          targets:
            - datasource:
                uid: ${prometheus_datasource}
              expr: rate(windows_iis_files_sent_total{job=~"$job", cluster=~"$cluster", namespace=~"$namespace", instance=~"$instance",  site=~"$site"}[$__rate_interval])
              format: time_series
              intervalFactor: 2
              legendFormat: '{{instance}} - {{site}}'
          title: Files sent
          type: timeseries
        - datasource:
            uid: ${prometheus_datasource}
          description: The files received by an IIS site.
          fieldConfig:
