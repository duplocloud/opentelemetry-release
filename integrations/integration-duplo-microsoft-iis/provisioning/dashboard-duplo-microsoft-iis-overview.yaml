        - datasource:
            uid: ${loki_datasource}
          description: Recent access logs from access logs file for an IIS site.
          gridPos:
            h: 10
            w: 24
            x: 0
            "y": 53
          id: 12
          options:
            dedupStrategy: none
            enableLogDetails: true
            prettifyLogMessage: false
            showCommonLabels: false
            showLabels: false
            showTime: false
            sortOrder: Descending
            wrapLogMessage: false
          targets:
            - datasource:
                uid: ${loki_datasource}
              editorMode: code
              expr: '{job=~"$job", site=~"$site"} |= ``'
              queryType: range
              refId: A
          title: Access logs
          type: logs
        - collapsed: false
          datasource:
            uid: ${prometheus_datasource}
          gridPos:
            h: 1
            w: 24
            x: 0
            "y": 63
          id: 13
          targets: []
          title: Cache
          type: row
        - datasource:
            uid: ${prometheus_datasource}
          description: The current file cache hit ratio for an IIS server.
          fieldConfig:
            defaults:
                color:
                    fixedColor: '#5794f2'
                    mode: palette-classic
                custom:
                    fillOpacity: 30
                    gradientMode: opacity
                    lineInterpolation: smooth
                    lineWidth: 2
                    showPoints: never
                thresholds:
                    mode: absolute
                    steps: []
                unit: percent
            overrides: []
          gridPos:
            h: 8
            w: 12
            x: 0
            "y": 64
          id: 14
          options:
            legend:
                calcs: []
                displayMode: list
                placement: bottom
                showLegend: true
            tooltip:
                mode: single
                sort: none
          pluginVersion: 9.5.0-cloud.2.f143d34
          targets:
            - datasource:
                uid: ${prometheus_datasource}
              expr: increase(windows_iis_server_file_cache_hits_total{job=~"$job", cluster=~"$cluster", namespace=~"$namespace", instance=~"$instance"}[$__interval:]) / clamp_min(increase(windows_iis_server_file_cache_queries_total{job=~"$job", cluster=~"$cluster", namespace=~"$namespace", instance=~"$instance"}[$__interval:]),1) * 100
              format: time_series
              interval: 1m
              intervalFactor: 2
              legendFormat: '{{job}} - {{instance}}'
          title: File cache hit ratio
          type: timeseries
        - datasource:
            uid: ${prometheus_datasource}
