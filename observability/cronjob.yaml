apiVersion: batch/v1
kind: CronJob
metadata:
  name: otel-observability-collector
  namespace: duploservices-otel-nonprod
spec:
  schedule: "0 0 * * *"  # Run every 24 hours at midnight
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: otel-collector
            image: alpine/git:latest
            command:
            - /bin/sh  # Alpine uses sh instead of bash
            - /scripts/entrypoint.sh
            env:
            - name: PROMETHEUS_URL
              value: "http://duplo-metrics-nginx:80/prometheus"
            - name: LOKI_URL
              value: "https://logs.prod-apps.duplocloud.net"
            - name: CLUSTER
              value: "duploinfra-o11y"
            - name: NAMESPACE
              value: "duploservices-o11y-otel"
            - name: CUSTOMER
              value: "duplo-cloud"
            - name: ENVIRONMENT
              value: "test24"
            - name: DUPLO_URL
              value: "https://test24.duplocloud.net"
            - name: NAMESPACE_FILTER
              value: ".*otel.*"
            - name: GPG_PASSPHRASE
              valueFrom:
                secretKeyRef:
                  name: gpg-passphrase
                  key: gpg_passphrase
            - name: JOB_VERSION
              value: "2.1.0"
            volumeMounts:
            - name: scripts
              mountPath: /scripts
          volumes:
          - name: scripts
            configMap:
              name: otel-scripts
              defaultMode: 0755
          restartPolicy: OnFailure 