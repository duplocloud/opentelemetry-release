apiVersion: batch/v1
kind: CronJob
metadata:
  name: otel-observability-test
  namespace: duploservices-aos
spec:
  schedule: "0/5 * * * *"  # Run every 24 hours at midnight
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: otel-collector
            image: duplocloud/duplo-observability:stable
            env:
            - name: PROMETHEUS_URL
              value: "http://duplo-metrics-nginx:80/prometheus"
            - name: LOKI_URL
              value: "https://logs.prod-apps.duplocloud.net"
            - name: CLUSTER
              value: "duploinfra-aos"
            - name: NAMESPACE
              value: "duploservices-aos"
            - name: CUSTOMER
              value: "duplo-cloud"
            - name: ENVIRONMENT
              value: "aos-demo"
            - name: DUPLO_URL
              value: "https://aos-demo.duplocloud.net"
            - name: NAMESPACE_FILTER
              value: ".*aos.*"
            - name: GPG_PASSPHRASE
              valueFrom:
                secretKeyRef:
                  name: gpg-passphrase
                  key: gpg_passphrase
            - name: JOB_VERSION
              value: "2.1.0"
            - name: BRANCH_NAME
              value: "cronjob-test"
          serviceAccountName: duploservices-aos-edit-user
          restartPolicy: OnFailure
