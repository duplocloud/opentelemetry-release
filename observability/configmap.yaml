apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-scripts
  namespace: duploservices-otel-nonprod
data:
  entrypoint.sh: |
    #!/bin/sh
    set -e

    # Install Python and pip (Alpine-based image)
    apk add --no-cache python3 py3-pip

    # Clone/pull the latest version of the script
    REPO_URL="https://github.com/duplocloud/opentelemetry-release.git"
    SCRIPT_PATH="otel-observability.py"

    if [ -d "opentelemetry-release" ]; then
        cd opentelemetry-release
        git pull
    else
        git clone -b cron-job-adding-k8s-version $REPO_URL opentelemetry-release
        cd opentelemetry-release
    fi

    cd observability

    # Install requirements
    pip install --break-system-packages -r requirements.txt

    # Run the script
    python3 $SCRIPT_PATH 